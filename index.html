  <script id="titanScript" type="text/plain">#!/system/bin/sh
# =============================================================================
# TITAN v38 RAZR60 EXTREME EDITION
# Motorola razr 60 / no-root / reversible / OEM-aware / aggressive-safe
# =============================================================================

R='\033[0;31m'
G='\033[0;32m'
Y='\033[1;33m'
C='\033[0;36m'
P='\033[0;35m'
NC='\033[0m'

DRY_RUN=0
VERBOSE=1
MODE="run"

PROFILE="max"
DEBLOAT_ONLY=0
DEBLOAT_LEVEL="balanced"
ALLOW_VENDOR_AGGRESSIVE=0

UPDATE_APKS=0
APK_DIR="/sdcard/Download/APKs"
KEEP_APKS=0
PURGE_DOWNLOAD_TEMP_ONLY=0

AUTO_TRIM_CACHES=1
AUTO_DEXOPT=1
AUTO_DISABLE_HAPTICS=0
AUTO_REBOOT_HINT=1
AUTO_CLEAR_CLIPBOARD=0
AUTO_FORCE_STOP=0
AUTO_PRUNE_EMPTY_DIRS=1
AUTO_TRIM_LOGFILE=1
AUTO_CLEAR_BUGREPORTS=1
AUTO_CLEAR_TOMBSTONES=1
AUTO_CLEAR_EMPTY_FILES=1
AUTO_CLEAR_OLD_INSTALLERS=1
AUTO_CLEAR_DOWNLOAD_JUNK=1
AUTO_CLEAR_MEDIA_THUMBS=1
AUTO_CLEAR_TMP_DIRS=1
AUTO_CLEAR_LOG_DIRS=1
AUTO_CLEAR_ANDROID_TEMP=1
AUTO_CLEAR_CRASH_RESIDUE=1
AUTO_CLEAR_MISC_JUNK=1
AUTO_SET_REFRESH_RATE=1
AUTO_DEBLOAT=1
AUTO_LIMIT_BG=0
AUTO_MEDIA_SCAN_HINT=1
AUTO_FIXED_PERF_TEMPORARY=1

DEXOPT_ALL=0
FORCE_HEAVY_TASKS=0
FORCE_STOP_MAX_COUNT=8
FORCE_STOP_NONCRITICAL=0

DAYS_OLD=2
MIN_SIZE_KB=8
DOWNLOAD_MAXDEPTH=5
MAX_LOG_SIZE_MB=24
BATTERY_MIN_FOR_HEAVY=35
TEMP_MAX_C=43

ANIM_SCALE="0.25"
TOUCH_TIMEOUT="100"
POINTER_SPEED="5"
BG_LIMIT=""
TARGET_PEAK_REFRESH=""
TARGET_MIN_REFRESH=""

WORKDIR="/sdcard/Download/TITAN"
LOGDIR="$WORKDIR"
LOGFILE="$LOGDIR/titan_razr60_v38.log"
STATEFILE="$LOGDIR/titan_razr60_state_v38.conf"
DEBLOAT_STATEFILE="$LOGDIR/titan_razr60_debloat_state_v38.txt"
DISABLED_STATEFILE="$LOGDIR/titan_razr60_disabled_state_v38.txt"
UPDATED_APKS_LOG="$LOGDIR/titan_razr60_updated_apks_v38.txt"

TMP_PROTECTED="$LOGDIR/.protected_pkgs.tmp"
TMP_SCAN_ALL="$LOGDIR/.scan_all.tmp"
TMP_JUNK_DL="$LOGDIR/.junk_dl.tmp"
TMP_OLD_APK="$LOGDIR/.old_apk.tmp"
TMP_LOG_DUMPS="$LOGDIR/.log_dumps.tmp"

WHATSAPP_EXCLUDE_1="/sdcard/WhatsApp"
WHATSAPP_EXCLUDE_2="/sdcard/Android/media/com.whatsapp"
WHATSAPP_EXCLUDE_3="/sdcard/Android/data/com.whatsapp"

TYPELESS_EXCLUDE_1="/sdcard/Android/media/com.typeless.mobile"
TYPELESS_EXCLUDE_2="/sdcard/Android/data/com.typeless.mobile"

CRITICAL_PACKAGES_STATIC="
android
com.android.systemui
com.android.settings
com.android.shell
com.android.packageinstaller
com.google.android.packageinstaller
com.android.permissioncontroller
com.google.android.permissioncontroller
com.android.providers.media
com.android.providers.downloads
com.android.providers.downloads.ui
com.android.externalstorage
com.android.documentsui
com.android.vending
com.google.android.gms
com.google.android.gsf
com.google.android.gsf.login
com.google.android.feedback
com.whatsapp
com.whatsapp.w4b
com.typeless.mobile
com.motorola.launcher
"

strip_ansi() { sed 's/\x1b\[[0-9;]*m//g'; }

log_init() {
  mkdir -p "$LOGDIR" 2>/dev/null
  : > "$LOGFILE" 2>/dev/null
}

log() {
  echo "$(date '+%F %T') | $*" >> "$LOGFILE" 2>/dev/null
}

say() {
  [ "$VERBOSE" = "1" ] && echo -e "$*"
  echo -e "$*" | strip_ansi | log
}

exists() { command -v "$1" >/dev/null 2>&1; }

run() {
  if [ "$DRY_RUN" = "1" ]; then
    say "${C}[dry] $*${NC}"
    return 0
  fi
  sh -c "$*" >> "$LOGFILE" 2>&1
  return $?
}

run_quiet() {
  if [ "$DRY_RUN" = "1" ]; then
    say "${C}[dry] $*${NC}"
    return 0
  fi
  sh -c "$*" >/dev/null 2>&1
  return $?
}

append_unique_line() {
  f="$1"
  line="$2"
  [ -z "$line" ] && return 0
  mkdir -p "$(dirname "$f")" 2>/dev/null
  touch "$f" 2>/dev/null
  grep -Fxq "$line" "$f" 2>/dev/null || echo "$line" >> "$f"
}

getprop_safe() { getprop "$1" 2>/dev/null; }
settings_get_safe() { settings get "$1" "$2" 2>/dev/null; }
settings_put_safe() { run "settings put $1 $2 '$3'"; }
settings_delete_safe() { run "settings delete $1 $2"; }

sdk() { getprop_safe ro.build.version.sdk; }
brand() { getprop_safe ro.product.brand; }
model() { getprop_safe ro.product.model; }
manufacturer() { getprop_safe ro.product.manufacturer; }
release_ver() { getprop_safe ro.build.version.release; }
secpatch() { getprop_safe ro.build.version.security_patch; }

sd_avail_kb() { df -k /sdcard 2>/dev/null | awk 'NR==2{print $4}'; }
sd_avail_bytes() {
  kb="$(sd_avail_kb)"
  [ -z "$kb" ] && kb=0
  awk -v kb="$kb" 'BEGIN{print kb*1024}'
}
bytes_to_mb() {
  b="$1"
  [ -z "$b" ] && b=0
  awk -v b="$b" 'BEGIN{printf "%.1f MB", b/1024/1024}'
}
bytes_to_gb() {
  b="$1"
  [ -z "$b" ] && b=0
  awk -v b="$b" 'BEGIN{printf "%.2f GB", b/1024/1024/1024}'
}

battery_level() { dumpsys battery 2>/dev/null | awk -F': ' '/level:/{print $2; exit}'; }
battery_temp_c() {
  t="$(dumpsys battery 2>/dev/null | awk -F': ' '/temperature:/{print $2; exit}')"
  [ -z "$t" ] && t=0
  awk -v x="$t" 'BEGIN{printf "%.1f", x/10}'
}

rotate_log_if_needed() {
  [ "$AUTO_TRIM_LOGFILE" = "1" ] || return 0
  [ -f "$LOGFILE" ] || return 0
  size_mb="$(ls -ln "$LOGFILE" 2>/dev/null | awk '{print int($5/1024/1024)}')"
  [ -z "$size_mb" ] && size_mb=0
  if [ "$size_mb" -ge "$MAX_LOG_SIZE_MB" ]; then
    mv "$LOGFILE" "${LOGFILE}.old" 2>/dev/null
    : > "$LOGFILE" 2>/dev/null
  fi
}

should_run_heavy_tasks() {
  [ "$FORCE_HEAVY_TASKS" = "1" ] && return 0
  lvl="$(battery_level)"
  temp="$(battery_temp_c)"
  [ -z "$lvl" ] && lvl=100
  [ -z "$temp" ] && temp=0
  temp_int="$(echo "$temp" | awk -F. '{print $1}')"
  [ -z "$temp_int" ] && temp_int=0
  [ "$lvl" -lt "$BATTERY_MIN_FOR_HEAVY" ] && return 1
  [ "$temp_int" -ge "$TEMP_MAX_C" ] && return 1
  return 0
}

with_fixed_perf_begin() {
  [ "$AUTO_FIXED_PERF_TEMPORARY" = "1" ] || return 0
  exists cmd || return 0
  run_quiet "cmd power set-fixed-performance-mode-enabled true" || true
}

with_fixed_perf_end() {
  [ "$AUTO_FIXED_PERF_TEMPORARY" = "1" ] || return 0
  exists cmd || return 0
  run_quiet "cmd power set-fixed-performance-mode-enabled false" || true
}

cleanup_on_exit() {
  with_fixed_perf_end
  rotate_log_if_needed
  rm -f "$TMP_PROTECTED" "$TMP_SCAN_ALL" "$TMP_JUNK_DL" "$TMP_OLD_APK" "$TMP_LOG_DUMPS" 2>/dev/null
}
trap cleanup_on_exit EXIT INT TERM

while [ $# -gt 0 ]; do
  case "$1" in
    --dry-run) DRY_RUN=1 ;;
    --quiet) VERBOSE=0 ;;
    --restore) MODE="restore" ;;
    --debloat-only) DEBLOAT_ONLY=1 ;;
    --profile) shift; PROFILE="$1" ;;
    --profile=safe) PROFILE="safe" ;;
    --profile=balanced) PROFILE="balanced" ;;
    --profile=max) PROFILE="max" ;;
    --profile=extreme) PROFILE="extreme" ;;
    --debloat-level) shift; DEBLOAT_LEVEL="$1" ;;
    --debloat-level=safe) DEBLOAT_LEVEL="safe" ;;
    --debloat-level=balanced) DEBLOAT_LEVEL="balanced" ;;
    --debloat-level=aggressive) DEBLOAT_LEVEL="aggressive" ;;
    --allow-vendor-aggressive) ALLOW_VENDOR_AGGRESSIVE=1 ;;
    --disable-haptics) AUTO_DISABLE_HAPTICS=1 ;;
    --no-dexopt) AUTO_DEXOPT=0 ;;
    --no-trim-caches) AUTO_TRIM_CACHES=0 ;;
    --dexopt-all) DEXOPT_ALL=1 ;;
    --force-heavy) FORCE_HEAVY_TASKS=1 ;;
    --clear-clipboard) AUTO_CLEAR_CLIPBOARD=1 ;;
    --update-apks) UPDATE_APKS=1 ;;
    --apk-dir) shift; APK_DIR="$1" ;;
    --keep-apks) KEEP_APKS=1 ;;
    --purge-download-temp-only) PURGE_DOWNLOAD_TEMP_ONLY=1 ;;
  esac
  shift
done

apply_profile() {
  case "$PROFILE" in
    safe)
      ANIM_SCALE="0.50"
      TOUCH_TIMEOUT="120"
      POINTER_SPEED="4"
      BG_LIMIT=""
      FORCE_STOP_NONCRITICAL=0
      FORCE_STOP_MAX_COUNT=0
      DAYS_OLD=4
      MIN_SIZE_KB=16
      AUTO_DISABLE_HAPTICS=0
      AUTO_FORCE_STOP=0
      AUTO_LIMIT_BG=0
      DEBLOAT_LEVEL="safe"
      ;;
    balanced)
      ANIM_SCALE="0.35"
      TOUCH_TIMEOUT="110"
      POINTER_SPEED="5"
      BG_LIMIT=""
      FORCE_STOP_NONCRITICAL=0
      FORCE_STOP_MAX_COUNT=0
      DAYS_OLD=2
      MIN_SIZE_KB=8
      AUTO_DISABLE_HAPTICS=0
      AUTO_FORCE_STOP=0
      AUTO_LIMIT_BG=0
      ;;
    max)
      ANIM_SCALE="0.25"
      TOUCH_TIMEOUT="100"
      POINTER_SPEED="5"
      BG_LIMIT=""
      FORCE_STOP_NONCRITICAL=0
      FORCE_STOP_MAX_COUNT=8
      DAYS_OLD=2
      MIN_SIZE_KB=4
      AUTO_DISABLE_HAPTICS=0
      AUTO_FORCE_STOP=0
      AUTO_LIMIT_BG=0
      ;;
    extreme)
      ANIM_SCALE="0.20"
      TOUCH_TIMEOUT="90"
      POINTER_SPEED="6"
      BG_LIMIT="4"
      FORCE_STOP_NONCRITICAL=1
      FORCE_STOP_MAX_COUNT=12
      DAYS_OLD=1
      MIN_SIZE_KB=2
      AUTO_DISABLE_HAPTICS=1
      AUTO_FORCE_STOP=1
      AUTO_LIMIT_BG=1
      DEXOPT_ALL=1
      [ "$DEBLOAT_LEVEL" = "balanced" ] && DEBLOAT_LEVEL="aggressive"
      ;;
    *)
      PROFILE="max"
      apply_profile
      return
      ;;
  esac
}

save_state() {
  [ -f "$STATEFILE" ] && return 0
  say "${C}[i] Guardando estado para restore...${NC}"
  {
    echo "window_animation_scale=$(settings_get_safe global window_animation_scale)"
    echo "transition_animation_scale=$(settings_get_safe global transition_animation_scale)"
    echo "animator_duration_scale=$(settings_get_safe global animator_duration_scale)"
    echo "long_press_timeout=$(settings_get_safe secure long_press_timeout)"
    echo "multi_press_timeout=$(settings_get_safe secure multi_press_timeout)"
    echo "pointer_speed=$(settings_get_safe system pointer_speed)"
    echo "haptic_feedback_enabled=$(settings_get_safe system haptic_feedback_enabled)"
    echo "font_scale=$(settings_get_safe system font_scale)"
    echo "limit_background_processes=$(settings_get_safe global limit_background_processes)"
    echo "peak_refresh_rate=$(settings_get_safe system peak_refresh_rate)"
    echo "min_refresh_rate=$(settings_get_safe system min_refresh_rate)"
  } > "$STATEFILE" 2>/dev/null
}

restore_debloat() {
  if [ -f "$DISABLED_STATEFILE" ]; then
    say "${P}[↩] Rehabilitando paquetes disabled-user...${NC}"
    sed '/^$/d' "$DISABLED_STATEFILE" 2>/dev/null | while IFS= read -r p; do
      run "pm enable --user 0 '$p'" || true
    done
  fi

  if [ -f "$DEBLOAT_STATEFILE" ]; then
    say "${P}[↩] Restaurando paquetes removidos para user 0...${NC}"
    sed '/^$/d' "$DEBLOAT_STATEFILE" 2>/dev/null | while IFS= read -r p; do
      run "cmd package install-existing --user 0 '$p'" || true
      run "pm enable --user 0 '$p'" || true
    done
  fi
}

restore_settings() {
  if [ -f "$STATEFILE" ]; then
    say "${P}[↩] Restaurando settings...${NC}"
    . "$STATEFILE" 2>/dev/null
    [ -n "$window_animation_scale" ] && settings_put_safe global window_animation_scale "$window_animation_scale"
    [ -n "$transition_animation_scale" ] && settings_put_safe global transition_animation_scale "$transition_animation_scale"
    [ -n "$animator_duration_scale" ] && settings_put_safe global animator_duration_scale "$animator_duration_scale"
    [ -n "$long_press_timeout" ] && settings_put_safe secure long_press_timeout "$long_press_timeout"
    [ -n "$multi_press_timeout" ] && settings_put_safe secure multi_press_timeout "$multi_press_timeout"
    [ -n "$pointer_speed" ] && settings_put_safe system pointer_speed "$pointer_speed"
    [ -n "$haptic_feedback_enabled" ] && settings_put_safe system haptic_feedback_enabled "$haptic_feedback_enabled"
    [ -n "$font_scale" ] && settings_put_safe system font_scale "$font_scale"
    [ -n "$peak_refresh_rate" ] && settings_put_safe system peak_refresh_rate "$peak_refresh_rate"
    [ -n "$min_refresh_rate" ] && settings_put_safe system min_refresh_rate "$min_refresh_rate"
    if [ -n "$limit_background_processes" ] && [ "$limit_background_processes" != "null" ]; then
      settings_put_safe global limit_background_processes "$limit_background_processes"
    else
      settings_delete_safe global limit_background_processes
    fi
  else
    say "${Y}[i] No existe statefile de settings.${NC}"
  fi
  restore_debloat
  say "${G}[✓] Restore completado.${NC}"
}

current_ime() {
  settings get secure default_input_method 2>/dev/null | awk -F/ '{print $1}'
}

current_launcher() {
  cmd package resolve-activity --brief -c android.intent.category.HOME android.intent.action.MAIN 2>/dev/null | tail -n 1 | awk -F/ '{print $1}'
}

default_dialer_pkg() {
  settings get secure dialer_default_application 2>/dev/null
}

default_sms_pkg() {
  settings get secure sms_default_application 2>/dev/null
}

default_assistant_pkg() {
  settings get secure assistant 2>/dev/null | awk -F/ '{print $1}'
}

camera_candidates() {
  cmd package query-intent-activities -a android.media.action.IMAGE_CAPTURE 2>/dev/null | sed -n 's/.*name=//p' | awk -F/ '{print $1}' | sort -u
}

build_protected_packages() {
  : > "$TMP_PROTECTED"

  echo "$CRITICAL_PACKAGES_STATIC" | sed '/^$/d' | while IFS= read -r p; do
    append_unique_line "$TMP_PROTECTED" "$p"
  done

  ime="$(current_ime)"
  launcher="$(current_launcher)"
  dialer="$(default_dialer_pkg)"
  sms="$(default_sms_pkg)"
  assistant="$(default_assistant_pkg)"

  [ -n "$ime" ] && append_unique_line "$TMP_PROTECTED" "$ime"
  [ -n "$launcher" ] && append_unique_line "$TMP_PROTECTED" "$launcher"
  [ -n "$dialer" ] && append_unique_line "$TMP_PROTECTED" "$dialer"
  [ -n "$sms" ] && append_unique_line "$TMP_PROTECTED" "$sms"
  [ -n "$assistant" ] && append_unique_line "$TMP_PROTECTED" "$assistant"

  camera_candidates | while IFS= read -r p; do
    [ -n "$p" ] && append_unique_line "$TMP_PROTECTED" "$p"
  done

  pm list packages 2>/dev/null | cut -d: -f2 | while IFS= read -r p; do
    case "$p" in
      *keyboard*|*inputmethod*|*launcher*|*camera*|*dialer*|*contacts*|*messaging*|*telephony*|*permissioncontroller*|*externalstorage*|*documentsui*|*vending*|*gms*|*gsf*|*systemui*|*whatsapp*|*typeless*|com.motorola.launcher|com.motorola.camera*|com.motorola.mobiledesktop*|com.motorola.moto*|com.motorola.genie*|com.motorola.systemui*|com.motorola.setup*|com.motorola.blur*)
        append_unique_line "$TMP_PROTECTED" "$p"
        ;;
    esac
  done
}

is_protected_package() {
  p="$1"
  [ -z "$p" ] && return 0
  grep -Fxq "$p" "$TMP_PROTECTED" 2>/dev/null && return 0
  return 1
}

scan_storage_once() {

  run "find /sdcard -maxdepth 7 \
    -not -path '${WHATSAPP_EXCLUDE_1}/*' \

    -not -path '${WHATSAPP_EXCLUDE_3}/*' \
    -not -path '${TYPELESS_EXCLUDE_1}/*' \
    -not -path '${TYPELESS_EXCLUDE_2}/*' \
    > '$TMP_SCAN_ALL'"
}

sum_sizes_from_list() {
  f="$1"
  [ -f "$f" ] || { echo 0; return; }
  while IFS= read -r p; do
    [ -f "$p" ] && ls -ln "$p" 2>/dev/null | awk '{print $5}'
  done < "$f" | awk '{s+=$1} END{print s+0}'
}

mk_filter_files() {
  : > "$TMP_JUNK_DL"
  : > "$TMP_OLD_APK"
  : > "$TMP_LOG_DUMPS"

  grep '^/sdcard/Download/' "$TMP_SCAN_ALL" 2>/dev/null | while IFS= read -r p; do
    [ -f "$p" ] || continue
    case "$p" in
      *.tmp|*.temp|*.log|*.bak|*.old|*.swp|*.part|*.partial|*.crdownload|*.dmp|*.sav|*.shm|*.journal|*.lock|*.trace|*.stacktrace|*tombstone*|*.err|*.out)
        echo "$p" >> "$TMP_JUNK_DL"
        ;;
      *.apk|*.apks|*.xapk|*.apkm)
        echo "$p" >> "$TMP_OLD_APK"
        ;;
    esac
  done

  while IFS= read -r p; do
    [ -f "$p" ] || continue
    case "$p" in
      *.log|*logcat*|*.dmp|*.trace|*.stacktrace|*tombstone*|/sdcard/bugreports/*|*.anr|*.dropbox)
        echo "$p" >> "$TMP_LOG_DUMPS"
        ;;
    esac
  done < "$TMP_SCAN_ALL"
}

report_cleanup_inventory() {
  say "\n${P}[3/9] INVENTARIO DE LIMPIEZA${NC}"
  scan_storage_once
  mk_filter_files

  junk_n="$(sed '/^$/d' "$TMP_JUNK_DL" 2>/dev/null | wc -l | tr -d ' ')"
  apk_n="$(sed '/^$/d' "$TMP_OLD_APK" 2>/dev/null | wc -l | tr -d ' ')"
  dump_n="$(sed '/^$/d' "$TMP_LOG_DUMPS" 2>/dev/null | wc -l | tr -d ' ')"

  junk_b="$(sum_sizes_from_list "$TMP_JUNK_DL")"
  apk_b="$(sum_sizes_from_list "$TMP_OLD_APK")"
  dump_b="$(sum_sizes_from_list "$TMP_LOG_DUMPS")"

  say "${C}[i] Junk Download: ${junk_n} (~$(bytes_to_mb "$junk_b"))${NC}"
  say "${C}[i] Instaladores/APKs: ${apk_n} (~$(bytes_to_mb "$apk_b"))${NC}"
  say "${C}[i] Logs/dumps: ${dump_n} (~$(bytes_to_mb "$dump_b"))${NC}"
  say "${G}[✓] Inventario generado.${NC}"
}

detect_refresh_caps() {
  exists dumpsys || return 0
  txt="$(dumpsys display 2>/dev/null | grep -E 'fps|refresh rate|RefreshRate|modeId' | head -160)"
  echo "$txt" | grep -q '120' && TARGET_PEAK_REFRESH="120"
  [ -z "$TARGET_PEAK_REFRESH" ] && echo "$txt" | grep -q '90' && TARGET_PEAK_REFRESH="90"
  [ -z "$TARGET_PEAK_REFRESH" ] && echo "$txt" | grep -q '60' && TARGET_PEAK_REFRESH="60"
  [ -n "$TARGET_PEAK_REFRESH" ] && TARGET_MIN_REFRESH="$TARGET_PEAK_REFRESH"
}

set_refresh_rate_hint() {
  [ "$AUTO_SET_REFRESH_RATE" = "1" ] || return 0
  detect_refresh_caps
  [ -n "$TARGET_PEAK_REFRESH" ] && settings_put_safe system peak_refresh_rate "$TARGET_PEAK_REFRESH" || true
  [ -n "$TARGET_MIN_REFRESH" ] && settings_put_safe system min_refresh_rate "$TARGET_MIN_REFRESH" || true
}

  settings_put_safe system pointer_speed "$POINTER_SPEED" || true

  if [ "$AUTO_LIMIT_BG" = "1" ] && [ -n "$BG_LIMIT" ]; then

  fi

  [ "$AUTO_CLEAR_CLIPBOARD" = "1" ] && run_quiet "cmd clipboard set text ''" || true

      return 0
      ;;
  esac
  return 1
}

motorola_vendor_candidates_safe() {
  all_packages | while IFS= read -r p; do

}

motorola_vendor_candidates_aggressive() {
  all_packages | while IFS= read -r p; do
    case "$p" in
      com.motorola.help|com.motorola.gamemode|com.motorola.gamespace|com.motorola.discovery|com.motorola.android.fmradio|com.motorola.mototour|com.motorola.ccc.notification)

        ;;

debloat_disable_user() {
  p="$1"
  [ -z "$p" ] && return 0
  is_protected_package "$p" && return 0
  append_unique_line "$DISABLED_STATEFILE" "$p"
  run "pm disable-user --user 0 '$p'" || true
}

debloat_hide_user0() {
  p="$1"
  [ -z "$p" ] && return 0
  is_protected_package "$p" && return 0
  append_unique_line "$DEBLOAT_STATEFILE" "$p"
  run "pm uninstall -k --user 0 '$p'" || true
}

debloat_phase() {
  [ "$AUTO_DEBLOAT" = "1" ] || return 0
  build_protected_packages

  say "\n${P}[7/9] DEBLOAT REVERSIBLE${NC}"
  say "${C}[i] Nivel: ${DEBLOAT_LEVEL}${NC}"

  case "$DEBLOAT_LEVEL" in
    safe)
      motorola_vendor_candidates_safe | while IFS= read -r p; do
        debloat_disable_user "$p"
      done
      ;;
    balanced)
      user_packages | while IFS= read -r p; do
        looks_like_bloat "$p" || continue
        debloat_disable_user "$p"
      done
      motorola_vendor_candidates_safe | while IFS= read -r p; do
        debloat_disable_user "$p"
      done
      ;;
    aggressive)
      user_packages | while IFS= read -r p; do
        looks_like_bloat "$p" || continue
        debloat_hide_user0 "$p"
      done
      if [ "$ALLOW_VENDOR_AGGRESSIVE" = "1" ]; then
        motorola_vendor_candidates_aggressive | while IFS= read -r p; do
          debloat_hide_user0 "$p"
        done
      else
        motorola_vendor_candidates_safe | while IFS= read -r p; do
          debloat_disable_user "$p"
        done
        say "${Y}[i] Vendor aggressive desactivado. Usa --allow-vendor-aggressive si querés más agresividad.${NC}"
      fi
      ;;
    *)
      DEBLOAT_LEVEL="balanced"
      debloat_phase
      return
      ;;
  esac

  say "${G}[✓] Debloat reversible completado.${NC}"
}

force_stop_candidates() {
  pm list packages -3 2>/dev/null | cut -d: -f2
}

memory_relief() {
  say "\n${P}[8/9] ALIVIO DE MEMORIA${NC}"
  build_protected_packages

  if [ "$AUTO_FORCE_STOP" = "1" ] && [ "$FORCE_STOP_NONCRITICAL" = "1" ]; then
    cnt=0
    for p in $(force_stop_candidates); do
      [ -z "$p" ] && continue
      is_protected_package "$p" && continue
      case "$p" in
        *camera*|*dialer*|*contacts*|*clock*|*alarm*|*systemui*|*whatsapp*|*typeless*|com.motorola.moto*|com.motorola.genie*|com.motorola.launcher)
          continue
          ;;
      esac
      run "am force-stop '$p'"
      cnt=$((cnt+1))
      [ "$cnt" -ge "$FORCE_STOP_MAX_COUNT" ] && break
    done
    say "${C}[i] Force-stop realizados: $cnt${NC}"
  else
    say "${C}[i] Sin cierres masivos. Se prioriza estabilidad.${NC}"
  fi

  say "${G}[✓] Alivio de memoria completado.${NC}"
}

update_local_apks() {
  [ "$UPDATE_APKS" = "1" ] || return 0

  say "\n${P}[9/9] UPDATE DE APKS LOCALES${NC}"
  if [ ! -d "$APK_DIR" ]; then
    say "${Y}[i] No existe el directorio: $APK_DIR${NC}"
    return 0
  fi

  : > "$UPDATED_APKS_LOG" 2>/dev/null

  find "$APK_DIR" -maxdepth 2 -type f \( -iname "*.apk" -o -iname "*.apks" -o -iname "*.xapk" -o -iname "*.apkm" \) 2>/dev/null | while IFS= read -r apk; do
    [ -z "$apk" ] && continue
    case "$apk" in
      *.apk)
        run "pm install -r '$apk'"
        append_unique_line "$UPDATED_APKS_LOG" "$apk"
        ;;
      *.apks|*.xapk|*.apkm)
        say "${Y}[i] Formato bundle no universal por shell stock. Omitido: $apk${NC}"
        ;;
    esac
  done

  say "${G}[✓] Revisión de APKs locales completada.${NC}"
}

    }

    function showToast(msg) {
      toastTextEl.textContent = msg;
      toastEl.classList.remove('opacity-0', 'pointer-events-none');
      toastEl.classList.add('opacity-100');
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => {
        toastEl.classList.add('opacity-0', 'pointer-events-none');
        toastEl.classList.remove('opacity-100');
      }, 1200);
    }

    async function copyText(txt, msg) {
      if (!txt) return showToast('NO HAY TEXTO PARA COPIAR');
      try {
        await navigator.clipboard.writeText(txt);
        showToast(msg || 'COPIADO');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = txt;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(msg || 'COPIADO');
      }
    }

    function render(raw, query = '') {
      const lines = raw.split('\n');
      linesEl.textContent = `Lines: ${lines.length}`;

      const q = (query || '').trim();
      const qRe = q ? new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi') : null;

      const html = lines.map((line, i) => {
        let safe = escapeHtml(line);
        if (qRe) {
          safe = safe.replace(qRe, m => `<mark class="bg-god-500/30 text-god-400 px-0.5">${m}</mark>`);
        }
        return `<span class="line-num">${String(i + 1).padStart(3, ' ')}</span>${safe}`;
      }).join('\n');

      codeEl.innerHTML = html;
    }

    window.copyRaw = function () {
      const raw = getRawScript();
      copyText(raw, 'SCRIPT COPIADO');
    };

    window.copyOneLiner = function () {
      const cmd = `adb shell sh /data/local/tmp/titan_razr60_v38.sh --profile extreme --debloat-level aggressive --allow-vendor-aggressive --keep-apks`;
      copyText(cmd, 'COMANDO ADB COPIADO');
    };

    window.highlightSearch = function () {
      render(getRawScript(), searchInputEl?.value || '');
    };

    (function init() {
      const raw = getRawScript();
      if (!raw) {
        codeEl.textContent = '⚠️ No se encontró contenido en #titanScript (vacío).';
        linesEl.textContent = 'Lines: 0';
        return;
      }
      render(raw, '');
    })();
  </script>
</body>
</html>
