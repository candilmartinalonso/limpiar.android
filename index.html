  <script id="titanScript" type="text/plain">#!/system/bin/sh
# =============================================================================
# TITAN v51 — Android Optimizer
# Motorola razr 60 / stock / reversible / ADB-compatible
#
# MODOS: safe | balanced | aggressive | godmode
# USO:   sh titan_v51.sh [--mode=safe|balanced|aggressive|godmode]
#              [--dry-run] [--restore] [--silent] [--no-debloat]
#              [--no-network] [--no-perf] [--help]
#
# REQUISITOS:
#   • ADB shell o terminal con permisos de usuario (no root necesario)
#   • Root OPCIONAL para tuning de kernel (detectado automáticamente)
#   • Android 11+
# =============================================================================

# ─── COLORES ─────────────────────────────────────────────────────────────────
R='\033[0;31m'; G='\033[0;32m'; Y='\033[1;33m'
C='\033[0;36m'; B='\033[0;34m'
W='\033[1;37m'; NC='\033[0m'
BOLD='\033[1m'; DIM='\033[2m'

# ─── VERSIÓN ──────────────────────────────────────────────────────────────────
VERSION="51.0"

# ─── DEFAULTS (overrideable por args) ────────────────────────────────────────
MODE="balanced"
DRY_RUN=0
VERBOSE=1
SILENT=0
DO_RESTORE=0
DO_DEBLOAT=1
DO_NETWORK=1
DO_PERF=1
DO_KERNEL=0

# ─── RUTAS ───────────────────────────────────────────────────────────────────
WORKDIR="/sdcard/Download/TITAN"
LOGDIR="$WORKDIR/logs"
REPORTDIR="$WORKDIR/reports"
BACKUPDIR="$WORKDIR/backup"

LOGFILE="$LOGDIR/titan_v${VERSION}.log"
DEBLOAT_STATE="$BACKUPDIR/debloat_state.txt"
DISABLED_STATE="$BACKUPDIR/disabled_state.txt"
SETTINGS_BACKUP="$BACKUPDIR/settings_backup.txt"
REPORT_FILE="$REPORTDIR/report_$(date '+%Y%m%d_%H%M%S').txt"

# ─── CAPACIDADES DETECTADAS ──────────────────────────────────────────────────
HAS_ROOT=0
ANDROID_VER=""
DEVICE_MODEL=""
API_LEVEL=0
TOTAL_RAM_MB=0

# =============================================================================
# PARSEO DE ARGUMENTOS
# =============================================================================
parse_args() {
  for arg in "$@"; do
    case "$arg" in
      --mode=*)     MODE="${arg#--mode=}" ;;
      --dry-run)    DRY_RUN=1 ;;
      --restore)    DO_RESTORE=1 ;;
      --silent)     SILENT=1; VERBOSE=0 ;;
      --no-debloat) DO_DEBLOAT=0 ;;
      --no-network) DO_NETWORK=0 ;;
      --no-perf)    DO_PERF=0 ;;
      --help|-h)    show_help; exit 0 ;;
      *) warn "Argumento desconocido: $arg" ;;
    esac
  done

  case "$MODE" in
    safe|balanced|aggressive|godmode) ;;
    *) err "Modo invalido: $MODE. Usar: safe|balanced|aggressive|godmode"; exit 1 ;;
  esac
}

show_help() {
  echo ""
  echo "TITAN v${VERSION} - Android Optimizer"
  echo ""
  echo "USO: sh titan_v51.sh [opciones]"
  echo ""
  echo "MODOS:"
  echo "  --mode=safe          Solo limpieza de cache y ajustes seguros"
  echo "  --mode=balanced      Debloat moderado + optimizaciones (default)"
  echo "  --mode=aggressive    Debloat amplio + tuning de sistema"
  echo "  --mode=godmode       Maxima optimizacion (requiere revision manual)"
  echo ""
  echo "OPCIONES:"
  echo "  --dry-run            Simular sin aplicar cambios"
  echo "  --restore            Restaurar apps deshabilitadas/removidas"
  echo "  --silent             Sin output (solo log)"
  echo "  --no-debloat         Saltar remocion de apps"
  echo "  --no-network         No tocar ajustes de red"
  echo "  --no-perf            No aplicar ajustes de rendimiento"
  echo "  --help               Mostrar esta ayuda"
  echo ""
}

# =============================================================================
# LOGGING Y OUTPUT
# =============================================================================
log_init() {
  mkdir -p "$LOGDIR" "$REPORTDIR" "$BACKUPDIR" 2>/dev/null
  touch "$LOGFILE" 2>/dev/null
}

_log() { echo "$(date '+%Y-%m-%d %H:%M:%S') [$1] $2" >> "$LOGFILE" 2>/dev/null; }
log()  { _log "INFO" "$*"; }
warn() { _log "WARN" "$*"; [ "$SILENT" = "0" ] && echo -e "${Y}[!] $*${NC}"; }
err()  { _log "ERR " "$*"; echo -e "${R}[X] $*${NC}" >&2; }
ok()   { _log "OK  " "$*"; [ "$SILENT" = "0" ] && echo -e "${G}[v] $*${NC}"; }
info() { _log "INFO" "$*"; [ "$VERBOSE" = "1" ] && [ "$SILENT" = "0" ] && echo -e "${C}[.] $*${NC}"; }
say()  { [ "$SILENT" = "0" ] && echo -e "$*"; _log "OUT" "$(echo "$*" | sed 's/\033\[[0-9;]*m//g')"; }

section() {
  say ""
  say "${B}${BOLD}============================================${NC}"
  say "${B}${BOLD}  >> $*${NC}"
  say "${B}${BOLD}============================================${NC}"
}

# Ejecuta un comando, respeta DRY_RUN, loggea resultado
run() {
  log "[CMD] $*"
  if [ "$DRY_RUN" = "1" ]; then
    [ "$VERBOSE" = "1" ] && echo -e "${DIM}  [dry] $*${NC}"
    return 0
  fi
  eval "$*" >> "$LOGFILE" 2>&1
  return $?
}

run_root() {
  if [ "$HAS_ROOT" = "1" ]; then
    run "su -c '$*'"
  else
    log "[SKIP-NOROOT] $*"
    return 1
  fi
}

# =============================================================================
# DETECCION DE CAPACIDADES
# =============================================================================
detect_capabilities() {
  section "Detectando capacidades del sistema"

  ANDROID_VER=$(getprop ro.build.version.release 2>/dev/null || echo "?")
  DEVICE_MODEL=$(getprop ro.product.model 2>/dev/null || echo "?")
  API_LEVEL=$(getprop ro.build.version.sdk 2>/dev/null || echo "0")

  info "Dispositivo : $DEVICE_MODEL"
  info "Android     : $ANDROID_VER (API $API_LEVEL)"

  # Detectar root
  if su -c "id" 2>/dev/null | grep -q "uid=0"; then
    HAS_ROOT=1
    DO_KERNEL=1
    ok "Root disponible -- kernel tuning habilitado"
  else
    warn "Sin root -- se omitiran ajustes de kernel (/proc, /sys)"
  fi

  # RAM total
  TOTAL_RAM_MB=$(awk '/MemTotal/{printf "%d", $2/1024}' /proc/meminfo 2>/dev/null)
  info "RAM total   : ${TOTAL_RAM_MB}MB"

  # API minima
  if [ "$API_LEVEL" -lt 29 ] 2>/dev/null; then
    warn "Android < 10. Algunos comandos pueden no funcionar."
  fi

  # Temperatura
  TEMP=$(cat /sys/class/thermal/thermal_zone0/temp 2>/dev/null || echo "0")
  TEMP_C=$((TEMP / 1000))
  if [ "$TEMP_C" -gt 42 ]; then
    warn "Temperatura alta: ${TEMP_C}C. Se recomienda dejar enfriar el dispositivo."
  else
    info "Temperatura: ${TEMP_C}C -- OK"
  fi

  # Bateria
  BAT=$(dumpsys battery 2>/dev/null | awk -F': ' '/level:/{print $2; exit}')
  if [ -n "$BAT" ]; then
    info "Bateria     : ${BAT}%"
    if [ "$BAT" -lt 15 ] 2>/dev/null; then
      warn "Bateria baja (${BAT}%). Conectar cargador antes de continuar."
      if [ "$MODE" = "godmode" ]; then
        warn "godmode requiere >=15% de bateria. Cambiando a 'aggressive'."
        MODE="aggressive"
      fi
    fi
  fi

  log "Deteccion completa: Root=$HAS_ROOT Android=$ANDROID_VER API=$API_LEVEL RAM=${TOTAL_RAM_MB}MB Temp=${TEMP_C}C"
}

# =============================================================================
# BACKUP DE AJUSTES
# =============================================================================
backup_settings() {
  section "Backup de ajustes actuales"

  if [ -f "$SETTINGS_BACKUP" ]; then
    info "Backup previo encontrado: $SETTINGS_BACKUP"
    return 0
  fi

  info "Guardando ajustes en $SETTINGS_BACKUP..."
  {
    echo "# TITAN v${VERSION} Settings Backup -- $(date)"
    echo "# Restaurar: sh titan_v51.sh --restore"
    echo ""
    for ns in global system secure; do
      echo "# --- $ns ---"
      settings list "$ns" 2>/dev/null | while IFS='=' read -r key val; do
        [ -n "$key" ] && echo "settings put $ns $key '$val'"
      done
      echo ""
    done
  } > "$SETTINGS_BACKUP"
  ok "Backup guardado: $SETTINGS_BACKUP"
}

# =============================================================================
# RESTAURACION
# =============================================================================
do_restore() {
  section "RESTAURANDO CONFIGURACION ANTERIOR"

  # Restaurar ajustes del sistema
  if [ -f "$SETTINGS_BACKUP" ]; then
    info "Restaurando ajustes..."
    grep -v "^#" "$SETTINGS_BACKUP" | while IFS= read -r line; do
      [ -n "$line" ] && run "$line"
    done
    ok "Ajustes del sistema restaurados"
  else
    warn "No se encontro backup de ajustes: $SETTINGS_BACKUP"
  fi

  # Reinstalar apps removidas
  if [ -f "$DEBLOAT_STATE" ]; then
    info "Reinstalando apps removidas..."
    while IFS= read -r pkg; do
      [ -z "$pkg" ] && continue
      if run "pm install-existing --user 0 $pkg 2>/dev/null"; then
        ok "  Reinstalada: $pkg"
      else
        warn "  No se pudo reinstalar: $pkg (puede no existir en el sistema)"
      fi
    done < "$DEBLOAT_STATE"
  fi

  # Rehabilitar apps deshabilitadas
  if [ -f "$DISABLED_STATE" ]; then
    info "Habilitando apps deshabilitadas..."
    while IFS= read -r pkg; do
      [ -z "$pkg" ] && continue
      run "pm enable --user 0 $pkg 2>/dev/null" && ok "  Habilitada: $pkg"
    done < "$DISABLED_STATE"
  fi

  ok "Restauracion completa."
  exit 0
}

is_protected() {
  pkg="$1"
  [ -z "$pkg" ] && return 0
  echo "$PROTECTED" | grep -Fxq "$pkg" && return 0
  case "$pkg" in
    com.android.*)     return 0 ;;
    com.motorola.ccc*) return 0 ;;
    com.qualcomm.*)    return 0 ;;
    com.qti.*)         return 0 ;;
  esac
  return 1
}

append_unique() {
  [ -z "$1" ] || [ -z "$2" ] && return
  grep -Fxq "$2" "$1" 2>/dev/null || echo "$2" >> "$1"
}

# =============================================================================
# DEBLOAT
# =============================================================================
run_debloat() {
  [ "$DO_DEBLOAT" = "0" ] && { info "Debloat salteado (--no-debloat)"; return; }

  section "Debloat de apps -- modo: $MODE"
  : > "$DEBLOAT_STATE"; : > "$DISABLED_STATE"

  removed=0; disabled_c=0

  get_debloat_list | sed '/^[[:space:]]*$/d' | sort -u | while IFS= read -r pkg; do
    pkg=$(echo "$pkg" | tr -d ' \t\r')
    [ -z "$pkg" ] && continue

    if is_protected "$pkg"; then
      log "SKIP (protected): $pkg"; continue
    fi

    if ! pm list packages 2>/dev/null | cut -d: -f2 | grep -Fxq "$pkg"; then
      log "SKIP (not installed): $pkg"; continue
    fi

    if [ "$DRY_RUN" = "1" ]; then
      info "[dry] Removeria: $pkg"; continue
    fi

    if pm uninstall --user 0 "$pkg" >> "$LOGFILE" 2>&1; then
      append_unique "$DEBLOAT_STATE" "$pkg"
      ok "  Removida: $pkg"
    elif pm disable-user --user 0 "$pkg" >> "$LOGFILE" 2>&1; then
      append_unique "$DISABLED_STATE" "$pkg"
      info "  Deshabilitada: $pkg"
    else
      warn "  No se pudo remover: $pkg"
    fi
  done

  ok "Debloat completado"
}

# =============================================================================

# =============================================================================
clean_caches() {
  section "Limpieza de cachés"

  # Trim de cachés via pm (seguro, no root)
  info "Solicitando liberacion de cache de apps..."
  if [ "$DRY_RUN" = "0" ]; then
    pm trim-caches 1073741824 >> "$LOGFILE" 2>&1 || true  # 1GB limite
    am kill-all >> "$LOGFILE" 2>&1 || true
  else
    info "[dry] pm trim-caches 1GB"
    info "[dry] am kill-all"
  fi

  # Archivos temporales en almacenamiento accesible
  info "Limpiando archivos temporales en /sdcard..."
  if [ "$DRY_RUN" = "0" ]; then
    find "/sdcard/Download" -name "*.tmp" -type f -delete 2>/dev/null || true
    find "/sdcard/Download" -name "*.crdownload" -type f -delete 2>/dev/null || true
    find "/sdcard/Android/data" -name "*.log" -type f -size +512k -delete 2>/dev/null || true
  else
    info "[dry] find /sdcard/Download -name '*.tmp' -delete"
    info "[dry] find /sdcard/Android/data -name '*.log' -size +512k -delete"
  fi

  # Con root: cachés del sistema
  if [ "$HAS_ROOT" = "1" ]; then
    info "Limpiando cachés del sistema (root)..."
    run_root "sync && echo 3 > /proc/sys/vm/drop_caches"
    [ "$MODE" != "safe" ] && {
      run_root "rm -rf /data/anr/* 2>/dev/null || true"
      run_root "rm -rf /data/tombstones/* 2>/dev/null || true"
      run_root "rm -rf /data/system/dropbox/* 2>/dev/null || true"
      run_root "rm -rf /data/system/traces/* 2>/dev/null || true"
      run_root "rm -rf /data/resource-cache/* 2>/dev/null || true"
    }
    ok "Cachés del sistema limpias"
  else
    info "Sin root: limpieza de cache limitada al espacio de usuario"
  fi

  ok "Limpieza de cachés completada"
}

# =============================================================================
# OPTIMIZACION SQLite
# =============================================================================
optimize_databases() {
  [ "$MODE" = "safe" ] && return
  [ "$HAS_ROOT" = "0" ] && { info "Optimizacion SQLite requiere root -- salteado"; return; }

  section "Optimización de bases de datos SQLite"
  info "Ejecutando VACUUM + ANALYZE en bases de datos..."

  find /data/data -name "*.db" -type f 2>/dev/null | while IFS= read -r db; do
    [ "$DRY_RUN" = "0" ] && \
      su -c "sqlite3 \"$db\" 'PRAGMA integrity_check; VACUUM; ANALYZE;'" >> "$LOGFILE" 2>&1 || true
  done
  ok "Bases de datos optimizadas"
}

# =============================================================================
# FSTRIM
# =============================================================================
run_fstrim() {
  [ "$MODE" = "safe" ] && return
  [ "$HAS_ROOT" = "0" ] && { info "FSTRIM requiere root -- salteado"; return; }

  section "FSTRIM del almacenamiento"
  info "Ejecutando fstrim en particiones..."
  run_root "fstrim /data 2>/dev/null || true"
  run_root "fstrim /cache 2>/dev/null || true"
  run_root "fstrim /sdcard 2>/dev/null || true"
  ok "FSTRIM completado"
}

# =============================================================================
# AJUSTES DE RENDIMIENTO (via settings, no root)
# =============================================================================
sput() {
  ns="$1"; key="$2"; val="$3"
  log "settings put $ns $key '$val'"
  if [ "$DRY_RUN" = "1" ]; then
    info "[dry] settings put $ns $key '$val'"
    return 0
  fi
  settings put "$ns" "$key" "$val" >> "$LOGFILE" 2>&1
}

run_performance_settings() {
  [ "$DO_PERF" = "0" ] && { info "Performance salteado (--no-perf)"; return; }

  section "Ajustes de rendimiento"

  # Animaciones
  info "Configurando escala de animaciones..."
  case "$MODE" in
    safe)              anim="0.5" ;;
    balanced)          anim="0.35" ;;
    aggressive|godmode) anim="0.0" ;;
  esac
  sput global window_animation_scale "$anim"
  sput global transition_animation_scale "$anim"
  sput global animator_duration_scale "$anim"

  # Tasa de refresco
  info "Configurando tasa de refresco..."
  sput system peak_refresh_rate 120
  case "$MODE" in
    safe|balanced) sput system min_refresh_rate 60 ;;  # Adaptativo (ahorra bateria)
    aggressive|godmode) sput system min_refresh_rate 120 ;;  # 120Hz fijo
  esac

  # Procesos en background
  info "Ajustando procesos en background..."
  case "$MODE" in
    safe) ;;  # No limitar
    balanced)   sput global activity_manager_max_cached_processes 16 ;;
    aggressive) sput global activity_manager_max_cached_processes 12; sput global limit_background_processes 6 ;;
    godmode)    sput global activity_manager_max_cached_processes 8;  sput global limit_background_processes 4 ;;
  esac

  # Overlays / debug
  sput global disable_window_blurs 1
  sput global debug_view_attributes 0
  sput global show_surface_updates 0
  sput global show_cpu_usage 0
  sput global gpu_debug_level 0

  # Feedback tactil
  [ "$MODE" = "godmode" ] && {
    sput system haptic_feedback_enabled 0
    sput system vibrate_on 0
    info "Vibracion deshabilitada en modo godmode"
  }

  # Bateria adaptativa
  case "$MODE" in
    safe|balanced)  sput global adaptive_battery_enabled 1; sput global adaptive_battery 1 ;;
    aggressive)     sput global adaptive_battery_enabled 1; sput global adaptive_battery 1 ;;
    godmode)        sput global adaptive_battery_enabled 0; sput global adaptive_battery 0 ;;
  esac

  # Timeout de touch
  case "$MODE" in
    safe)           sput secure long_press_timeout 500 ;;
    balanced)       sput secure long_press_timeout 400 ;;
    aggressive)     sput secure long_press_timeout 250 ;;
    godmode)        sput secure long_press_timeout 150 ;;
  esac

  # Brillo automatico
  sput system screen_brightness_mode 1

  ok "Ajustes de rendimiento aplicados"
}

# =============================================================================
# AJUSTES DE RED (solo optimizar, NUNCA deshabilitar WiFi/BT/GPS)
# =============================================================================
run_network_settings() {
  [ "$DO_NETWORK" = "0" ] && { info "Red salteado (--no-network)"; return; }

  section "Optimización de red"

  # Reducir frecuencia de escaneo WiFi en background
  info "Optimizando escaneo WiFi..."
  case "$MODE" in
    safe)       sput global wifi_scan_interval_ms 90000 ;;
    balanced)   sput global wifi_scan_interval_ms 180000 ;;
    aggressive|godmode) sput global wifi_scan_interval_ms 300000 ;;
  esac

  # BLE: reducir escaneo continuo en background (godmode/aggressive)
  [ "$MODE" = "aggressive" ] || [ "$MODE" = "godmode" ] && {
    sput global ble_scan_always_enabled 0
    info "Escaneo BLE en background deshabilitado"
  }

  # DNS privado (Cloudflare)
  info "Configurando DNS privado (Cloudflare)..."
  if [ "$DRY_RUN" = "0" ]; then
    settings put global private_dns_mode hostname >> "$LOGFILE" 2>&1 || true
    settings put global private_dns_specifier "1dot1dot1dot1.cloudflare-dns.com" >> "$LOGFILE" 2>&1 || true
  else
    info "[dry] DNS privado -> 1dot1dot1dot1.cloudflare-dns.com"
  fi

  ok "Red optimizada"
}

# =============================================================================
# KERNEL TUNING (solo con root)
# =============================================================================
run_kernel_tuning() {
  [ "$DO_KERNEL" = "0" ] && return
  [ "$HAS_ROOT" = "0" ] && return
  [ "$MODE" = "safe" ] && return

  section "Kernel tuning (root)"

  # CPU governor
  info "Configurando CPU governor..."
  for cpu in /sys/devices/system/cpu/cpu*/cpufreq; do
    [ -d "$cpu" ] || continue
    AVAIL_GOV=$(cat "$cpu/scaling_available_governors" 2>/dev/null || echo "")
    if echo "$AVAIL_GOV" | grep -q "schedutil"; then
      GOV="schedutil"
    elif echo "$AVAIL_GOV" | grep -q "interactive"; then
      GOV="interactive"
    elif echo "$AVAIL_GOV" | grep -q "ondemand"; then
      GOV="ondemand"
    else
      continue
    fi
    # godmode: performance governor para maxima velocidad
    [ "$MODE" = "godmode" ] && echo "$AVAIL_GOV" | grep -q "performance" && GOV="performance"
    run_root "echo $GOV > $cpu/scaling_governor 2>/dev/null || true"
    [ "$MODE" = "godmode" ] && {
      MAX=$(cat "$cpu/cpuinfo_max_freq" 2>/dev/null || echo "")
      [ -n "$MAX" ] && run_root "echo $MAX > $cpu/scaling_max_freq 2>/dev/null || true"
    }
  done

  # VM / swappiness
  info "Ajustando VM (swappiness, cache pressure)..."
  case "$MODE" in
    balanced)   run_root "echo 40 > /proc/sys/vm/swappiness 2>/dev/null || true" ;;
    aggressive) run_root "echo 20 > /proc/sys/vm/swappiness 2>/dev/null || true" ;;
    godmode)    run_root "echo 10 > /proc/sys/vm/swappiness 2>/dev/null || true" ;;
  esac
  run_root "echo 80 > /proc/sys/vm/vfs_cache_pressure 2>/dev/null || true"
  run_root "echo 10 > /proc/sys/vm/dirty_ratio 2>/dev/null || true"
  run_root "echo 5  > /proc/sys/vm/dirty_background_ratio 2>/dev/null || true"
  run_root "echo 3000 > /proc/sys/vm/dirty_writeback_centisecs 2>/dev/null || true"

  # I/O scheduler
  info "Ajustando I/O scheduler..."
  for blk in /sys/block/sda /sys/block/mmcblk0; do
    [ -d "$blk/queue" ] || continue
    AVAIL_SCHED=$(cat "$blk/queue/scheduler" 2>/dev/null || echo "")
    if echo "$AVAIL_SCHED" | grep -q "mq-deadline"; then
      run_root "echo mq-deadline > $blk/queue/scheduler 2>/dev/null || true"
    elif echo "$AVAIL_SCHED" | grep -q "none"; then
      run_root "echo none > $blk/queue/scheduler 2>/dev/null || true"
    fi
    run_root "echo 512 > $blk/queue/read_ahead_kb 2>/dev/null || true"
    run_root "echo 0   > $blk/queue/add_random 2>/dev/null || true"
  done

  # TCP (aggressive/godmode)
  if [ "$MODE" = "aggressive" ] || [ "$MODE" = "godmode" ]; then
    info "Ajustando parametros TCP..."
    run_root "echo bbr > /proc/sys/net/ipv4/tcp_congestion_control 2>/dev/null || true"
    run_root "echo 1   > /proc/sys/net/ipv4/tcp_low_latency 2>/dev/null || true"
    run_root "echo 4096 131072 16777216 > /proc/sys/net/ipv4/tcp_rmem 2>/dev/null || true"
    run_root "echo 4096 65536 16777216  > /proc/sys/net/ipv4/tcp_wmem 2>/dev/null || true"
  fi

  ok "Kernel tuning completado"
}

# =============================================================================
# DEX OPTIMIZATION
# =============================================================================
run_dex_optimization() {
  [ "$MODE" = "safe" ] && return

  section "Optimización DEX (dex2oat)"
  info "Compilando apps con speed-profile..."
  if [ "$DRY_RUN" = "0" ]; then
    cmd package compile -m speed-profile -a >> "$LOGFILE" 2>&1 || \
      pm compile -m speed-profile -a >> "$LOGFILE" 2>&1 || \
      warn "dex2oat no disponible en este dispositivo/usuario"
    ok "DEX optimization completada"
  else
    info "[dry] cmd package compile -m speed-profile -a"
  fi
}

# =============================================================================
# SNAPSHOT DE METRICAS REALES
# =============================================================================
get_snapshot() {
  label="$1"
  {
    echo "=== SNAPSHOT: $label -- $(date) ==="
    echo ""
    echo "--- Memoria ---"
    cat /proc/meminfo 2>/dev/null | head -8
    echo ""
    echo "--- Almacenamiento ---"
    df -h /sdcard 2>/dev/null || df -h /data 2>/dev/null
    echo ""
    echo "--- Procesos activos ---"
    ps 2>/dev/null | wc -l | xargs echo "Total procesos:"
    echo ""
    echo "--- Bateria ---"
    dumpsys battery 2>/dev/null | grep -E "level|status|health|temperature"
    echo ""
    echo "--- CPU freq actual ---"
    for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_cur_freq; do
      [ -f "$cpu" ] && cat "$cpu" | xargs echo "  $cpu:"
    done 2>/dev/null
    echo ""
  }
}

# =============================================================================
# REPORTE FINAL
# =============================================================================
generate_report() {
  section "Generando reporte final"

  REMOVED_COUNT=0; DISABLED_COUNT=0
  [ -f "$DEBLOAT_STATE" ]  && REMOVED_COUNT=$(grep -c . "$DEBLOAT_STATE" 2>/dev/null || echo 0)
  [ -f "$DISABLED_STATE" ] && DISABLED_COUNT=$(grep -c . "$DISABLED_STATE" 2>/dev/null || echo 0)

  {
    echo "============================================================"
    echo "   TITAN v${VERSION} -- Reporte de Optimizacion"
    echo "============================================================"
    echo ""
    echo "Dispositivo    : $DEVICE_MODEL"
    echo "Android        : $ANDROID_VER (API $API_LEVEL)"
    echo "Modo           : $MODE"
    echo "Root           : $([ $HAS_ROOT -eq 1 ] && echo SI || echo NO)"
    echo "Dry run        : $([ $DRY_RUN -eq 1 ] && echo SI || echo NO)"
    echo "Fecha          : $(date)"
    echo ""
    echo "-- Resultados -----------------------------------------"
    echo "Apps removidas     : $REMOVED_COUNT"
    echo "Apps deshabilitadas: $DISABLED_COUNT"
    echo ""
    echo "-- Apps removidas -------------------------------------"
    [ -f "$DEBLOAT_STATE" ] && cat "$DEBLOAT_STATE" || echo "(ninguna)"
    echo ""
    echo "-- Apps deshabilitadas --------------------------------"
    [ -f "$DISABLED_STATE" ] && cat "$DISABLED_STATE" || echo "(ninguna)"
    echo ""
    echo "-- Optimizaciones aplicadas ---------------------------"
    echo "[v] Cachés limpiadas"
    [ "$DO_PERF" = "1" ]    && echo "[v] Ajustes de rendimiento"
    [ "$DO_NETWORK" = "1" ] && echo "[v] Red optimizada (DNS Cloudflare)"
    [ "$DO_DEBLOAT" = "1" ] && echo "[v] Debloat ejecutado"
    [ "$HAS_ROOT" = "1" ]   && echo "[v] Kernel tuning (root)"
    [ "$MODE" != "safe" ]   && echo "[v] DEX optimization"
    [ "$HAS_ROOT" = "1" ] && [ "$MODE" != "safe" ] && echo "[v] FSTRIM + SQLite VACUUM"
    echo ""
    echo "-- Archivos de backup ---------------------------------"
    echo "Ajustes  : $SETTINGS_BACKUP"
    echo "Apps     : $DEBLOAT_STATE"
    echo "Log      : $LOGFILE"
    echo ""
    echo "-- Para restaurar -------------------------------------"
    echo "  sh titan_v51.sh --restore"
    echo ""
    echo "============================================================"
  } > "$REPORT_FILE"

  say ""
  cat "$REPORT_FILE"
}

# =============================================================================
# BANNER
# =============================================================================
banner() {
  say ""
  say "${W}${BOLD}╔══════════════════════════════════════════════╗${NC}"
  say "${W}${BOLD}║     ${R}TITAN v${VERSION}${W} -- Android Optimizer        ║${NC}"
  say "${W}${BOLD}║     Modo: ${Y}${MODE}${W}$(printf '%*s' $((24-${#MODE})) '')║${NC}"
  say "${W}${BOLD}╚══════════════════════════════════════════════╝${NC}"
  [ "$DRY_RUN" = "1" ] && say "${Y}${BOLD}  [!] DRY RUN -- No se aplicaran cambios${NC}"
  say ""
}

# =============================================================================
# MAIN
# =============================================================================
main() {
  parse_args "$@"
  log_init
  banner

  [ "$DO_RESTORE" = "1" ] && do_restore

  detect_capabilities

  # Snapshot antes de optimizar
  SNAP_BEFORE=$(get_snapshot "ANTES")

  backup_settings

  # Confirmacion en godmode
  if [ "$MODE" = "godmode" ] && [ "$DRY_RUN" = "0" ]; then
    say ""
    say "${R}${BOLD}[!] ATENCION: Modo GODMODE${NC}"
    say "${Y}  Se aplicaran cambios agresivos de sistema.${NC}"
    say "${Y}  Backup guardado en: $SETTINGS_BACKUP${NC}"
    say "${Y}  Para restaurar: sh titan_v51.sh --restore${NC}"
    say ""
    say "${Y}  Continuando en 5 segundos (Ctrl+C para cancelar)...${NC}"
    sleep 5
  fi

  # Pipeline de optimizacion
  say ""
  say "${B}${BOLD}-- INICIANDO PIPELINE DE OPTIMIZACION [modo: $MODE] --${NC}"

  clean_caches
  optimize_databases
  run_fstrim
  [ "$DO_PERF" = "1" ]    && run_performance_settings
  [ "$DO_NETWORK" = "1" ] && run_network_settings
  run_kernel_tuning
  [ "$MODE" != "safe" ]   && run_dex_optimization
  [ "$DO_DEBLOAT" = "1" ] && run_debloat

  # Snapshot despues
  SNAP_AFTER=$(get_snapshot "DESPUES")
  printf "%s\n\n%s\n" "$SNAP_BEFORE" "$SNAP_AFTER" >> "$REPORT_FILE" 2>/dev/null

  generate_report

  say ""
  say "${G}${BOLD}============================================${NC}"
  say "${G}${BOLD}  TITAN v${VERSION} finalizado correctamente${NC}"
  say "${G}${BOLD}  Log: $LOGFILE${NC}"
  say "${G}${BOLD}============================================${NC}"
  say ""
}

main "$@"</script>

  <script>
    const titanEl = document.getElementById('titanScript');
    const codeEl = document.getElementById('codeBlock');
    const linesEl = document.getElementById('linesCount');
    const toastEl = document.getElementById('toast');
    const toastTextEl = document.getElementById('toastText');
    const searchInputEl = document.getElementById('searchInput');

    function getRawScript() {
      return (titanEl?.textContent || '').replace(/\r\n/g, '\n').trimEnd();
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showToast(msg) {
      toastTextEl.textContent = msg;
      toastEl.classList.remove('opacity-0', 'pointer-events-none');
      toastEl.classList.add('opacity-100');
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => {
        toastEl.classList.add('opacity-0', 'pointer-events-none');
        toastEl.classList.remove('opacity-100');
      }, 1200);
    }

    async function copyText(txt, msg) {
      if (!txt) return showToast('NO HAY TEXTO PARA COPIAR');
      try {
        await navigator.clipboard.writeText(txt);
        showToast(msg || 'COPIADO');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = txt;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(msg || 'COPIADO');
      }
    }

    function render(raw, query = '') {
      const lines = raw.split('\n');
      linesEl.textContent = `Lines: ${lines.length}`;

      const q = (query || '').trim();
      const qRe = q ? new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi') : null;

      const html = lines.map((line, i) => {
        let safe = escapeHtml(line);
        if (qRe) {
          safe = safe.replace(qRe, m => `<mark class="bg-god-500/30 text-god-400 px-0.5">${m}</mark>`);
        }
        return `<span class="line-num">${String(i + 1).padStart(3, ' ')}</span>${safe}`;
      }).join('\n');

      codeEl.innerHTML = html;
    }

    window.copyRaw = function () {
      copyText(getRawScript(), 'SCRIPT COPIADO');
    };

    window.highlightSearch = function () {
      render(getRawScript(), searchInputEl?.value || '');
    };

    (function init() {
      const raw = getRawScript();
      if (!raw) {
        codeEl.textContent = 'No se encontro contenido en #titanScript.';
        linesEl.textContent = 'Lines: 0';
        return;
      }
      render(raw, '');
    })();
  </script>
</body>
</html>
