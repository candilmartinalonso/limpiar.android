  <!-- ✅ TITAN v27 ULTRA PRO Script RAW -->
  <script id="titanScript" type="text/plain">#!/system/bin/sh
#===============================================================================
# TITAN v27 ULTRA PRO (NO-ROOT / ADB SAFE) - OPTIMIZADO EXTREMO
# Mejoras vs v26:
#  - Animaciones ultra-rápidas (0.1x-0.25x granular)
#  - Tweaks avanzados: touch latency, GPU, performance mode, background limits
#  - Limpieza expandida: más dirs, app caches individuales, logs system
#  - RAM agresiva: limit background, memory factor critical
#  - Compilación: lista ampliada + verify-apps post-update simulado
#  - Fluidez extra: haptic feedback off, font scale, doze aggressive
#  - Update check: lista apps desactualizadas (no actualiza auto, sugiere)
#  - Sistema: chequea OTA, limpia dalvik-cache si posible
#  - Modo ULTRA: todo activado, confirmación por fase
# Uso: adb shell sh /sdcard/Download/titan_v27.sh --ultra
#===============================================================================

# ---------------------------
# Colores y Config (mejorado)
# ---------------------------
R='\u001B[0;31m'; G='\u001B[0;32m'; Y='\u001B[1;33m'; C='\u001B[0;36m'; P='\u001B[0;35m'; B='\u001B[0;34m'; NC='\u001B[0m'

DRY_RUN=0; ASK_CONFIRM=1; VERBOSE=1; MODE="run"; PROFILE="ultra"; PLAN_ONLY=0
DAYS_OLD=7; MIN_SIZE_KB=16; DOWNLOAD_MAXDEPTH=2
JUNK_EXTS="tmp log bak old ~ swp part crdownload crx dmp sav shm sql journal lock"
SDCARD_TRASH_DIRS="
/sdcard/Download
/sdcard/DCIM/.thumbnails
/sdcard/Pictures/.thumbnails
/sdcard/Movies/.thumbnails
/sdcard/Android/media/*/*/cache
/sdcard/Android/media/*/*/tmp
/sdcard/Telegram/Telegram Video/.cache
/sdcard/Telegram/Telegram Images/.cache
/sdcard/Telegram/Telegram Documents/.cache
/sdcard/WhatsApp/Media/.Statuses  # Status viejos
/sdcard/Android/data/*/cache      # Intentar más agresivo
/sdcard/LOST.DIR                  # Recuperación fallida
"

EXCLUDE_LIST="/sdcard/Download/keep /sdcard/Download/NO_BORRAR /sdcard/Download/*.apk"

# Fluidez ULTRA
ANIM_SCALE="0.15"; TOUCH_TIMEOUT=150; POINTER_SPEED="7"
TITAN_ULTRA_TWEAKS=1  # Touch, GPU, etc.

# RAM agresiva
TITAN_AGGRESSIVE_RAM=1
BG_LIMIT=2  # Procesos background

# Compilación expandida
COMPILE_MODE="smart-ultra"
SMART_COMPILE_LIST_ULTRA="
com.whatsapp
com.instagram.android
com.google.android.youtube
com.google.android.gms
com.android.chrome
com.google.android.googlequicksearchbox
com.facebook.katana
com.snapchat.android
com.tiktok.musically
com.netflix.mediaclient
com.spotify.music
org.telegram.messenger
com.discord
"

# Updates check
CHECK_UPDATES=1

# Logs
LOGDIR="/sdcard/Download"; LOGFILE="${LOGDIR}/titan_v27.log"; STATEFILE="${LOGDIR}/titan_state_v27.conf"; LOG_ROTATE=5

# ---------------------------
# Args (nuevos: --ultra)
# ---------------------------
for arg in "$@"; do
  case "$arg" in
    --dry-run) DRY_RUN=1 ;;
    --yes) ASK_CONFIRM=0 ;;
    --quiet) VERBOSE=0 ;;
    --restore) MODE="restore" ;;
    --plan) PLAN_ONLY=1; DRY_RUN=1 ;;
    --quick) PROFILE="quick" ;;
    --full) PROFILE="full" ;;
    --ultra) PROFILE="ultra"; COMPILE_MODE="smart-ultra"; TITAN_AGGRESSIVE_RAM=1; TITAN_ULTRA_TWEAKS=1 ;;
    --compile-all) COMPILE_MODE="all" ;;
    --compile-none) COMPILE_MODE="none" ;;
  esac
done

# Perfiles ajustados
case "$PROFILE" in
  quick) DAYS_OLD=30; MIN_SIZE_KB=256; TITAN_AGGRESSIVE_RAM=0; TITAN_ULTRA_TWEAKS=0 ;;
  full) DAYS_OLD=5; MIN_SIZE_KB=8 ;;
  ultra) DAYS_OLD=3; MIN_SIZE_KB=4; ANIM_SCALE="0.1"; TOUCH_TIMEOUT=100 ;;
esac

# Helpers (mejorados)
strip_ansi() { sed 's/\u001B[[0-9;]*m//g'; }
log_init() { : > "$LOGFILE" 2>/dev/null; }
log() { echo "$(date '+%F %T') | $*" >> "$LOGFILE" 2>/dev/null; }
say() { [ "$VERBOSE" = "1" ] && echo -e "$*"; echo -e "$*" | strip_ansi | log; }
run() {
  if [ "$DRY_RUN" = "1" ]; then say "${C}[dry] $*${NC}"; return 0; fi
  sh -c "$*" >> "$LOGFILE" 2>&1; return $?
}
exists() { command -v "$1" >/dev/null 2>&1; }
getprop_safe() { getprop "$1" 2>/dev/null; }
get_sdk() { getprop_safe ro.build.version.sdk; }
human_kb() { awk -v k="$1" 'BEGIN{printf "%.1f MB", k/1024}'; }
avail_kb_path() { p="$1"; df -k "$p" 2>/dev/null | awk 'NR==2{print $4}'; }
sd_avail_kb() { df -k /sdcard 2>/dev/null | awk 'NR==2{print $4}'; }
confirm_or_exit() {
  [ "$ASK_CONFIRM" = "0" ] || [ "$DRY_RUN" = "1" ] && return 0
  echo -e "${Y}${1} (y/N)? ${NC}"; read ans
  [ "$ans" = "y" ] || [ "$ans" = "Y" ] || { say "${Y}[!] Cancelado.${NC}"; exit 0; }
}
rotate_logs() {
  i="$LOG_ROTATE"; while [ "$i" -ge 1 ]; do
    prev=$((i-1))
    [ "$prev" -eq 0 ] && [ -f "$LOGFILE" ] && mv -f "$LOGFILE" "${LOGFILE}.${i}"
    [ -f "${LOGFILE}.${prev}" ] && mv -f "${LOGFILE}.${prev}" "${LOGFILE}.${i}"
    i=$((i-1))
  done
}

# ---------------------------
# Banner actualizado (placeholders)
# ---------------------------
rotate_logs; log_init
SDK="$(get_sdk)"; MODEL="$(getprop_safe ro.product.model)"
say "${Y} ████████╗ ... ${C}[TITAN v27 ULTRA PRO]${NC}"
say "${P}[i] Perfil: ${PROFILE} | Ultra tweaks: ${TITAN_ULTRA_TWEAKS}${NC}"

#===============================================================================
# FASE NUEVA: CHECK UPDATES (no actualiza auto, chequea y lista)
#===============================================================================
check_updates() {
  say "
${P}[🔄] FASE 0: CHECK UPDATES${NC}"
  if [ "$CHECK_UPDATES" = "1" ] && exists pm; then
    say "${C}[i] Listando apps con updates disponibles:${NC}"
    run "pm list packages -3 | while read pkg; do pm dump $pkg | grep versionCode | awk '{print $pkg}' 2>/dev/null; done" || say "${Y}[!] No disponible.${NC}"
    say "${C}[i] Usa Play Store o Aurora para actualizar. No auto-update por seguridad.${NC}"
  fi
  say "${G}[✓] Check listo.${NC}"
}

#===============================================================================
# DIAGNÓSTICO MEJORADO
#===============================================================================
diagnostics_ultra() {
  say "
${P}[🧪] DIAGNÓSTICO ULTRA${NC}"
  if exists du; then
    say "${C}Top 20 pesados:${NC}"; run "du -sk /sdcard/* 2>/dev/null | sort -nr | head -20"
  fi
  if exists dumpsys; then
    say "${C}Meminfo + CPU:${NC}"; run "dumpsys meminfo | head -50; top -n1 | head -20" 2>/dev/null || true
  fi
  say "${G}[✓] Listo.${NC}"
}

#===============================================================================
# SAFE CLEAN ULTRA (placeholders list_download_junk/sum_bytes_from_stdin/bytes_to_mb)
#===============================================================================
safe_clean_ultra() {
  say "
${P}[🧹] FASE 1: CLEAN ULTRA${NC}"
  run "pm trim-caches 999G" && say "${G}[✓] Trim-caches.${NC}"

  CAND_COUNT="$(list_download_junk | wc -l)"; EST_BYTES="$(list_download_junk | sum_bytes_from_stdin)"
  say "${C}Candidatos: ${CAND_COUNT} ($(bytes_to_mb $EST_BYTES))${NC}"

  run "find /sdcard/Download -maxdepth $DOWNLOAD_MAXDEPTH -type f \\( $(echo $JUNK_EXTS | sed 's/ / -o -name *./g' | sed 's/^/ -name *./') \\) -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -delete"

  echo "$SDCARD_TRASH_DIRS" | while read d; do
    [ -e "$d" ] && run "find '$d' -type f -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -delete" && say "${G}[✓] $d${NC}"
  done

  run "pm list packages | while read pkg; do pm trim-caches $pkg 1G 2>/dev/null; done" && say "${G}[✓] App caches.${NC}"
  say "${G}[✓] CLEAN ULTRA.${NC}"
}

#===============================================================================
# RAM AGRESIVA
#===============================================================================
ram_ultra() {
  say "
${P}[💾] FASE 2: RAM ULTRA${NC}"
  [ "$TITAN_AGGRESSIVE_RAM" != "1" ] && { say "${C}[i] Modo safe.${NC}"; return; }
  run "cmd activity memory-factor critical"
  run "settings put global always_finish_activities 1"
  run "settings put global limit_background_processes $BG_LIMIT"
  say "${G}[✓] RAM agresiva.${NC}"
}

#===============================================================================
# FLUIDEZ ULTRA
#===============================================================================
fluidity_ultra() {
  say "
${P}[⚡] FASE 3: FLUIDEZ ULTRA${NC}"

  run "settings put global window_animation_scale $ANIM_SCALE"
  run "settings put global transition_animation_scale $ANIM_SCALE"
  run "settings put global animator_duration_scale $ANIM_SCALE"
  say "${G}[✓] Anim: ${ANIM_SCALE}x${NC}"

  [ "$TITAN_ULTRA_TWEAKS" = "1" ] && {
    run "settings put secure long_press_timeout $TOUCH_TIMEOUT"
    run "settings put secure multi_press_timeout $TOUCH_TIMEOUT"
    run "settings put system pointer_speed $POINTER_SPEED"
    run "settings put secure haptic_feedback_enabled 0"
    run "settings put system font_scale 0.85"
    run "cmd power set-fixed-performance-mode-enabled true" 2>/dev/null
    run "setprop debug.force-opengl 1"
    run "setprop debug.hwc.force_gpu_vsync 1"
    say "${G}[✓] Touch/GPU tweaks.${NC}"
  }

  say "${G}[✓] Fluidez ULTRA.${NC}"
}

#===============================================================================
# MAINTENIMIENTO ULTRA
#===============================================================================
maintenance_ultra() {
  say "
${P}[🔧] FASE 4: MAINT ULTRA${NC}"
  if [ "$COMPILE_MODE" != "none" ] && exists "cmd"; then
    if [ "$COMPILE_MODE" = "all" ]; then
      confirm_or_exit "Compilar ALL (lento)?"; run "cmd package compile -m speed-profile -f all"
    else
      echo "$SMART_COMPILE_LIST_ULTRA" | while read pkg; do
        run "cmd package compile -m speed-profile -f $pkg" && say "${G}[✓] $pkg${NC}"
      done
    fi
    say "${G}[✓] Compilación.${NC}"
  fi

  run "pm dexopt-job" 2>/dev/null && say "${G}[✓] Dexopt.${NC}"
  say "${C}[i] Chequea Ajustes > Sistema > Actualización para OTA.${NC}"
  say "${G}[✓] Mantenimiento.${NC}"
}

#===============================================================================
# MAIN ULTRA (placeholders restore_settings)
#===============================================================================
if [ "$MODE" = "restore" ]; then restore_settings; exit 0; fi

check_updates
diagnostics_ultra
safe_clean_ultra
ram_ultra
fluidity_ultra
maintenance_ultra

say "
${G}[🎉] TITAN v27 ULTRA: COMPLETADO! Reinicia para max fluidez.${NC}"
say "${C}[i] --restore para revertir. Log: $LOGFILE${NC}"
exit 0
</script>

  <!-- ✅ JS de render/copy/search (CORREGIDO) -->
  <script>
    const titanEl = document.getElementById('titanScript');
    const codeEl = document.getElementById('codeBlock');
    const linesEl = document.getElementById('linesCount');
    const toastEl = document.getElementById('toast');
    const toastTextEl = document.getElementById('toastText');
    const searchInputEl = document.getElementById('searchInput');

    function getRawScript() {
      // textContent es clave para type="text/plain"
      return (titanEl?.textContent || '').replace(/\r\n/g, '\n').trimEnd();
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showToast(msg) {
      toastTextEl.textContent = msg;
      toastEl.classList.remove('opacity-0', 'pointer-events-none');
      toastEl.classList.add('opacity-100');
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => {
        toastEl.classList.add('opacity-0', 'pointer-events-none');
        toastEl.classList.remove('opacity-100');
      }, 1200);
    }

    async function copyText(txt, msg) {
      if (!txt) return showToast('NO HAY TEXTO PARA COPIAR');
      try {
        await navigator.clipboard.writeText(txt);
        showToast(msg || 'COPIADO');
      } catch {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = txt;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(msg || 'COPIADO');
      }
    }

    function render(raw, query = '') {
      const lines = raw.split('\n');
      linesEl.textContent = `Lines: ${lines.length}`;

      const q = (query || '').trim();
      const qRe = q ? new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi') : null;

      const html = lines.map((line, i) => {
        let safe = escapeHtml(line);
        if (qRe) {
          safe = safe.replace(qRe, m => `<mark class="bg-god-500/30 text-god-400 px-0.5">${m}</mark>`);
        }
        return `<span class="line-num">${String(i + 1).padStart(3, ' ')}</span>${safe}`;
      }).join('\n');

      codeEl.innerHTML = html;
    }

    // Expuestas para tus botones
    window.copyRaw = function () {
      const raw = getRawScript();
      copyText(raw, 'SCRIPT COPIADO');
    };

    window.copyOneLiner = function () {
      // One-liner recomendado (ajustá el nombre si lo guardás distinto)
      const cmd = `adb shell sh /sdcard/Download/titan_v27.sh --ultra`;
      copyText(cmd, 'COMANDO ADB COPIADO');
    };

    window.highlightSearch = function () {
      render(getRawScript(), searchInputEl?.value || '');
    };

    // Render inicial
    (function init() {
      const raw = getRawScript();
      if (!raw) {
        codeEl.textContent = '⚠️ No se encontró contenido en #titanScript (vacío).';
        linesEl.textContent = 'Lines: 0';
        return;
      }
      render(raw, '');
    })();
  </script>
