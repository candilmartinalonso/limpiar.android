    <!-- ✅ Script RAW sin template literal: evita que JS interprete ${...} -->
    <script id="titanScript" type="text/plain">#!/system/bin/sh
#===============================================================================
# TITAN v25 PRO (NO-ROOT / ADB SAFE)
# Optimización segura para Android usando usuario "shell" (ADB), sin root.
#
# Novedades vs v24:
#  - Log + reporte final (antes/después)
#  - DRY-RUN (no borra, solo muestra) + confirmación
#  - Limpieza inteligente por antigüedad y tamaño
#  - Detección de Android (SDK) + avisos por scoped storage
#  - Modo RESTORE de animaciones (vuelve a valores guardados)
#  - Diagnóstico opcional (top almacenamiento / paquetes grandes)
#  - Bloatware opcional (MANUAL, lista comentada por defecto)
#
# Uso recomendado (ADB):
#   adb shell sh /sdcard/Download/titan_v25.sh
#   adb shell sh /sdcard/Download/titan_v25.sh --dry-run
#   adb shell sh /sdcard/Download/titan_v25.sh --restore
#
#===============================================================================

# ---------------------------
# Colores
# ---------------------------
R='\033[0;31m'; G='\033[0;32m'; Y='\033[1;33m'; C='\033[0;36m'; P='\033[0;35m'; NC='\033[0m'

# ---------------------------
# CONFIG (editá si querés)
# ---------------------------

# Seguridad / interacción
DRY_RUN=0            # 1 = NO borra, solo imprime qué haría
ASK_CONFIRM=1        # 1 = pide confirmación si va a borrar
VERBOSE=1            # 1 = más salida por pantalla

# Limpieza Download: solo extensiones típicas + filtros por edad/tamaño
DAYS_OLD=14          # borra basura si tiene más de X días
MIN_SIZE_KB=64       # borra basura si pesa más de X KB
DOWNLOAD_MAXDEPTH=1  # profundidad en /sdcard/Download

# Android/data cache: Android 11+ puede bloquear (scoped storage)
TITAN_TRY_ANDROID_DATA_CACHE=1

# Fluidez: animaciones + ajustes
TITAN_DISABLE_ANIMATIONS=1
ANIM_SCALE="0.5"     # 0, 0.5, 1 (recomendado 0.5)
SET_LONG_PRESS_TIMEOUT=1
LONG_PRESS_TIMEOUT_MS=250
SET_POINTER_SPEED=1
POINTER_SPEED=7

# RAM / procesos (por defecto seguro)
TITAN_AGGRESSIVE_RAM=0    # 1 ejecuta am kill-all (agresivo)

# Mantenimiento: compile
ENABLE_SPEED_PROFILE=1     # intenta cmd package compile
COMPILE_ALL=1              # 1 = all, 0 = solo lista grande sugerida abajo
COMPILE_LIST="
# com.whatsapp
# com.instagram.android
# com.google.android.youtube
"

# Diagnóstico opcional
ENABLE_DIAGNOSTICS=1
TOP_DU_COUNT=15            # top carpetas pesadas en /sdcard
TOP_PACKAGES_COUNT=15      # top paquetes por size (si dumpsys lo da)

# Bloatware opcional (MANUAL, con lista por defecto comentada)
BLOAT_MODE=0               # 1 = aplica disable-user a los paquetes listados
BLOAT_ACTION="disable"     # "disable" o "uninstall" (uninstall --user 0)
BLOAT_LIST="
# EJEMPLOS (NO ACTIVAR SIN SABER QUÉ SON):
# com.facebook.appmanager
# com.facebook.services
# com.facebook.system
"

# Paths / archivos
LOGFILE="/sdcard/Download/titan_v25.log"
STATEFILE="/sdcard/Download/titan_state_v25.conf"   # guarda valores previos para restore

# ---------------------------
# Args
# ---------------------------
MODE="run"
for arg in "$@"; do
  case "$arg" in
    --dry-run) DRY_RUN=1 ;;
    --restore) MODE="restore" ;;
    --yes) ASK_CONFIRM=0 ;;
    --quiet) VERBOSE=0 ;;
  esac
done

# ---------------------------
# Helpers
# ---------------------------
strip_ansi() { sed 's/\x1b\[[0-9;]*m//g'; }

log_init() { : > "$LOGFILE" 2>/dev/null; }
log() { echo "$(date '+%F %T') | $*" >> "$LOGFILE" 2>/dev/null; }

say() {
  # imprime y loguea (sin ANSI)
  if [ "$VERBOSE" = "1" ]; then
    echo -e "$*"
  fi
  echo -e "$*" | strip_ansi | log
}

run() {
  # Ejecuta comando con DRY_RUN y logging
  if [ "$DRY_RUN" = "1" ]; then
    say "${C}[dry] $*${NC}"
    return 0
  fi
  sh -c "$*" >> "$LOGFILE" 2>&1
  return $?
}

getprop_safe() { getprop "$1" 2>/dev/null; }

get_sdk() { getprop_safe ro.build.version.sdk; }
get_model() { getprop_safe ro.product.model; }
get_manu() { getprop_safe ro.product.manufacturer; }

human_kb() { awk -v k="$1" 'BEGIN{printf "%.1f MB", k/1024}'; }

avail_kb_data() {
  # df puede variar, intentamos /data y si falla, devolvemos vacío
  df -k /data 2>/dev/null | awk 'NR==2{print $4}'
}

count_download_candidates() {
  find /sdcard/Download -maxdepth "$DOWNLOAD_MAXDEPTH" -type f \
    \( -name "*.tmp" -o -name "*.log" -o -name "*.bak" -o -name "*.old" \) \
    -mtime +"$DAYS_OLD" -size +"${MIN_SIZE_KB}k" 2>/dev/null | wc -l
}

list_download_candidates() {
  find /sdcard/Download -maxdepth "$DOWNLOAD_MAXDEPTH" -type f \
    \( -name "*.tmp" -o -name "*.log" -o -name "*.bak" -o -name "*.old" \) \
    -mtime +"$DAYS_OLD" -size +"${MIN_SIZE_KB}k" -print 2>/dev/null
}

save_state() {
  # Guarda valores actuales para restore
  # Si settings get falla, guardamos vacío.
  W="$(settings get global window_animation_scale 2>/dev/null)"
  T="$(settings get global transition_animation_scale 2>/dev/null)"
  A="$(settings get global animator_duration_scale 2>/dev/null)"
  LP="$(settings get secure long_press_timeout 2>/dev/null)"
  PS="$(settings get system pointer_speed 2>/dev/null)"

  cat > "$STATEFILE" 2>/dev/null <<EOF
# TITAN v25 state (para --restore)
window_animation_scale=${W}
transition_animation_scale=${T}
animator_duration_scale=${A}
long_press_timeout=${LP}
pointer_speed=${PS}
EOF
}

load_state() {
  # Carga valores previos si existe
  [ -f "$STATEFILE" ] || return 1
  # shellcheck disable=SC1090
  . "$STATEFILE" 2>/dev/null
  return 0
}

confirm_or_exit() {
  # $1 mensaje
  msg="$1"
  [ "$ASK_CONFIRM" = "0" ] && return 0
  if [ "$DRY_RUN" = "1" ]; then
    # en dry-run no hace falta confirmar
    return 0
  fi
  echo -e "${Y}${msg} (y/N)${NC} \c"
  read ans
  if [ "$ans" != "y" ] && [ "$ans" != "Y" ]; then
    say "${Y}[!] Cancelado por el usuario${NC}"
    exit 0
  fi
}

# ---------------------------
# Banner
# ---------------------------
log_init
SDK="$(get_sdk)"
MANU="$(get_manu)"
MODEL="$(get_model)"
UID="$(id -u 2>/dev/null)"
USERINFO="$(id 2>/dev/null | tr '\n' ' ')"

say "${Y}"
say "    ████████╗██╗████████╗ █████╗ ███╗    ██╗"
say "    ╚══██╔══╝██║╚══██╔══╝██╔══██╗████╗  ██║"
say "       ██║   ██║   ██║   ███████║██╔██╗ ██║"
say "       ██║   ██║   ██║   ██╔══██║██║╚██╗██║"
say "       ██║   ██║   ██║   ██║  ██║██║ ╚████║"
say "       ╚═╝   ╚═╝   ╚═╝   ╚═╝  ╚═╝╚═╝  ╚═══╝"
say -e "${C}        [TITAN v25 PRO - NO ROOT / ADB SAFE]${NC}"
say ""
say "${P}[i] UID: ${UID} | ${USERINFO}${NC}"
say "${P}[i] Dispositivo: ${MANU} ${MODEL} | SDK: ${SDK}${NC}"
say "${P}[i] Modo: ${MODE} | DRY_RUN=${DRY_RUN} | LOG=${LOGFILE}${NC}"

BEFORE_KB="$(avail_kb_data)"
[ -n "$BEFORE_KB" ] && say "${C}[i] Espacio libre /data (antes): $(human_kb "$BEFORE_KB")${NC}"

#===============================================================================
# MODO RESTORE
#===============================================================================
restore_settings() {
  say "\n${P}[⚡] RESTORE: Revirtiendo valores guardados${NC}"

  if ! load_state; then
    say "${R}[x] No encontré statefile: ${STATEFILE}${NC}"
    say "${C}[i] Ejecutá el script en modo normal una vez para guardar estado.${NC}"
    exit 1
  fi

  # Restaurar animaciones (si hay valores)
  [ -n "${window_animation_scale}" ] && run "settings put global window_animation_scale ${window_animation_scale}"
  [ -n "${transition_animation_scale}" ] && run "settings put global transition_animation_scale ${transition_animation_scale}"
  [ -n "${animator_duration_scale}" ] && run "settings put global animator_duration_scale ${animator_duration_scale}"

  # Restaurar long press / pointer speed si existían
  [ -n "${long_press_timeout}" ] && run "settings put secure long_press_timeout ${long_press_timeout}"
  [ -n "${pointer_speed}" ] && run "settings put system pointer_speed ${pointer_speed}"

  say "${G}[✓] Restore completado${NC}"
  say "${C}[i] Log: ${LOGFILE}${NC}"
}

#===============================================================================
# DIAGNÓSTICO (opcional)
#===============================================================================
diagnostics() {
  [ "$ENABLE_DIAGNOSTICS" = "1" ] || return 0
  say "\n${P}[🧪] DIAGNÓSTICO (opcional)${NC}"

  # Top carpetas grandes en /sdcard (rápido, sin entrar en infinito)
  if command -v du >/dev/null 2>&1; then
    say "${C}[i] Top ${TOP_DU_COUNT} carpetas pesadas en /sdcard:${NC}"
    run "du -sk /sdcard/* 2>/dev/null | sort -nr | head -n ${TOP_DU_COUNT}" || true
  else
    say "${Y}[!] 'du' no disponible en este entorno${NC}"
  fi

  # Meminfo rápida
  if command -v dumpsys >/dev/null 2>&1; then
    say "${C}[i] dumpsys meminfo (resumen):${NC}"
    run "dumpsys meminfo | head -n 80" || true
  fi

  # Paquetes grandes (puede variar por OEM)
  if command -v dumpsys >/dev/null 2>&1; then
    say "${C}[i] Top ${TOP_PACKAGES_COUNT} paquetes por 'code/data/cache' (si está disponible):${NC}"
    run "dumpsys package packages 2>/dev/null | grep -E 'Package \\[|codePath=|dataDir=|versionName=' | head -n 200" || true
    say "${C}[i] (Nota) Algunos sistemas no exponen tamaños por paquete en dumpsys.${NC}"
  fi

  say "${G}[✓] Diagnóstico finalizado${NC}"
}

#===============================================================================
# FASE 1: LIMPIEZA SAFE+
#===============================================================================
safe_clean_plus() {
  say "\n${P}[⚡] FASE 1: SAFE CLEAN+${NC}"

  # 1) Trim caches (si está permitido)
  run "pm trim-caches 999G" \
    && say "${G}[✓] pm trim-caches ejecutado${NC}" \
    || say "${Y}[!] pm trim-caches no disponible/bloqueado${NC}"

  # 2) Candidatos Download
  CAND="$(count_download_candidates)"
  say "${C}[i] Candidatos en Download (>${DAYS_OLD}d y >${MIN_SIZE_KB}KB): ${CAND}${NC}"
  if [ "$CAND" -gt 0 ]; then
    say "${C}[i] Lista (preview):${NC}"
    list_download_candidates | head -n 50 | while read -r f; do
      say "  - ${f}"
    done
    [ "$CAND" -gt 50 ] && say "${C}[i] ... (mostrando 50 de ${CAND})${NC}"
    confirm_or_exit "¿Borrar estos archivos de Download?"
    run "find /sdcard/Download -maxdepth ${DOWNLOAD_MAXDEPTH} -type f \
      \( -name '*.tmp' -o -name '*.log' -o -name '*.bak' -o -name '*.old' \) \
      -mtime +${DAYS_OLD} -size +${MIN_SIZE_KB}k -print -delete" \
      && say "${G}[✓] Limpieza Download completada${NC}" \
      || say "${Y}[!] No se pudo limpiar Download (permisos/ruta)${NC}"
  else
    say "${G}[✓] Nada para limpiar en Download con esos filtros${NC}"
  fi

  # 3) Android/data cache (scoped storage)
  if [ "${TITAN_TRY_ANDROID_DATA_CACHE}" = "1" ]; then
    if [ -n "$SDK" ] && [ "$SDK" -ge 30 ] 2>/dev/null; then
      say "${Y}[!] Android 11+ suele bloquear /sdcard/Android/data (scoped storage). Puede fallar.${NC}"
    fi
    # Intento silencioso: solo borra archivos dentro de */cache
    run "find /sdcard/Android/data -type d -path '*/cache' 2>/dev/null | while read -r d; do find \"\$d\" -type f -delete 2>/dev/null; done" \
      && say "${G}[✓] Intento Android/data/*/cache completado${NC}" \
      || say "${Y}[!] Android/data no accesible (esperable en Android 11+)${NC}"
  fi

  say "${G}[✓] Safe Clean+ completado${NC}"
}

#===============================================================================
# FASE 2: RAM SAFE
#===============================================================================
ram_safe() {
  say "\n${P}[⚡] FASE 2: RAM SAFE${NC}"

  if [ "${TITAN_AGGRESSIVE_RAM}" = "1" ]; then
    confirm_or_exit "TITAN_AGGRESSIVE_RAM=1 ejecuta am kill-all (puede cerrar apps). ¿Continuar?"
    run "am kill-all" \
      && say "${Y}[!] am kill-all ejecutado (agresivo)${NC}" \
      || say "${Y}[!] am kill-all no soportado/bloqueado${NC}"
  else
    say "${C}[i] Modo seguro: no se ejecuta kill-all (TITAN_AGGRESSIVE_RAM=0)${NC}"
  fi

  # Esto puede ser ignorado por algunos builds; igual es seguro intentar
  run "cmd activity memory-factor normal >/dev/null 2>&1" || true

  say "${G}[✓] RAM SAFE completado${NC}"
}

#===============================================================================
# FASE 3: FLUIDEZ SAFE (con guardado de estado)
#===============================================================================
fluidity_safe() {
  say "\n${P}[⚡] FASE 3: FLUIDEZ SAFE${NC}"

  # Guardar estado actual para poder restaurar
  save_state
  say "${C}[i] Estado guardado en: ${STATEFILE}${NC}"

  if [ "${TITAN_DISABLE_ANIMATIONS}" = "1" ]; then
    run "settings put global window_animation_scale ${ANIM_SCALE}"
    run "settings put global transition_animation_scale ${ANIM_SCALE}"
    run "settings put global animator_duration_scale ${ANIM_SCALE}"
    say "${G}[✓] Animaciones seteadas a ${ANIM_SCALE}${NC}"
  else
    say "${C}[i] Animaciones sin cambios${NC}"
  fi

  if [ "${SET_LONG_PRESS_TIMEOUT}" = "1" ]; then
    run "settings put secure long_press_timeout ${LONG_PRESS_TIMEOUT_MS}"
    say "${G}[✓] long_press_timeout = ${LONG_PRESS_TIMEOUT_MS}${NC}"
  fi

  if [ "${SET_POINTER_SPEED}" = "1" ]; then
    run "settings put system pointer_speed ${POINTER_SPEED}"
    say "${G}[✓] pointer_speed = ${POINTER_SPEED}${NC}"
  fi

  say "${G}[✓] Fluidez SAFE aplicada${NC}"
}

#===============================================================================
# FASE 4: MANTENIMIENTO SAFE (compile)
#===============================================================================
maintenance_safe() {
  say "\n${P}[⚡] FASE 4: MANTENIMIENTO SAFE${NC}"

  if [ "${ENABLE_SPEED_PROFILE}" != "1" ]; then
    say "${C}[i] compile desactivado (ENABLE_SPEED_PROFILE=0)${NC}"
    return 0
  fi

  if cmd package compile -h 2>/dev/null | grep -qi "compile"; then
    if [ "${COMPILE_ALL}" = "1" ]; then
      confirm_or_exit "Aplicar speed-profile a ALL puede tardar. ¿Continuar?"
      run "cmd package compile -m speed-profile -f all" \
        && say "${G}[✓] speed-profile aplicado (all)${NC}" \
        || say "${Y}[!] compile bloqueado/no soportado${NC}"
    else
      say "${C}[i] Compilando lista seleccionada (COMPILE_ALL=0)${NC}"
      echo "$COMPILE_LIST" | sed '/^\s*#/d;/^\s*$/d' | while read -r pkg; do
        run "cmd package compile -m speed-profile -f $pkg" \
          && say "${G}[✓] speed-profile: $pkg${NC}" \
          || say "${Y}[!] no se pudo compilar: $pkg${NC}"
      done
    fi
  else
    say "${C}[i] cmd package compile no disponible${NC}"
  fi

  say "${G}[✓] Mantenimiento SAFE completado${NC}"
}

#===============================================================================
# FASE 5: BLOATWARE (OPCIONAL / MANUAL)
#===============================================================================
bloatware_optional() {
  [ "${BLOAT_MODE}" = "1" ] || return 0

  say "\n${P}[⚡] FASE 5: BLOATWARE (OPCIONAL / MANUAL)${NC}"
  say "${Y}[!] Advertencia: deshabilitar/desinstalar paquetes puede romper funciones. Usá bajo tu responsabilidad.${NC}"

  confirm_or_exit "BLOAT_MODE=1 está activo. ¿Aplicar acciones a la lista?"

  echo "$BLOAT_LIST" | sed '/^\s*#/d;/^\s*$/d' | while read -r pkg; do
    if [ "$BLOAT_ACTION" = "uninstall" ]; then
      run "pm uninstall --user 0 $pkg" \
        && say "${G}[✓] Uninstall (user 0): $pkg${NC}" \
        || say "${Y}[!] No se pudo uninstall: $pkg${NC}"
    else
      run "pm disable-user --user 0 $pkg" \
        && say "${G}[✓] Disabled: $pkg${NC}" \
        || say "${Y}[!] No se pudo disable: $pkg${NC}"
    fi
  done

  say "${G}[✓] Bloatware fase completada${NC}"
}

#===============================================================================
# MAIN
#===============================================================================
if [ "$MODE" = "restore" ]; then
  restore_settings
  exit 0
fi

# Diagnóstico primero (opcional)
diagnostics

# Ejecutar fases
safe_clean_plus
ram_safe

    <script>
        // Leer el script desde el tag text/plain (sin template literals)
        const titanV25 = (document.getElementById('titanScript').textContent || "").replace(/^\s+|\s+$/g, "");

        function renderCode() {
            const codeBlock = document.getElementById('codeBlock');
            const lines = titanV25.split('\n');
            document.getElementById('linesCount').innerText = `Lines: ${lines.length}`;

            const highlighted = lines.map((line, index) => {
                let formattedLine = line
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");

                if (formattedLine.trim().startsWith('#')) {
                    formattedLine = `<span class="syntax-comment">${formattedLine}</span>`;
                } else {
                    formattedLine = formattedLine
                        .replace(/\b(if|then|else|fi|for|in|do|done|exit|while|case|esac|function)\b/g, '<span class="syntax-keyword">$1</span>')
                        .replace(/\b(echo|pm|am|cmd|find|settings|grep|id|tr|read|du|dumpsys|getprop|awk|df|sort|head|sed)\b/g, '<span class="syntax-func">$1</span>')
                        .replace(/"([^"]*)"/g, '<span class="syntax-string">"$1"</span>')
                        .replace(/'([^']*)'/g, '<span class="syntax-string">\'$1\'</span>');
                }

                return `<span class="line-num">${index + 1}</span>${formattedLine}`;
            }).join('\n');

            codeBlock.innerHTML = highlighted;
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').innerText = text;
            toast.style.opacity = '1';
            toast.style.bottom = '40px';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.bottom = '32px';
            }, 2500);
        }

        function copyText(text, toastMsg) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast(toastMsg);
        }

        function copyRaw() {
            copyText(titanV25, "SCRIPT COMPLETO COPIADO");
        }

        // Base64 robusto (TextEncoder + chunk)
        function base64FromUtf8(str) {
            const bytes = new TextEncoder().encode(str);
            let binary = "";
            const chunk = 0x8000;
            for (let i = 0; i < bytes.length; i += chunk) {
                binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
            }
            return btoa(binary);
        }

        // One-liner ADB real:
        // - escribe base64 a /data/local/tmp
        // - decodifica usando 'base64 -d' o 'toybox base64 -d' (fallback)
        // - ejecuta
        function copyOneLiner() {
            const b64 = base64FromUtf8(titanV25);

            const oneLiner =
`adb shell "TMP=/data/local/tmp/titan_v25_pro_no_root.sh; B=/data/local/tmp/titan_v25_pro_no_root.b64; echo '${b64}' > \\$B; (base64 -d \\$B 2>/dev/null || toybox base64 -d \\$B 2>/dev/null) > \\$TMP; chmod 755 \\$TMP; sh \\$TMP; rc=\\$?; rm -f \\$TMP \\$B; exit \\$rc"`;

            copyText(oneLiner, "COMANDO AUTO-RUN ADB COPIADO");
        }

        function highlightSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const codeLines = document.querySelectorAll('#codeBlock span:not(.line-num)');
            codeLines.forEach(line => {
                if (term && line.innerText.toLowerCase().includes(term)) {
                    line.style.backgroundColor = 'rgba(245, 158, 11, 0.3)';
                } else {
                    line.style.backgroundColor = 'transparent';
                }
            });
        }

        window.onload = renderCode;
    </script>
