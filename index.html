strip_ansi() { sed 's/\x1b\[[0-9;]*m//g'; }

log_init() {
  mkdir -p "$LOGDIR" "$CFGDIR" "$REPORTDIR" 2>/dev/null
  touch "$LOGFILE" "$SUMMARYFILE" "$EXTERNAL_PROTECT_LIST" "$EXTERNAL_DISABLE_LIST" \
        "$EXTERNAL_UNINSTALL_LIST" "$EXTERNAL_FORCESTOP_EXCLUDE" "$EXTERNAL_DEBLOAT_NEVER" 2>/dev/null
}

log() { echo "$(date '+%F %T') | $*" >> "$LOGFILE" 2>/dev/null; }

say() {
  [ "$VERBOSE" = "1" ] && echo -e "$*"
  echo -e "$*" | strip_ansi | log
}

note() { echo "$*" >> "$SUMMARYFILE" 2>/dev/null; }
exists() { command -v "$1" >/dev/null 2>&1; }

run() {
  if [ "$DRY_RUN" = "1" ]; then
    say "${C}[dry] $*${NC}"
    return 0
  fi
  sh -c "$*" >> "$LOGFILE" 2>&1
  return $?
}

run_quiet() {
  if [ "$DRY_RUN" = "1" ]; then
    say "${C}[dry] $*${NC}"
    return 0
  fi
  sh -c "$*" >/dev/null 2>&1
  return $?
}

append_unique_line() {
  f="$1"
  line="$2"
  [ -z "$f" ] && return 0
  [ -z "$line" ] && return 0
  mkdir -p "$(dirname "$f")" 2>/dev/null
  touch "$f" 2>/dev/null
  grep -Fxq "$line" "$f" 2>/dev/null || echo "$line" >> "$f"
}

getprop_safe() { getprop "$1" 2>/dev/null; }
settings_get_safe() { settings get "$1" "$2" 2>/dev/null; }
settings_put_safe() { run "settings put $1 $2 '$3'"; }
settings_delete_safe() { run "settings delete $1 $2"; }

sdk() { getprop_safe ro.build.version.sdk; }
brand() { getprop_safe ro.product.brand; }
model() { getprop_safe ro.product.model; }
manufacturer() { getprop_safe ro.product.manufacturer; }
release_ver() { getprop_safe ro.build.version.release; }
carrier_name() { getprop_safe ro.carrier; }
channel_name() { getprop_safe ro.boot.carrier; }
retail_name() { getprop_safe ro.com.google.clientidbase.ms; }

sd_avail_kb() { df -k /sdcard 2>/dev/null | awk 'NR==2{print $4}'; }
sd_avail_bytes() { kb="$(sd_avail_kb)"; [ -z "$kb" ] && kb=0; awk -v kb="$kb" 'BEGIN{print kb*1024}'; }
bytes_to_mb() { b="$1"; [ -z "$b" ] && b=0; awk -v b="$b" 'BEGIN{printf "%.1f MB", b/1024/1024}'; }
bytes_to_gb() { b="$1"; [ -z "$b" ] && b=0; awk -v b="$b" 'BEGIN{printf "%.2f GB", b/1024/1024/1024}'; }

battery_level() { dumpsys battery 2>/dev/null | awk -F': ' '/level:/{print $2; exit}'; }
battery_temp_c() {
  t="$(dumpsys battery 2>/dev/null | awk -F': ' '/temperature:/{print $2; exit}')"
  [ -z "$t" ] && t=0
  awk -v x="$t" 'BEGIN{printf "%.1f", x/10}'
}

pkg_installed() { p="$1"; pm list packages 2>/dev/null | cut -d: -f2 | grep -Fxq "$p"; }

rotate_log_if_needed() {
  [ "$AUTO_TRIM_LOGFILE" = "1" ] || return 0
  [ -f "$LOGFILE" ] || return 0
  size_mb="$(ls -ln "$LOGFILE" 2>/dev/null | awk '{print int($5/1024/1024)}')"
  [ -z "$size_mb" ] && size_mb=0
  if [ "$size_mb" -ge "$MAX_LOG_SIZE_MB" ]; then
    mv "$LOGFILE" "${LOGFILE}.old" 2>/dev/null
    : > "$LOGFILE" 2>/dev/null
  fi
}

should_run_heavy_tasks() {
  [ "$FORCE_HEAVY_TASKS" = "1" ] && return 0
  lvl="$(battery_level)"
  temp="$(battery_temp_c)"
  [ -z "$lvl" ] && lvl=100
  [ -z "$temp" ] && temp=0
  temp_int="$(echo "$temp" | awk -F. '{print $1}')"
  [ -z "$temp_int" ] && temp_int=0
  [ "$lvl" -lt "$BATTERY_MIN_FOR_HEAVY" ] && return 1
  [ "$temp_int" -ge "$TEMP_MAX_C" ] && return 1
  return 0
}

with_fixed_perf_begin() {
  [ "$AUTO_FIXED_PERF_TEMPORARY" = "1" ] || return 0
  exists cmd || return 0
  run_quiet "cmd power set-fixed-performance-mode-enabled true" || true
}

with_fixed_perf_end() {
  [ "$AUTO_FIXED_PERF_TEMPORARY" = "1" ] || return 0
  exists cmd || return 0
  run_quiet "cmd power set-fixed-performance-mode-enabled false" || true
}

cleanup_on_exit() {
  with_fixed_perf_end
  rotate_log_if_needed
  rm -f "$TMP_PROTECTED" "$TMP_SCAN_ALL" "$TMP_JUNK_DL" "$TMP_OLD_APK" \
        "$TMP_LOG_DUMPS" "$TMP_DISABLE_LIST" "$TMP_UNINSTALL_LIST" \

}

apply_profile() {
  case "$PROFILE" in
    daily)
      ANIM_SCALE="0.35"

      POINTER_SPEED="5"

      FORCE_STOP_NONCRITICAL=0
      FORCE_STOP_MAX_COUNT=0

      AUTO_LIMIT_BG=0
      AUTO_FORCE_STOP=0
      AUTO_DISABLE_ASSISTANT=0
      DEBLOAT_LEVEL="balanced"
      ;;
    turbo)
      ANIM_SCALE="0.20"
      TOUCH_TIMEOUT="90"
      POINTER_SPEED="6"
      BG_LIMIT="4"
      FORCE_STOP_NONCRITICAL=1
      FORCE_STOP_MAX_COUNT=16
      AUTO_DISABLE_HAPTICS=1
      AUTO_LIMIT_BG=1
      AUTO_FORCE_STOP=1
      [ "$DEBLOAT_LEVEL" = "balanced" ] && DEBLOAT_LEVEL="aggressive"
      ;;
    beast)

      TOUCH_TIMEOUT="80"
      POINTER_SPEED="7"

      FORCE_STOP_MAX_COUNT=24
      AUTO_DISABLE_HAPTICS=1
      AUTO_LIMIT_BG=1
      AUTO_FORCE_STOP=1
      AUTO_DISABLE_ASSISTANT=1
      DEXOPT_ALL=1
      [ "$DEBLOAT_LEVEL" = "balanced" ] && DEBLOAT_LEVEL="aggressive"
      ;;
    omega)
      ANIM_SCALE="0.10"
      TOUCH_TIMEOUT="75"
      POINTER_SPEED="7"
      BG_LIMIT="2"
      FORCE_STOP_NONCRITICAL=1
      FORCE_STOP_MAX_COUNT=60
      AUTO_DISABLE_HAPTICS=1
      AUTO_LIMIT_BG=1
      AUTO_FORCE_STOP=1

      DEXOPT_ALL=1

      ALLOW_VENDOR_AGGRESSIVE=1
      ALLOW_GOOGLE_AGGRESSIVE=1
      ;;
    *)
      PROFILE="beast"
      apply_profile
      return
      ;;
  esac
}

auto_tune_profile() {
  [ "$AUTO_TUNE" = "1" ] || return 0
  [ "$USAGE_MODE" != "auto" ] && return 0

  lvl="$(battery_level)"
  temp="$(battery_temp_c)"
  temp_int="$(echo "$temp" | awk -F. '{print $1}')"
  [ -z "$lvl" ] && lvl=100
  [ -z "$temp_int" ] && temp_int=0

  if [ "$lvl" -lt 25 ] || [ "$temp_int" -ge 41 ]; then
    USAGE_MODE="battery"
  elif [ "$lvl" -ge 60 ] && [ "$temp_int" -lt 39 ]; then
    USAGE_MODE="gaming"
  else
    USAGE_MODE="daily"
  fi

  apply_usage_mode
  note "AutoTune_usage=$USAGE_MODE"
}

build_protected_packages() {
  : > "$TMP_PROTECTED"
  echo "$CRITICAL_PACKAGES_STATIC" | sed '/^$/d' | while IFS= read -r p; do
    append_unique_line "$TMP_PROTECTED" "$p"
  done

  ime="$(current_ime)"
  launcher="$(current_launcher)"
  dialer="$(default_dialer_pkg)"
  sms="$(default_sms_pkg)"
  assistant="$(default_assistant_pkg)"

  [ -n "$ime" ] && append_unique_line "$TMP_PROTECTED" "$ime"
  [ -n "$launcher" ] && append_unique_line "$TMP_PROTECTED" "$launcher"
  [ -n "$dialer" ] && append_unique_line "$TMP_PROTECTED" "$dialer"
  [ -n "$sms" ] && append_unique_line "$TMP_PROTECTED" "$sms"
  [ -n "$assistant" ] && append_unique_line "$TMP_PROTECTED" "$assistant"

  camera_candidates | while IFS= read -r p; do
    [ -n "$p" ] && append_unique_line "$TMP_PROTECTED" "$p"
  done

  [ -f "$EXTERNAL_PROTECT_LIST" ] && sed '/^$/d' "$EXTERNAL_PROTECT_LIST" | while IFS= read -r p; do append_unique_line "$TMP_PROTECTED" "$p"; done
  [ -f "$EXTERNAL_DEBLOAT_NEVER" ] && sed '/^$/d' "$EXTERNAL_DEBLOAT_NEVER" | while IFS= read -r p; do append_unique_line "$TMP_PROTECTED" "$p"; done
}

is_protected_package() {

  return 1

    -not -path '${WHATSAPP_EXCLUDE_3}/*' \

    > '$TMP_SCAN_ALL'"

sum_sizes_from_list() {
  f="$1"
  [ -f "$f" ] || { echo 0; return; }
  while IFS= read -r p; do
    [ -f "$p" ] && ls -ln "$p" 2>/dev/null | awk '{print $5}'
  done < "$f" | awk '{s+=$1} END{print s+0}'
}

mk_filter_files() {
  : > "$TMP_JUNK_DL"
  : > "$TMP_OLD_APK"
  : > "$TMP_LOG_DUMPS"

  grep '^/sdcard/Download/' "$TMP_SCAN_ALL" 2>/dev/null | while IFS= read -r p; do
    [ -f "$p" ] || continue
    case "$p" in
      *.tmp|*.temp|*.log|*.bak|*.old|*.swp|*.part|*.partial|*.crdownload|*.dmp|*.sav|*.shm|*.journal|*.lock|*.trace|*.stacktrace|*.err|*.out|*.download|*.pending)
        echo "$p" >> "$TMP_JUNK_DL"
        ;;
      *.apk|*.apks|*.xapk|*.apkm)
        echo "$p" >> "$TMP_OLD_APK"
        ;;
    esac
  done

  while IFS= read -r p; do
    [ -f "$p" ] || continue
    case "$p" in
      *.log|*logcat*|*.dmp|*.trace|*.stacktrace|*tombstone*|/sdcard/bugreports/*|*.anr|*.dropbox)
        echo "$p" >> "$TMP_LOG_DUMPS"
        ;;
    esac
  done < "$TMP_SCAN_ALL"
}

report_cleanup_inventory() {
  say "\n${P}[3/13] INVENTARIO DE LIMPIEZA${NC}"
  scan_storage_once
  mk_filter_files

  junk_n="$(sed '/^$/d' "$TMP_JUNK_DL" 2>/dev/null | wc -l | tr -d ' ')"
  apk_n="$(sed '/^$/d' "$TMP_OLD_APK" 2>/dev/null | wc -l | tr -d ' ')"
  dump_n="$(sed '/^$/d' "$TMP_LOG_DUMPS" 2>/dev/null | wc -l | tr -d ' ')"

  junk_b="$(sum_sizes_from_list "$TMP_JUNK_DL")"
  apk_b="$(sum_sizes_from_list "$TMP_OLD_APK")"
  dump_b="$(sum_sizes_from_list "$TMP_LOG_DUMPS")"

  say "${C}[i] Junk Download: ${junk_n} (~$(bytes_to_mb "$junk_b"))${NC}"
  say "${C}[i] Instaladores/APKs: ${apk_n} (~$(bytes_to_mb "$apk_b"))${NC}"
  say "${C}[i] Logs/dumps: ${dump_n} (~$(bytes_to_mb "$dump_b"))${NC}"
  note "Inventario junk=$junk_n apk=$apk_n dumps=$dump_n"
}

    -not -path '${WHATSAPP_EXCLUDE_1}/*' \
    -not -path '${WHATSAPP_EXCLUDE_2}/*' \

cleanup_bugreports() { [ "$AUTO_CLEAR_BUGREPORTS" = "1" ] || return 0; run "find /sdcard/bugreports -maxdepth 4 -type f -delete" || true; }
cleanup_tombstones_named() { [ "$AUTO_CLEAR_TOMBSTONES" = "1" ] || return 0; run "find /sdcard -maxdepth 7 -type f \\( -iname '*tombstone*' -o -iname '*.tombstone' -o -iname '*.anr' \\) -not -path '${WHATSAPP_EXCLUDE_1}/*' -not -path '${WHATSAPP_EXCLUDE_2}/*' -not -path '${WHATSAPP_EXCLUDE_3}/*' -not -path '${TYPELESS_EXCLUDE_1}/*' -not -path '${TYPELESS_EXCLUDE_2}/*' -delete" || true; }
cleanup_zero_byte_files() { [ "$AUTO_CLEAR_EMPTY_FILES" = "1" ] || return 0; run "find /sdcard -maxdepth 7 -type f -size 0 -not -path '${WHATSAPP_EXCLUDE_1}/*' -not -path '${WHATSAPP_EXCLUDE_2}/*' -not -path '${WHATSAPP_EXCLUDE_3}/*' -not -path '${TYPELESS_EXCLUDE_1}/*' -not -path '${TYPELESS_EXCLUDE_2}/*' -delete" || true; }
cleanup_tmp_and_cache_dirs() { [ "$AUTO_CLEAR_TMP_DIRS" = "1" ] || return 0; run "find /sdcard -maxdepth 7 -type d \\( -iname 'cache' -o -iname 'code_cache' -o -iname 'tmp' -o -iname 'temp' -o -iname '.tmp' -o -iname '.cache' \\) -not -path '${WHATSAPP_EXCLUDE_1}*' -not -path '${WHATSAPP_EXCLUDE_2}*' -not -path '${WHATSAPP_EXCLUDE_3}*' -not -path '${TYPELESS_EXCLUDE_1}*' -not -path '${TYPELESS_EXCLUDE_2}*' | while read d; do [ -z \"\$d\" ] && continue; find \"\$d\" -type f -delete; done" || true; }
cleanup_android_temp_dirs() { [ "$AUTO_CLEAR_ANDROID_TEMP" = "1" ] || return 0; run "find /sdcard/Android -maxdepth 7 \\( -path '*/cache/*' -o -path '*/code_cache/*' -o -path '*/files/cache/*' -o -path '*/files/tmp/*' -o -path '*/tmp/*' -o -path '*/logs/*' \\) -not -path '${WHATSAPP_EXCLUDE_2}/*' -not -path '${WHATSAPP_EXCLUDE_3}/*' -not -path '${TYPELESS_EXCLUDE_1}/*' -not -path '${TYPELESS_EXCLUDE_2}/*' -type f -delete" || true; }
cleanup_crash_residue() { [ "$AUTO_CLEAR_CRASH_RESIDUE" = "1" ] || return 0; run "find /sdcard -maxdepth 7 -type f \\( -iname '*.stacktrace' -o -iname '*.trace' -o -iname '*.dmp' -o -iname '*.crash' -o -iname 'anr_*' -o -iname 'bugreport*' -o -iname '*.dropbox' \\) -not -path '${WHATSAPP_EXCLUDE_1}/*' -not -path '${WHATSAPP_EXCLUDE_2}/*' -not -path '${WHATSAPP_EXCLUDE_3}/*' -not -path '${TYPELESS_EXCLUDE_1}/*' -not -path '${TYPELESS_EXCLUDE_2}/*' -delete" || true; }
cleanup_misc_junk() { [ "$AUTO_CLEAR_MISC_JUNK" = "1" ] || return 0; run "find /sdcard -maxdepth 7 -type f \\( -iname '*.nomedia.bak' -o -iname '*.orig' -o -iname '*.rej' -o -iname '*.pending' -o -iname '*.download' -o -iname '*.broken' \\) -not -path '${WHATSAPP_EXCLUDE_1}/*' -not -path '${WHATSAPP_EXCLUDE_2}/*' -not -path '${WHATSAPP_EXCLUDE_3}/*' -not -path '${TYPELESS_EXCLUDE_1}/*' -not -path '${TYPELESS_EXCLUDE_2}/*' -delete" || true; }
prune_empty_dirs() { [ "$AUTO_PRUNE_EMPTY_DIRS" = "1" ] || return 0; run "find /sdcard -maxdepth 7 -type d -empty -not -path '/sdcard' -not -path '${WHATSAPP_EXCLUDE_1}' -not -path '${WHATSAPP_EXCLUDE_2}' -not -path '${WHATSAPP_EXCLUDE_3}' -not -path '${TYPELESS_EXCLUDE_1}' -not -path '${TYPELESS_EXCLUDE_2}' -delete" || true; }

cleanup_storage() {
  say "\n${P}[4/13] LIMPIEZA PROFUNDA${NC}"
  before="$(sd_avail_bytes)"
  pm_trim_caches

  if [ "$PURGE_DOWNLOAD_TEMP_ONLY" = "1" ]; then
    cleanup_download_junk
  else
    cleanup_download_junk
    cleanup_old_installers
    cleanup_logs_dumps
    cleanup_thumbnails
    cleanup_bugreports
    cleanup_tombstones_named
    cleanup_zero_byte_files
    cleanup_tmp_and_cache_dirs
    cleanup_android_temp_dirs
    cleanup_crash_residue
    cleanup_misc_junk
    prune_empty_dirs
  fi

  after="$(sd_avail_bytes)"
  delta="$(awk -v a="$after" -v b="$before" 'BEGIN{print a-b}')"
  say "${G}[✓] Limpieza completada. Recuperado aprox: $(bytes_to_mb "$delta").${NC}"
  note "Espacio_recuperado=$(bytes_to_mb "$delta")"
}

detect_refresh_caps() {
  exists dumpsys || return 0
  txt="$(dumpsys display 2>/dev/null | grep -E 'fps|refresh rate|RefreshRate|modeId' | head -240)"
  [ -n "$TARGET_PEAK_REFRESH" ] && return 0
  echo "$txt" | grep -q '165' && TARGET_PEAK_REFRESH="165"
  [ -z "$TARGET_PEAK_REFRESH" ] && echo "$txt" | grep -q '144' && TARGET_PEAK_REFRESH="144"
  [ -z "$TARGET_PEAK_REFRESH" ] && echo "$txt" | grep -q '120' && TARGET_PEAK_REFRESH="120"
  [ -z "$TARGET_PEAK_REFRESH" ] && echo "$txt" | grep -q '90' && TARGET_PEAK_REFRESH="90"
  [ -z "$TARGET_PEAK_REFRESH" ] && echo "$txt" | grep -q '60' && TARGET_PEAK_REFRESH="60"
  [ -n "$TARGET_PEAK_REFRESH" ] && [ -z "$TARGET_MIN_REFRESH" ] && TARGET_MIN_REFRESH="$TARGET_PEAK_REFRESH"
}

set_refresh_rate_hint() {
  [ "$AUTO_SET_REFRESH_RATE" = "1" ] || return 0
  detect_refresh_caps
  [ -n "$TARGET_PEAK_REFRESH" ] && settings_put_safe system peak_refresh_rate "$TARGET_PEAK_REFRESH" || true
  [ -n "$TARGET_MIN_REFRESH" ] && settings_put_safe system min_refresh_rate "$TARGET_MIN_REFRESH" || true
}

disable_blurs_best_effort() { [ "$AUTO_DISABLE_WINDOW_BLURS" = "1" ] || return 0; settings_put_safe global disable_window_blurs 1 || true; }

tune_fluidity() {
  say "\n${P}[5/13] FLUIDEZ / INPUT / DISPLAY${NC}"
  save_state

  settings_put_safe global window_animation_scale "$ANIM_SCALE"
  settings_put_safe global transition_animation_scale "$ANIM_SCALE"
  settings_put_safe global animator_duration_scale "$ANIM_SCALE"
  settings_put_safe secure long_press_timeout "$TOUCH_TIMEOUT" || true
  settings_put_safe secure multi_press_timeout "$TOUCH_TIMEOUT" || true
  settings_put_safe system pointer_speed "$POINTER_SPEED" || true

  [ "$AUTO_DISABLE_HAPTICS" = "1" ] && settings_put_safe system haptic_feedback_enabled 0 || true
  [ "$AUTO_TUNE_FONT_SCALE" = "1" ] && settings_put_safe system font_scale "$FONT_SCALE_TARGET" || true
  [ "$AUTO_DISABLE_NOTIFY_BADGING" = "1" ] && settings_put_safe secure notification_badging 0 || true

  if [ "$AUTO_LIMIT_BG" = "1" ] && [ -n "$BG_LIMIT" ]; then
    settings_put_safe global limit_background_processes "$BG_LIMIT" || true
  fi

  [ "$AUTO_CLEAR_CLIPBOARD" = "1" ] && run_quiet "cmd clipboard set text ''" || true
  [ "$AUTO_DISABLE_ASSISTANT" = "1" ] && settings_put_safe secure assistant "" || true
  [ "$AUTO_DISABLE_PRINT_SERVICE" = "1" ] && settings_put_safe secure enabled_print_services "" || true

  disable_blurs_best_effort
  set_refresh_rate_hint

  say "${G}[✓] Ajustes de fluidez aplicados.${NC}"
  note "Anim=$ANIM_SCALE Pointer=$POINTER_SPEED BG_LIMIT=$BG_LIMIT Refresh=$TARGET_PEAK_REFRESH"
}

hot_packages() {
  echo "
com.android.systemui
com.android.settings
com.google.android.gms
com.android.chrome
com.whatsapp
com.typeless.mobile
com.motorola.launcher
com.motorola.camera3
com.google.android.inputmethod.latin
" | sed '/^$/d'
}

recent_user_packages() { pm list packages -3 2>/dev/null | cut -d: -f2 | head -100; }

dexopt_package_best_effort() {
  p="$1"
  [ -z "$p" ] && return 0
  pkg_installed "$p" || return 0
  run_quiet "cmd package compile -m speed-profile -f '$p'" || true
}

dexopt_phase() {
  say "\n${P}[6/13] DEXOPT / COMPILACIÓN${NC}"
  [ "$AUTO_DEXOPT" = "1" ] || { say "${Y}[i] Dexopt desactivado.${NC}"; return 0; }

  if ! should_run_heavy_tasks; then
    say "${Y}[i] Saltando tareas pesadas por batería/temperatura.${NC}"
    note "Dexopt=saltado_por_condiciones"
    return 0
  fi

  with_fixed_perf_begin
  run "pm dexopt-job" || true
  run "cmd package bg-dexopt-job" || true

  if [ "$DEXOPT_ALL" = "1" ]; then
    run "cmd package compile -m speed-profile -f -a" || true
    note "Dexopt=all"
  else
    hot_packages | while IFS= read -r p; do dexopt_package_best_effort "$p"; done
    recent_user_packages | while IFS= read -r p; do dexopt_package_best_effort "$p"; done
    note "Dexopt=hot+recent"
  fi

  say "${G}[✓] Dexopt completado.${NC}"
}

looks_like_bloat_by_name() {
  p="$1"
  case "$p" in
    *facebook*|*meta*|*netflix*|*booking*|*spotify*|*tiktok*|*linkedin*|*amazon*|*aliexpress*|*agoda*|*trivago*|*weather*|*music*|*video*|*tips*|*help*|*demo*|*games*|*gamecenter*|*hotapps*|*hotgames*|*wellbeing*|*kids*|*cleaner*|*optimizer*|*partnerbookmarks*|*office*|*onenote*|*outlook*|*skype*)
      return 0 ;;
  esac
  return 1
}

queue_disable() {
  p="$1"
  [ -z "$p" ] && return 0
  pkg_installed "$p" || return 0
  is_protected_package "$p" && return 0
  append_unique_line "$TMP_DISABLE_LIST" "$p"
}

queue_uninstall_user0() {
  p="$1"
  [ -z "$p" ] && return 0
  pkg_installed "$p" || return 0
  is_protected_package "$p" && return 0
  [ "$PARANOID_SAFE" = "1" ] && { append_unique_line "$TMP_DISABLE_LIST" "$p"; return 0; }
  append_unique_line "$TMP_UNINSTALL_LIST" "$p"
}

consume_list_to_disable() {
  LIST="$1"
  echo "$LIST" | sed '/^$/d' | while IFS= read -r p; do queue_disable "$p"; done
}

consume_list_to_uninstall() {
  LIST="$1"
  echo "$LIST" | sed '/^$/d' | while IFS= read -r p; do queue_uninstall_user0 "$p"; done
}

debloat_disable_user() {
  p="$1"
  [ -z "$p" ] && return 0
  is_protected_package "$p" && return 0
  append_unique_line "$DISABLED_STATEFILE" "$p"
  run "pm disable-user --user 0 '$p'" || true
}

debloat_hide_user0() {
  p="$1"
  [ -z "$p" ] && return 0
  is_protected_package "$p" && return 0
  append_unique_line "$DEBLOAT_STATEFILE" "$p"
  run "pm uninstall -k --user 0 '$p'" || true
}

build_debloat_queue() {
  : > "$TMP_DISABLE_LIST"
  : > "$TMP_UNINSTALL_LIST"

  case "$DEBLOAT_LEVEL" in
    safe)
      consume_list_to_disable "$COMMON_DISABLE"
      consume_list_to_disable "$MOTOROLA_SAFE_DISABLE"
      ;;
    balanced)
      consume_list_to_disable "$COMMON_DISABLE"
      consume_list_to_disable "$MOTOROLA_SAFE_DISABLE"
      [ "$ALLOW_SOCIAL_REMOVAL" = "1" ] && consume_list_to_disable "$SOCIAL_BLOAT"
      [ "$ALLOW_MICROSOFT_REMOVAL" = "1" ] && consume_list_to_disable "$MICROSOFT_BLOAT"
      [ "$ALLOW_AMAZON_REMOVAL" = "1" ] && consume_list_to_disable "$AMAZON_BLOAT"
      [ "$ALLOW_MEDIA_APP_REMOVAL" = "1" ] && consume_list_to_disable "$MEDIA_BLOAT"
      [ "$ALLOW_STREAMING_REMOVAL" = "1" ] && consume_list_to_disable "$STREAMING_BLOAT"
      [ "$ALLOW_TRAVEL_SHOP_REMOVAL" = "1" ] && consume_list_to_disable "$TRAVEL_SHOP_BLOAT"
      [ "$ALLOW_GAMING_REMOVAL" = "1" ] && consume_list_to_disable "$GAMING_BLOAT"
      [ "$ALLOW_EDUCATION_REMOVAL" = "1" ] && consume_list_to_disable "$EDUCATION_BLOAT"
      [ "$ALLOW_PRODUCTIVITY_REMOVAL" = "1" ] && consume_list_to_disable "$PRODUCTIVITY_BLOAT"
      [ "$ALLOW_CLOUD_REMOVAL" = "1" ] && consume_list_to_disable "$CLOUD_BLOAT"
      ;;
    aggressive)
      consume_list_to_disable "$COMMON_DISABLE"

      [ "$ALLOW_SOCIAL_REMOVAL" = "1" ] && consume_list_to_uninstall "$SOCIAL_BLOAT"
      [ "$ALLOW_MICROSOFT_REMOVAL" = "1" ] && consume_list_to_uninstall "$MICROSOFT_BLOAT"
      [ "$ALLOW_AMAZON_REMOVAL" = "1" ] && consume_list_to_uninstall "$AMAZON_BLOAT"
      [ "$ALLOW_MEDIA_APP_REMOVAL" = "1" ] && consume_list_to_uninstall "$MEDIA_BLOAT"
      [ "$ALLOW_STREAMING_REMOVAL" = "1" ] && consume_list_to_uninstall "$STREAMING_BLOAT"
      [ "$ALLOW_TRAVEL_SHOP_REMOVAL" = "1" ] && consume_list_to_uninstall "$TRAVEL_SHOP_BLOAT"
      [ "$ALLOW_GAMING_REMOVAL" = "1" ] && consume_list_to_uninstall "$GAMING_BLOAT"
      [ "$ALLOW_EXTRA_CHINA_REMOVAL" = "1" ] && consume_list_to_uninstall "$EXTRA_CHINA_BLOAT"
      [ "$ALLOW_EDUCATION_REMOVAL" = "1" ] && consume_list_to_uninstall "$EDUCATION_BLOAT"
      [ "$ALLOW_PRODUCTIVITY_REMOVAL" = "1" ] && consume_list_to_uninstall "$PRODUCTIVITY_BLOAT"
      [ "$ALLOW_CLOUD_REMOVAL" = "1" ] && consume_list_to_uninstall "$CLOUD_BLOAT"

      if [ "$ALLOW_VENDOR_AGGRESSIVE" = "1" ]; then
        consume_list_to_uninstall "$MOTOROLA_AGGRESSIVE_UNINSTALL"
      else
        consume_list_to_disable "$MOTOROLA_SAFE_DISABLE"
      fi

      if [ "$ALLOW_GOOGLE_AGGRESSIVE" = "1" ]; then
        consume_list_to_uninstall "$GOOGLE_OPTIONAL_AGGRESSIVE"
      elif [ "$ALLOW_OPTIONAL_GOOGLE_DISABLE" = "1" ]; then
        consume_list_to_disable "$GOOGLE_OPTIONAL_AGGRESSIVE"
      fi

      user_packages | while IFS= read -r p; do
        looks_like_bloat_by_name "$p" || continue
        queue_disable "$p"
      done
      ;;
  esac

  [ -f "$EXTERNAL_DISABLE_LIST" ] && sed '/^$/d' "$EXTERNAL_DISABLE_LIST" | while IFS= read -r p; do queue_disable "$p"; done
  [ -f "$EXTERNAL_UNINSTALL_LIST" ] && sed '/^$/d' "$EXTERNAL_UNINSTALL_LIST" | while IFS= read -r p; do queue_uninstall_user0 "$p"; done
}

debloat_phase() {
  [ "$AUTO_DEBLOAT" = "1" ] || return 0
  build_protected_packages
  build_debloat_queue

  say "\n${P}[7/13] DEBLOAT REVERSIBLE${NC}"
  disable_count="$(sed '/^$/d' "$TMP_DISABLE_LIST" 2>/dev/null | wc -l | tr -d ' ')"
  uninstall_count="$(sed '/^$/d' "$TMP_UNINSTALL_LIST" 2>/dev/null | wc -l | tr -d ' ')"

  say "${C}[i] disable-user: ${disable_count}${NC}"
  say "${C}[i] uninstall-user0: ${uninstall_count}${NC}"

  [ -f "$TMP_DISABLE_LIST" ] && sed '/^$/d' "$TMP_DISABLE_LIST" | while IFS= read -r p; do debloat_disable_user "$p"; done
  [ -f "$TMP_UNINSTALL_LIST" ] && sed '/^$/d' "$TMP_UNINSTALL_LIST" | while IFS= read -r p; do debloat_hide_user0 "$p"; done

  note "Disable_count=$disable_count"
  note "Uninstall_count=$uninstall_count"
}

force_stop_candidates() { pm list packages -3 2>/dev/null | cut -d: -f2; }

is_forcestop_excluded() {
  p="$1"
  [ -f "$EXTERNAL_FORCESTOP_EXCLUDE" ] || return 1
  grep -Fxq "$p" "$EXTERNAL_FORCESTOP_EXCLUDE" 2>/dev/null
}

memory_relief() {
  say "\n${P}[8/13] ALIVIO DE MEMORIA${NC}"
  build_protected_packages
  : > "$TMP_FORCESTOP_LIST"

  if [ "$AUTO_FORCE_STOP" = "1" ] && [ "$FORCE_STOP_NONCRITICAL" = "1" ]; then
    force_stop_candidates | while IFS= read -r p; do
      [ -z "$p" ] && continue
      is_protected_package "$p" && continue
      is_forcestop_excluded "$p" && continue
      case "$p" in
        *camera*|*dialer*|*contacts*|*clock*|*alarm*|*systemui*|*whatsapp*|*typeless*|com.motorola.moto*|com.motorola.genie*|com.motorola.launcher)
          continue ;;
      esac
      append_unique_line "$TMP_FORCESTOP_LIST" "$p"
    done

    cnt=0
    sed '/^$/d' "$TMP_FORCESTOP_LIST" 2>/dev/null | while IFS= read -r p; do
      run "am force-stop '$p'"
      cnt=$((cnt+1))
      [ "$cnt" -ge "$FORCE_STOP_MAX_COUNT" ] && break
    done

    say "${C}[i] Force-stop: hasta ${FORCE_STOP_MAX_COUNT}${NC}"
    note "Force_stop_max=$FORCE_STOP_MAX_COUNT"
  else
    note "Force_stop=off"
  fi
}

update_local_apks() {
  [ "$UPDATE_APKS" = "1" ] || return 0

  say "\n${P}[9/13] UPDATE DE APKS LOCALES${NC}"
  [ ! -d "$APK_DIR" ] && { say "${Y}[i] No existe $APK_DIR${NC}"; return 0; }

  : > "$UPDATED_APKS_LOG" 2>/dev/null

  find "$APK_DIR" -maxdepth 2 -type f \\( -iname "*.apk" -o -iname "*.apks" -o -iname "*.xapk" -o -iname "*.apkm" \\) 2>/dev/null | while IFS= read -r apk; do
    case "$apk" in
      *.apk)
        run "pm install -r '$apk'"
        append_unique_line "$UPDATED_APKS_LOG" "$apk"
        ;;
      *)
        say "${Y}[i] Bundle no universal omitido: $apk${NC}"
        ;;
    esac
  done
}

media_scan_hint() {

  exists am || return 0
  run_quiet "am broadcast -a android.intent.action.MEDIA_SCANNER_SCAN_FILE -d file:///sdcard" || true

smart_recommendations_phase() {

  detect_environment_phase

  say "${G}[✓] Recomendaciones guardadas.${NC}"
}

postcheck_phase() {
  say "\n${P}[11/13] POST-CHECKS${NC}"

  ime="$(current_ime)"
  launcher="$(current_launcher)"
  dialer="$(default_dialer_pkg)"
  sms="$(default_sms_pkg)"

  ok=1
  for p in "$ime" "$launcher" "$dialer" "$sms"; do
    [ -z "$p" ] && continue
    if ! pkg_installed "$p"; then
      say "${R}[x] Crítico ausente: $p${NC}"

    fi
  done

  if [ "$ok" = "1" ]; then
    say "${G}[✓] Post-checks OK.${NC}"
    note "Postcheck=ok"
  else
    say "${Y}[i] Si algo falla, usa restore.${NC}"
    note "Postcheck=warning"
  fi
}

report_only_phase() {
  detect_environment_phase
  generate_smart_recommendations
  snapshot_before
  snapshot_after
  generate_before_after_report
  say "${G}[✓] Reporte generado: ${SNAPSHOT_REPORT}${NC}"
}

diagnostics_post() {
  say "\n${P}[12/13] DIAGNÓSTICO FINAL${NC}"
  exists dumpsys && run "dumpsys meminfo | head -100" || true
  exists top && run "top -n 1 | head -50" || true
  exists df && run "df -h /data /sdcard" || true
  exists pm && run "pm list packages -d | head -150" || true
  say "${G}[✓] Diagnóstico final listo.${NC}"
}

final_summary() {
  say "\n${P}[13/13] RESUMEN${NC}"
  say "${C}[i] Summary: ${SUMMARYFILE}${NC}"
  say "${C}[i] Log: ${LOGFILE}${NC}"
  say "${C}[i] Report: ${SNAPSHOT_REPORT}${NC}"
  say "${C}[i] Smart recs: ${SMART_RECOMMENDATIONS}${NC}"
  say "${C}[i] Environment: ${ENV_REPORT}${NC}"
  say "${C}[i] Restore: adb shell sh /data/local/tmp/titan_razr60_v46_omega.sh --restore${NC}"
  [ "$AUTO_REBOOT_HINT" = "1" ] && say "${C}[i] Recomendado reinicio manual.${NC}"
}

  log_init

  if [ "$MODE" = "menu" ]; then
    interactive_menu

  say "${C}[i] Debloat: ${DEBLOAT_LEVEL}${NC}"

  <script>
    const titanEl = document.getElementById('titanScript');
    const codeEl = document.getElementById('codeBlock');
    const linesEl = document.getElementById('linesCount');
    const toastEl = document.getElementById('toast');
    const toastTextEl = document.getElementById('toastText');
    const searchInputEl = document.getElementById('searchInput');

    function getRawScript() {
      return (titanEl?.textContent || '').replace(/\r\n/g, '\n').trimEnd();
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

    function showToast(msg) {
      toastTextEl.textContent = msg;
      toastEl.classList.remove('opacity-0', 'pointer-events-none');
      toastEl.classList.add('opacity-100');
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => {
        toastEl.classList.add('opacity-0', 'pointer-events-none');
        toastEl.classList.remove('opacity-100');
      }, 1200);
    }

    async function copyText(txt, msg) {
      if (!txt) return showToast('NO HAY TEXTO PARA COPIAR');
      try {
        await navigator.clipboard.writeText(txt);
        showToast(msg || 'COPIADO');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = txt;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(msg || 'COPIADO');
      }
    }

    function render(raw, query = '') {
      const lines = raw.split('\n');
      linesEl.textContent = `Lines: ${lines.length}`;

      const q = (query || '').trim();
      const qRe = q ? new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi') : null;

      const html = lines.map((line, i) => {
        let safe = escapeHtml(line);
        if (qRe) {
          safe = safe.replace(qRe, m => `<mark class="bg-god-500/30 text-god-400 px-0.5">${m}</mark>`);
        }
        return `<span class="line-num">${String(i + 1).padStart(3, ' ')}</span>${safe}`;
      }).join('\n');

      codeEl.innerHTML = html;
    }

    window.copyRaw = function () {
      const raw = getRawScript();
      copyText(raw, 'SCRIPT COPIADO');
    };

    window.copyOneLiner = function () {
      const cmd = `adb shell sh /data/local/tmp/titan_razr60_v46_omega.sh --profile=omega --usage-mode=auto --omega-confirm`;
      copyText(cmd, 'COMANDO ADB COPIADO');
    };

    window.highlightSearch = function () {
      render(getRawScript(), searchInputEl?.value || '');
    };

    (function init() {
      const raw = getRawScript();
      if (!raw) {
        codeEl.textContent = '⚠️ No se encontró contenido en #titanScript (vacío).';
        linesEl.textContent = 'Lines: 0';
        return;
      }
      render(raw, '');
    })();
  </script>
</body>
</html>
