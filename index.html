   godmode)    echo \"$DEBLOAT_GODMODE\" ;;\n  esac\n}\n\n# =============================================================================\n# DEBLOAT\n# =============================================================================\nrun_debloat() {\n  [ \"$DO_DEBLOAT\" = \"0\" ] && { skip \"Debloat omitido (--no-debloat)\"; return; }\n\n  section \"Debloat de apps \u2014 modo: $MODE\"\n  : > \"$DEBLOAT_STATE\"\n  : > \"$DISABLED_STATE\"\n\n  TOTAL_PKG=$(get_debloat_list | sed '/^[[:space:]]*$/d' | sort -u | wc -l)\n  say \"${C}  Analizando ${TOTAL_PKG} paquetes candidatos...${NC}\"\n  nl\n\n  get_debloat_list | sed '/^[[:space:]]*$/d' | sort -u | while IFS= read -r pkg; do\n    pkg=$(echo \"$pkg\" | tr -d ' \\t\\r')\n    [ -z \"$pkg\" ] && continue\n\n    if is_protected \"$pkg\"; then\n      log \"SKIP (protected): $pkg\"; continue\n    fi\n\n    if ! pm list packages 2>/dev/null | cut -d: -f2 | grep -Fxq \"$pkg\"; then\n      log \"SKIP (not installed): $pkg\"; continue\n    fi\n\n    if [ \"$DRY_RUN\" = \"1\" ]; then\n      info \"[dry] Remover\u00eda: $pkg\"; continue\n    fi\n\n    if pm uninstall --user 0 \"$pkg\" >> \"$LOGFILE\" 2>&1; then\n      append_unique \"$DEBLOAT_STATE\" \"$pkg\"\n      REMOVED_COUNT=$((REMOVED_COUNT + 1))\n      ok \"  \u2717 Removida: $pkg\"\n    elif pm disable-user --user 0 \"$pkg\" >> \"$LOGFILE\" 2>&1; then\n      append_unique \"$DISABLED_STATE\" \"$pkg\"\n      DISABLED_COUNT=$((DISABLED_COUNT + 1))\n      info \"  ~ Deshabilitada: $pkg\"\n    else\n      warn \"  ? No se pudo procesar: $pkg\"\n    fi\n  done\n\n  ok \"Debloat completado \u2014 Removidas: $REMOVED_COUNT | Deshabilitadas: $DISABLED_COUNT\"\n}\n\n# =============================================================================\n# TELEMETR\u00cdA / ANALYTICS / ADS (sin root, v\u00eda pm + settings)\n# =============================================================================\nrun_telemetry_kill() {\n  [ \"$DO_TELEMETRY\" = \"0\" ] && { skip \"Telemetr\u00eda omitida (--no-telemetry)\"; return; }\n\n  section \"Eliminaci\u00f3n de telemetr\u00eda, analytics y servicios de publicidad\"\n\n  # Servicios de publicidad y tracking conocidos\n  TELEMETRY_PKGS=\"\ncom.google.android.gms.analytics\ncom.google.android.gms.ads\ncom.google.android.gms.ads.identifier\ncom.adjust.sdk\ncom.facebook.analytics\ncom.facebook.ads.service\ncom.appsflyer.sdk\ncom.moengage.core\ncom.braze.ui\ncom.segment.analytics\ncom.amplitude.android\ncom.mixpanel.android\ncom.flurry.android\ncom.crashlytics.sdk.android\nio.fabric.sdk.android\ncom.comscore.mobilemeasurement\ncom.nielsen.android\ncom.google.android.datatransport.runtime\ncom.motorola.motoanalytics\ncom.motorola.phonestats\ncom.qualcomm.qti.qdma\n\"\n\n  for pkg in $TELEMETRY_PKGS; do\n    pkg=$(echo \"$pkg\" | tr -d ' \\t\\r')\n    [ -z \"$pkg\" ] && continue\n    if pm list packages 2>/dev/null | cut -d: -f2 | grep -Fxq \"$pkg\"; then\n      if [ \"$DRY_RUN\" = \"0\" ]; then\n        pm disable-user --user 0 \"$pkg\" >> \"$LOGFILE\" 2>&1 && {\n          append_unique \"$DISABLED_STATE\" \"$pkg\"\n          DISABLED_COUNT=$((DISABLED_COUNT + 1))\n          info \"  ~ Telemetr\u00eda deshabilitada: $pkg\"\n        }\n      else\n        info \"[dry] Deshabilitar\u00eda telemetr\u00eda: $pkg\"\n      fi\n    fi\n  done\n\n  # Ajustes de privacidad/analytics del sistema\n  sput global assisted_gps_enabled 0\n  sput global send_action_app_error 0\n  sput global dropbox_max_files 0\n  sput global cpuinfo_max_freq_scale 0\n  sput system anr_show_background 0\n  sput secure send_security_reports 0\n\n  # Desactivar rastreo de uso de apps (UsageStatsManager feed)\n  sput global app_ops_constants \"no_historical\"\n\n  # Deshabilitar personalizaci\u00f3n por uso\n  sput global multi_cb 0\n\n  ok \"Telemetr\u00eda/analytics desactivados\"\n}\n\n# =============================================================================\n# LIMPIEZA DE CACH\u00c9 Y ARCHIVOS BASURA\n# =============================================================================\nclean_caches() {\n  section \"Limpieza profunda de cach\u00e9s y archivos basura\"\n\n  info \"Forzando cierre de apps en background...\"\n  if [ \"$DRY_RUN\" = \"0\" ]; then\n    am kill-all >> \"$LOGFILE\" 2>&1 || true\n    sleep 1\n  fi\n\n  info \"Liberando cach\u00e9 de aplicaciones (1GB l\u00edmite)...\"\n  run \"pm trim-caches 1073741824\"\n\n  # Archivos temporales en almacenamiento externo\n  info \"Eliminando archivos temporales (.tmp .crdownload .part)...\"\n  if [ \"$DRY_RUN\" = \"0\" ]; then\n    find \"/sdcard/Download\" -maxdepth 2 \\( -name \"*.tmp\" -o -name \"*.crdownload\" -o -name \"*.part\" \\) -type f -delete 2>/dev/null || true\n    find \"/sdcard/Android/data\" -maxdepth 3 -name \"*.log\" -type f -size +256k -delete 2>/dev/null || true\n    find \"/sdcard/Android/data\" -maxdepth 3 -name \"*.trace\" -type f -delete 2>/dev/null || true\n    find \"/sdcard\" -maxdepth 3 -name \"*.bak\" -type f -delete 2>/dev/null || true\n    find \"/sdcard\" -maxdepth 3 -name \"thumbs.db\" -type f -delete 2>/dev/null || true\n    find \"/sdcard\" -maxdepth 4 -name \".nomedia\" -empty -delete 2>/dev/null || true\n    find \"/sdcard/DCIM\" -maxdepth 2 -name \".thumbnails\" -type d -exec rm -rf {} + 2>/dev/null || true\n    find \"/sdcard/DCIM/.thumbnails\" -type f -delete 2>/dev/null || true\n    find \"/sdcard/Pictures/.thumbnails\" -type f -delete 2>/dev/null || true\n  else\n    info \"[dry] find /sdcard -name '*.tmp|*.crdownload|*.log|*.trace|*.bak' -delete\"\n    info \"[dry] find /sdcard/DCIM -name '.thumbnails' -delete\"\n  fi\n\n  # Con root: cach\u00e9s del sistema, logs, ANRs, tombstones\n  if [ \"$HAS_ROOT\" = \"1\" ]; then\n    info \"Limpiando cach\u00e9s del sistema (root)...\"\n    run_root \"sync\"\n    run_root \"echo 3 > /proc/sys/vm/drop_caches\"\n\n    [ \"$MODE\" != \"safe\" ] && {\n      run_root \"rm -rf /data/anr/* 2>/dev/null || true\"\n      run_root \"rm -rf /data/tombstones/* 2>/dev/null || true\"\n      run_root \"rm -rf /data/system/dropbox/* 2>/dev/null || true\"\n      run_root \"rm -rf /data/system/traces/* 2>/dev/null || true\"\n      run_root \"rm -rf /data/resource-cache/* 2>/dev/null || true\"\n      run_root \"rm -rf /data/log/* 2>/dev/null || true\"\n      run_root \"rm -rf /data/local/tmp/* 2>/dev/null || true\"\n      run_root \"rm -rf /cache/* 2>/dev/null || true\"\n      run_root \"rm -rf /data/system/heapdump/* 2>/dev/null || true\"\n      run_root \"find /data/data -maxdepth 3 -name 'crash_*.log' -delete 2>/dev/null || true\"\n      run_root \"find /data/data -maxdepth 3 -name '*.oom' -delete 2>/dev/null || true\"\n      ok \"Cach\u00e9s del sistema eliminadas\"\n    }\n  fi\n\n  # Enviar se\u00f1al TRIM de memoria a apps en background (sin root)\n  info \"Enviando se\u00f1al de liberaci\u00f3n de RAM a procesos background...\"\n  if [ \"$DRY_RUN\" = \"0\" ]; then\n    # Trim memory level 80 = TRIM_MEMORY_BACKGROUND\n    for pkg in $(pm list packages -3 2>/dev/null | cut -d: -f2); do\n      am send-trim-memory \"$pkg\" 80 >> \"$LOGFILE\" 2>&1 || true\n    done\n  fi\n\n  ok \"Limpieza de cach\u00e9s completada\"\n}\n\n# =============================================================================\n# GESTI\u00d3N DE MEMORIA: zRAM + OOM + Compactaci\u00f3n\n# =============================================================================\ntune_memory() {\n  section \"Gesti\u00f3n avanzada de memoria\"\n\n  # \u2500\u2500 zRAM (requiere root) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  if [ \"$HAS_ROOT\" = \"1\" ]; then\n    ZRAM_DEV=\"/dev/block/zram0\"\n    if [ -e \"$ZRAM_DEV\" ] || [ -d \"/sys/block/zram0\" ]; then\n      info \"Configurando zRAM...\"\n      ZRAM_SIZE_MB=$((TOTAL_RAM_MB / 2))\n      [ \"$ZRAM_SIZE_MB\" -lt 512 ] && ZRAM_SIZE_MB=512\n      [ \"$ZRAM_SIZE_MB\" -gt 4096 ] && ZRAM_SIZE_MB=4096\n      ZRAM_SIZE_B=$((ZRAM_SIZE_MB * 1024 * 1024))\n\n      run_root \"swapoff /dev/block/zram0 2>/dev/null || true\"\n      run_root \"echo 1 > /sys/block/zram0/reset 2>/dev/null || true\"\n      run_root \"echo lz4 > /sys/block/zram0/comp_algorithm 2>/dev/null || true\"\n      run_root \"echo $ZRAM_SIZE_B > /sys/block/zram0/disksize 2>/dev/null || true\"\n      run_root \"mkswap /dev/block/zram0 2>/dev/null || true\"\n      run_root \"swapon -p 5 /dev/block/zram0 2>/dev/null || true\"\n      ok \"zRAM configurado: ${ZRAM_SIZE_MB}MB con compresor lz4\"\n    else\n      info \"zRAM no disponible en este dispositivo\"\n    fi\n\n    # OOM killer minfree: ajustar niveles para liberar RAM m\u00e1s agresivamente\n    info \"Ajustando OOM killer (minfree)...\"\n    OOM_PATH=\"/sys/module/lowmemorykiller/parameters/minfree\"\n    if [ -f \"$OOM_PATH\" ]; then\n      case \"$MODE\" in\n        balanced)   run_root \"echo '18432,23040,27648,32256,55296,80640' > $OOM_PATH 2>/dev/null || true\" ;;\n        aggressive) run_root \"echo '18432,23040,27648,36864,65536,92160' > $OOM_PATH 2>/dev/null || true\" ;;\n        godmode)    run_root \"echo '18432,23040,27648,46080,72192,100352' > $OOM_PATH 2>/dev/null || true\" ;;\n      esac\n      ok \"OOM killer minfree ajustado\"\n    fi\n\n    # Compactaci\u00f3n de memoria activa\n    if [ \"$MODE\" = \"aggressive\" ] || [ \"$MODE\" = \"godmode\" ]; then\n      info \"Forzando compactaci\u00f3n de memoria...\"\n      run_root \"echo 1 > /proc/sys/vm/compact_memory 2>/dev/null || true\"\n      ok \"Compactaci\u00f3n de memoria ejecutada\"\n    fi\n  fi\n\n  # \u2500\u2500 Ajustes de VM sin root \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  sput global min_free_kbytes_adj 0  # No aumentar m\u00ednimo de kernel\n\n  # Limitar procesos en cach\u00e9 seg\u00fan RAM disponible\n  if [ \"$TOTAL_RAM_MB\" -le 4096 ]; then\n    MAX_CACHED=10\n  elif [ \"$TOTAL_RAM_MB\" -le 8192 ]; then\n    MAX_CACHED=16\n  else\n    MAX_CACHED=24\n  fi\n\n  case \"$MODE\" in\n    safe)       ;;\n    balanced)   sput global activity_manager_max_cached_processes $MAX_CACHED ;;\n    aggressive) sput global activity_manager_max_cached_processes $((MAX_CACHED - 4))\n                sput global limit_background_processes 6 ;;\n    godmode)    sput global activity_manager_max_cached_processes $((MAX_CACHED - 8))\n                sput global limit_background_processes 4 ;;\n  esac\n\n  ok \"Gesti\u00f3n de memoria configurada\"\n}\n\n# =============================================================================\n# APP STANDBY BUCKETS \u2014 forzar apps no usadas a modo RARE/RESTRICTED\n# =============================================================================\nrun_standby_buckets() {\n  [ \"$MODE\" = \"safe\" ] && return\n\n  section \"App Standby Buckets (ahorro de bater\u00eda/RAM)\"\n  info \"Forzando standby a apps no activas...\"\n\n  # Obtener lista de apps de terceros instaladas\n  PKG_LIST=$(pm list packages -3 2>/dev/null | cut -d: -f2)\n\n  if [ \"$DRY_RUN\" = \"0\" ]; then\n    for pkg in $PKG_LIST; do\n      [ -z \"$pkg\" ] && continue\n      case \"$MODE\" in\n        balanced)\n          am set-standby-bucket \"$pkg\" rare >> \"$LOGFILE\" 2>&1 || true\n          ;;\n        aggressive|godmode)\n          am set-standby-bucket \"$pkg\" restricted >> \"$LOGFILE\" 2>&1 || true\n          ;;\n      esac\n    done\n  else\n    info \"[dry] am set-standby-bucket <apps> rare/restricted\"\n  fi\n\n  ok \"Standby buckets configurados\"\n}\n\n# =============================================================================\n# BATTERY OPTIMIZER \u2014 Doze mode + por-app battery optimization\n# =============================================================================\nrun_battery_optimization() {\n  [ \"$DO_BATTERY\" = \"0\" ] && { skip \"Bater\u00eda omitida (--no-battery)\"; return; }\n\n  section \"Optimizaci\u00f3n de bater\u00eda (Doze + por-app)\"\n\n  # Forzar Doze inmediato\n  info \"Activando Doze mode forzado...\"\n  if [ \"$DRY_RUN\" = \"0\" ]; then\n    dumpsys deviceidle enable >> \"$LOGFILE\" 2>&1 || true\n    dumpsys deviceidle step >> \"$LOGFILE\" 2>&1 || true\n    dumpsys deviceidle step >> \"$LOGFILE\" 2>&1 || true\n  else\n    info \"[dry] dumpsys deviceidle enable + step\"\n  fi\n\n  # Forzar optimizaci\u00f3n de bater\u00eda en todas las apps de terceros\n  info \"Forzando optimizaci\u00f3n de bater\u00eda en apps de terceros...\"\n  if [ \"$DRY_RUN\" = \"0\" ]; then\n    for pkg in $(pm list packages -3 2>/dev/null | cut -d: -f2); do\n      [ -z \"$pkg\" ] && continue\n      dumpsys battery reset >> \"$LOGFILE\" 2>&1 || true\n      cmd appops set \"$pkg\" RUN_ANY_IN_BACKGROUND ignore >> \"$LOGFILE\" 2>&1 || true\n    done\n  else\n    info \"[dry] cmd appops set <apps> RUN_ANY_IN_BACKGROUND ignore\"\n  fi\n\n  # Ajustes de bater\u00eda v\u00eda settings\n  case \"$MODE\" in\n    safe|balanced|aggressive)\n      sput global adaptive_battery_enabled 1\n      sput global adaptive_battery 1\n      sput global low_power_sticky_auto_disable_enabled 1\n      ;;\n    godmode)\n      sput global adaptive_battery_enabled 0\n      sput global low_power 1\n      sput global low_power_sticky 1\n      sput global low_power_sticky_auto_disable_enabled 0\n      ;;\n  esac\n\n  # Reducir wakelock timeout\n  sput global wake_lock_tag_check 0\n  sput global wifi_max_dhcp_retry_count 3\n  sput global wifi_mobile_data_transition_wakelock_timeout_ms 60000\n\n  # Alarmas: reducir wakeup exacto innecesario\n  sput global battery_saver_constants \"vibration_disabled=true,animation_disabled=false\"\n\n  # Sincronizaci\u00f3n en background\n  case \"$MODE\" in\n    aggressive|godmode)\n      sput global sync_disabled_on_cellular 1\n      sput global background_data_enabled 0\n      info \"Sincronizaci\u00f3n en datos m\u00f3viles desactivada\"\n      ;;\n  esac\n\n  # Reporting de wakelocks abusivos\n  info \"Detectando wakelocks abusivos...\"\n  WAKELOCK_REPORT=$(dumpsys power 2>/dev/null | grep \"PARTIAL_WAKE_LOCK\" | sort -k5 -rn | head -10 2>/dev/null || echo \"(no disponible)\")\n  log \"TOP WAKELOCKS: $WAKELOCK_REPORT\"\n  [ \"$VERBOSE\" = \"1\" ] && [ \"$SILENT\" = \"0\" ] && {\n    say \"${Y}  Top wakelocks detectados (ver log para detalle):${NC}\"\n    echo \"$WAKELOCK_REPORT\" | head -5 | while IFS= read -r line; do\n      say \"${DIM}    $line${NC}\"\n    done\n  }\n\n  ok \"Bater\u00eda optimizada\"\n}\n\n# =============================================================================\n# OPTIMIZACI\u00d3N DE RED\n# =============================================================================\nrun_network_settings() {\n  [ \"$DO_NETWORK\" = \"0\" ] && { skip \"Red omitida (--no-network)\"; return; }\n\n  section \"Optimizaci\u00f3n de red\"\n\n  # WiFi scan interval\n  info \"Optimizando escaneo WiFi...\"\n  case \"$MODE\" in\n    safe)             sput global wifi_scan_interval_ms 90000 ;;\n    balanced)         sput global wifi_scan_interval_ms 180000 ;;\n    aggressive|godmode) sput global wifi_scan_interval_ms 300000 ;;\n  esac\n  sput global wifi_scan_always_enabled 0\n  sput global wifi_wakeup_enabled 0          # Evita despertar por WiFi conocidas\n  sput global network_recommendations_enabled 0\n\n  # BLE background\n  [ \"$MODE\" = \"aggressive\" ] || [ \"$MODE\" = \"godmode\" ] && {\n    sput global ble_scan_always_enabled 0\n    info \"Escaneo BLE en background deshabilitado\"\n  }\n\n  # DNS privado Cloudflare\n  info \"Configurando DNS privado (Cloudflare 1.1.1.1)...\"\n  sput global private_dns_mode hostname\n  if [ \"$DRY_RUN\" = \"0\" ]; then\n    settings put global private_dns_specifier \"1dot1dot1dot1.cloudflare-dns.com\" >> \"$LOGFILE\" 2>&1 || true\n  else\n    info \"[dry] DNS privado -> 1dot1dot1dot1.cloudflare-dns.com\"\n  fi\n\n  # Reducir data de background de apps\n  [ \"$MODE\" = \"aggressive\" ] || [ \"$MODE\" = \"godmode\" ] && {\n    sput global data_roaming 0\n    info \"Datos en roaming desactivados\"\n  }\n\n  # Captive portal check: apuntar a servidor neutro (evita ping a Google)\n  sput global captive_portal_mode 0\n  sput global captive_portal_detection_enabled 0\n\n  ok \"Red optimizada\"\n}\n\n# =============================================================================\n# AJUSTES DE RENDIMIENTO\n# =============================================================================\nrun_performance_settings() {\n  [ \"$DO_PERF\" = \"0\" ] && { skip \"Performance omitido (--no-perf)\"; return; }\n\n  section \"Ajustes de rendimiento del sistema\"\n\n  # \u2500\u2500 Animaciones \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  info \"Ajustando escalas de animaci\u00f3n...\"\n  case \"$MODE\" in\n    safe)              anim=\"0.5\" ;;\n    balanced)          anim=\"0.35\" ;;\n    aggressive)        anim=\"0.1\" ;;\n    godmode)           anim=\"0.0\" ;;\n  esac\n  sput global window_animation_scale \"$anim\"\n  sput global transition_animation_scale \"$anim\"\n  sput global animator_duration_scale \"$anim\"\n\n  # \u2500\u2500 Tasa de refresco \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  info \"Configurando tasa de refresco...\"\n  sput system peak_refresh_rate 120\n  case \"$MODE\" in\n    safe|balanced)      sput system min_refresh_rate 60 ;;\n    aggressive|godmode) sput system min_refresh_rate 120 ;;\n  esac\n\n  # \u2500\u2500 Rendering \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  sput global disable_window_blurs 1\n  sput global debug_view_attributes 0\n  sput global show_surface_updates 0\n  sput global show_cpu_usage 0\n  sput global gpu_debug_level 0\n  sput global force_hw_ui 1              # Forzar aceleraci\u00f3n por hardware\n  sput global force_4x_msaa 0           # Desactivar MSAA 4x (carga GPU)\n  sput system gpu_overdraw 0\n\n  # \u2500\u2500 Servicios de debug en runtime \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  info \"Desactivando overhead de debug...\"\n  sput global debug_app \"\"\n  sput global wait_for_debugger 0\n  sput global enable_gpu_debug_layers 0\n  sput secure mock_location 0\n  sput global adb_enabled 0             # Desactivar ADB cuando no se usa\n  # NOTA: si est\u00e1s usando ADB ahora, re-act\u00edvalo con:\n  # settings put global adb_enabled 1\n\n  # \u2500\u2500 Timeout de teclado t\u00e1ctil \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  case \"$MODE\" in\n    safe)       sput secure long_press_timeout 500 ;;\n    balanced)   sput secure long_press_timeout 400 ;;\n    aggressive) sput secure long_press_timeout 250 ;;\n    godmode)    sput secure long_press_timeout 150 ;;\n  esac\n\n  # \u2500\u2500 Brillo y pantalla \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  sput system screen_brightness_mode 1       # Brillo autom\u00e1tico ON\n\n  case \"$MODE\" in\n    aggressive|godmode)\n      sput system screen_off_timeout 30000   # 30 seg para apagar pantalla\n      ;;\n    balanced)\n      sput system screen_off_timeout 60000\n      ;;\n  esac\n\n  # \u2500\u2500 Vibraci\u00f3n (godmode) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  [ \"$MODE\" = \"godmode\" ] && {\n    sput system haptic_feedback_enabled 0\n    sput system vibrate_on 0\n    sput system vibrate_when_ringing 0\n    info \"Vibraci\u00f3n deshabilitada (godmode)\"\n  }\n\n  # \u2500\u2500 Bater\u00eda adaptativa \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  case \"$MODE\" in\n    safe|balanced|aggressive) sput global adaptive_battery_enabled 1 ;;\n    godmode)                  sput global adaptive_battery_enabled 0 ;;\n  esac\n\n  # \u2500\u2500 Reducir uso de red del launcher/sugerencias \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  sput global package_verifier_enable 1      # mantener verificaci\u00f3n de seguridad\n  sput global verifier_network_enabled 1\n\n  ok \"Ajustes de rendimiento aplicados\"\n}\n\n# =============================================================================\n# KERNEL TUNING (root)\n# =============================================================================\nrun_kernel_tuning() {\n  [ \"$DO_KERNEL\" = \"0\" ] && return\n  [ \"$HAS_ROOT\" = \"0\" ] && return\n  [ \"$MODE\" = \"safe\" ] && return\n\n  section \"Kernel tuning (root)\"\n\n  # \u2500\u2500 CPU governor \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  info \"Configurando CPU governor...\"\n  for cpu_dir in /sys/devices/system/cpu/cpu*/cpufreq; do\n    [ -d \"$cpu_dir\" ] || continue\n    AVAIL_GOV=$(cat \"$cpu_dir/scaling_available_governors\" 2>/dev/null || echo \"\")\n    GOV=\"\"\n    for pref in schedutil interactive ondemand powersave; do\n      echo \"$AVAIL_GOV\" | grep -qw \"$pref\" && GOV=\"$pref\" && break\n    done\n    [ \"$MODE\" = \"godmode\" ] && echo \"$AVAIL_GOV\" | grep -qw \"performance\" && GOV=\"performance\"\n    [ -z \"$GOV\" ] && continue\n    run_root \"echo $GOV > $cpu_dir/scaling_governor 2>/dev/null || true\"\n\n    # Frecuencia m\u00e1xima en godmode\n    [ \"$MODE\" = \"godmode\" ] && {\n      MAX_FREQ=$(cat \"$cpu_dir/cpuinfo_max_freq\" 2>/dev/null || echo \"\")\n      [ -n \"$MAX_FREQ\" ] && run_root \"echo $MAX_FREQ > $cpu_dir/scaling_max_freq 2>/dev/null || true\"\n    }\n\n    # Frecuencia m\u00ednima en aggressive/godmode: subir el piso de rendimiento\n    [ \"$MODE\" = \"aggressive\" ] || [ \"$MODE\" = \"godmode\" ] && {\n      MIN_FREQ=$(cat \"$cpu_dir/cpuinfo_min_freq\" 2>/dev/null || echo \"\")\n      CUR_MAX=$(cat \"$cpu_dir/scaling_max_freq\" 2>/dev/null || echo \"\")\n      [ -n \"$MIN_FREQ\" ] && [ -n \"$CUR_MAX\" ] && {\n        FLOOR=$((CUR_MAX / 4))\n        [ $FLOOR -gt $MIN_FREQ ] && run_root \"echo $FLOOR > $cpu_dir/scaling_min_freq 2>/dev/null || true\"\n      }\n    }\n  done\n  ok \"CPU governor configurado\"\n\n  # \u2500\u2500 GPU governor \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  info \"Configurando GPU governor...\"\n  for gpu_dir in /sys/class/kgsl/kgsl-3d0 /sys/devices/platform/*gpu*; do\n    [ -d \"$gpu_dir\" ] || continue\n\n    # Adreno GPU (Qualcomm)\n    if [ -f \"$gpu_dir/devfreq/governor\" ]; then\n      AVAIL_GPUGOV=$(cat \"$gpu_dir/devfreq/available_governors\" 2>/dev/null || echo \"\")\n      GPU_GOV=\"msm-adreno-tz\"\n      echo \"$AVAIL_GPUGOV\" | grep -qw \"msm-adreno-tz\" || GPU_GOV=\"simple_ondemand\"\n      [ \"$MODE\" = \"godmode\" ] && echo \"$AVAIL_GPUGOV\" | grep -qw \"performance\" && GPU_GOV=\"performance\"\n      run_root \"echo $GPU_GOV > $gpu_dir/devfreq/governor 2>/dev/null || true\"\n      ok \"  GPU governor: $GPU_GOV\"\n    fi\n\n    # Adreno: perfil de rendimiento\n    if [ -f \"$gpu_dir/perfcounter\" ]; then\n      run_root \"echo 1 > $gpu_dir/perfcounter 2>/dev/null || true\"\n    fi\n    if [ -f \"$gpu_dir/force_clk_on\" ]; then\n      run_root \"echo 0 > $gpu_dir/force_clk_on 2>/dev/null || true\"  # no forzar reloj cuando inactivo\n    fi\n    if [ -f \"$gpu_dir/idle_timer\" ]; then\n      run_root \"echo 80 > $gpu_dir/idle_timer 2>/dev/null || true\"   # 80ms idle antes de bajar freq\n    fi\n  done\n\n  # \u2500\u2500 VM / swappiness \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  info \"Ajustando VM (swappiness, cache pressure, dirty ratios)...\"\n  case \"$MODE\" in\n    balanced)   run_root \"echo 40 > /proc/sys/vm/swappiness 2>/dev/null || true\" ;;\n    aggressive) run_root \"echo 20 > /proc/sys/vm/swappiness 2>/dev/null || true\" ;;\n    godmode)    run_root \"echo 10 > /proc/sys/vm/swappiness 2>/dev/null || true\" ;;\n  esac\n  run_root \"echo 80  > /proc/sys/vm/vfs_cache_pressure 2>/dev/null || true\"\n  run_root \"echo 10  > /proc/sys/vm/dirty_ratio 2>/dev/null || true\"\n  run_root \"echo 5   > /proc/sys/vm/dirty_background_ratio 2>/dev/null || true\"\n  run_root \"echo 3000 > /proc/sys/vm/dirty_writeback_centisecs 2>/dev/null || true\"\n  run_root \"echo 0   > /proc/sys/vm/overcommit_memory 2>/dev/null || true\"\n  run_root \"echo 50  > /proc/sys/vm/overcommit_ratio 2>/dev/null || true\"\n  run_root \"echo 1   > /proc/sys/vm/page-cluster 2>/dev/null || true\"  # menos readahead swap\n\n  # \u2500\u2500 I/O scheduler \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  info \"Ajustando I/O scheduler...\"\n  for blk in /sys/block/sda /sys/block/sdb /sys/block/mmcblk0 /sys/block/mmcblk1; do\n    [ -d \"$blk/queue\" ] || continue\n    AVAIL_SCHED=$(cat \"$blk/queue/scheduler\" 2>/dev/null || echo \"\")\n    if echo \"$AVAIL_SCHED\" | grep -q \"mq-deadline\"; then\n      run_root \"echo mq-deadline > $blk/queue/scheduler 2>/dev/null || true\"\n    elif echo \"$AVAIL_SCHED\" | grep -q \"cfq\"; then\n      run_root \"echo cfq > $blk/queue/scheduler 2>/dev/null || true\"\n    elif echo \"$AVAIL_SCHED\" | grep -q \"none\"; then\n      run_root \"echo none > $blk/queue/scheduler 2>/dev/null || true\"\n    fi\n    run_root \"echo 512 > $blk/queue/read_ahead_kb 2>/dev/null || true\"\n    run_root \"echo 0   > $blk/queue/add_random 2>/dev/null || true\"\n    run_root \"echo 2   > $blk/queue/rq_affinity 2>/dev/null || true\"\n    run_root \"echo 0   > $blk/queue/rotational 2>/dev/null || true\"\n    run_root \"echo 1   > $blk/queue/nomerges 2>/dev/null || true\"\n  done\n\n  # \u2500\u2500 TCP (aggressive/godmode) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  if [ \"$MODE\" = \"aggressive\" ] || [ \"$MODE\" = \"godmode\" ]; then\n    info \"Ajustando par\u00e1metros TCP...\"\n    run_root \"echo bbr > /proc/sys/net/ipv4/tcp_congestion_control 2>/dev/null || \\\n              echo cubic > /proc/sys/net/ipv4/tcp_congestion_control 2>/dev/null || true\"\n    run_root \"echo 1   > /proc/sys/net/ipv4/tcp_low_latency 2>/dev/null || true\"\n    run_root \"echo 1   > /proc/sys/net/ipv4/tcp_fastopen 2>/dev/null || true\"\n    run_root \"echo 1   > /proc/sys/net/ipv4/tcp_timestamps 2>/dev/null || true\"\n    run_root \"echo 1   > /proc/sys/net/ipv4/tcp_sack 2>/dev/null || true\"\n    run_root \"echo 0   > /proc/sys/net/ipv4/tcp_slow_start_after_idle 2>/dev/null || true\"\n    run_root \"echo 4096 131072 16777216 > /proc/sys/net/ipv4/tcp_rmem 2>/dev/null || true\"\n    run_root \"echo 4096 65536  16777216 > /proc/sys/net/ipv4/tcp_wmem 2>/dev/null || true\"\n    run_root \"echo 16777216 > /proc/sys/net/core/rmem_max 2>/dev/null || true\"\n    run_root \"echo 16777216 > /proc/sys/net/core/wmem_max 2>/dev/null || true\"\n    run_root \"echo 5   > /proc/sys/net/ipv4/tcp_keepalive_probes 2>/dev/null || true\"\n    run_root \"echo 60  > /proc/sys/net/ipv4/tcp_keepalive_intvl 2>/dev/null || true\"\n    run_root \"echo 600 > /proc/sys/net/ipv4/tcp_keepalive_time 2>/dev/null || true\"\n  fi\n\n  # \u2500\u2500 Entrop\u00eda del kernel \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  info \"Optimizando pool de entrop\u00eda...\"\n  run_root \"echo 512 > /proc/sys/kernel/random/read_wakeup_threshold 2>/dev/null || true\"\n  run_root \"echo 128 > /proc/sys/kernel/random/write_wakeup_threshold 2>/dev/null || true\"\n\n  # \u2500\u2500 Scheduler del kernel \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  info \"Ajustando scheduler del kernel...\"\n  run_root \"echo 1000000 > /proc/sys/kernel/sched_latency_ns 2>/dev/null || true\"\n  run_root \"echo 200000  > /proc/sys/kernel/sched_min_granularity_ns 2>/dev/null || true\"\n  run_root \"echo 1000000 > /proc/sys/kernel/sched_wakeup_granularity_ns 2>/dev/null || true\"\n  run_root \"echo 0       > /proc/sys/kernel/sched_child_runs_first 2>/dev/null || true\"\n  run_root \"echo 1       > /proc/sys/kernel/sched_autogroup_enabled 2>/dev/null || true\"\n\n  ok \"Kernel tuning completado\"\n}\n\n# =============================================================================\n# BLOQUEO DE TRACKERS en /etc/hosts (root)\n# =============================================================================\nrun_host_blocker() {\n  [ \"$HAS_ROOT\" = \"0\" ] && return\n  [ \"$DO_TELEMETRY\" = \"0\" ] && return\n  [ \"$MODE\" = \"safe\" ] && return\n\n  section \"Bloqueo de trackers en /etc/hosts\"\n\n  HOSTS_FILE=\"/etc/hosts\"\n  if [ ! -f \"${HOSTS_BACKUP}.bak\" ]; then\n    run_root \"cp $HOSTS_FILE ${HOSTS_BACKUP}.bak 2>/dev/null\"\n    ok \"Backup de hosts: ${HOSTS_BACKUP}.bak\"\n  fi\n\n  TRACKER_DOMAINS=\"\ngraph.facebook.com\nconnect.facebook.net\nanalytics.google.com\nwww.google-analytics.com\nssl.google-analytics.com\ngoogletagmanager.com\napp.appsflyer.com\nt.appsflyer.com\napi.amplitude.com\napi2.amplitude.com\nmobile.pipe.aria.microsoft.com\ntelemetry.microsoft.com\nvortex.data.microsoft.com\nsettings-win.data.microsoft.com\nfirebase-settings.crashlytics.com\nreports.crashlytics.com\napp.adjust.com\ns.adjust.com\napi.flurry.com\ndata.flurry.com\ntracker.theads.com\niadsdk.apple.com\nanalytics.twitter.com\nstatic.ads-twitter.com\nads.linkedin.com\napp.mixpanel.com\napi.mixpanel.com\napi.segment.io\ncdn.segment.com\nsc-analytics.appspot.com\ne.crashlytics.com\nsmetrics.samsung.com\nlog-sdk.iot.mi.com\ntracking.miui.com\n\"\n\n  info \"A\u00f1adiendo $( echo \"$TRACKER_DOMAINS\" | sed '/^[[:space:]]*$/d' | wc -l) dominios de trackers a /etc/hosts...\"\n\n  if [ \"$DRY_RUN\" = \"0\" ]; then\n    HOSTS_ENTRY=\"# TITAN v${VERSION} tracker block -- $(date)\\n\"\n    for domain in $TRACKER_DOMAINS; do\n      domain=$(echo \"$domain\" | tr -d ' \\t\\r')\n      [ -z \"$domain\" ] && continue\n      grep -q \"$domain\" \"$HOSTS_FILE\" 2>/dev/null && continue\n      HOSTS_ENTRY=\"${HOSTS_ENTRY}127.0.0.1 $domain\\n0.0.0.0 $domain\\n\"\n      TRACKERS_BLOCKED=$((TRACKERS_BLOCKED + 1))\n    done\n    run_root \"printf '$HOSTS_ENTRY' >> $HOSTS_FILE 2>/dev/null || true\"\n    ok \"Trackers bloqueados en /etc/hosts: $TRACKERS_BLOCKED dominios\"\n  else\n    info \"[dry] A\u00f1adir\u00eda dominios de trackers a /etc/hosts\"\n  fi\n}\n\n# =============================================================================\n# OPTIMIZACI\u00d3N SQLite\n# =============================================================================\noptimize_databases() {\n  [ \"$MODE\" = \"safe\" ] && return\n  [ \"$HAS_ROOT\" = \"0\" ] && { info \"SQLite VACUUM requiere root \u2014 omitido\"; return; }\n\n  section \"Optimizaci\u00f3n de bases de datos SQLite\"\n  info \"Ejecutando VACUUM + ANALYZE + integrity_check...\"\n\n  if [ \"$DRY_RUN\" = \"0\" ]; then\n    find /data/data -name \"*.db\" -type f 2>/dev/null | while IFS= read -r db; do\n      su -c \"sqlite3 \\\"$db\\\" 'PRAGMA integrity_check; VACUUM; ANALYZE;'\" >> \"$LOGFILE\" 2>&1 || true\n    done\n  else\n    info \"[dry] sqlite3 VACUUM + ANALYZE en /data/data/**/*.db\"\n  fi\n  ok \"Bases de datos SQLite optimizadas\"\n}\n\n# =============================================================================\n# FSTRIM\n# =============================================================================\nrun_fstrim() {\n  [ \"$MODE\" = \"safe\" ] && return\n  [ \"$HAS_ROOT\" = \"0\" ] && { info \"FSTRIM requiere root \u2014 omitido\"; return; }\n\n  section \"FSTRIM del almacenamiento flash\"\n  info \"Ejecutando fstrim en particiones...\"\n  for mountpoint in /data /cache /sdcard /system /vendor; do\n    run_root \"fstrim $mountpoint 2>/dev/null || true\"\n  done\n  ok \"FSTRIM completado\"\n}\n\n# =============================================================================\n# DEX OPTIMIZATION\n# =============================================================================\nrun_dex_optimization() {\n  [ \"$DO_DEX\" = \"0\" ] && { skip \"DEX omitido (--no-dex)\"; return; }\n  [ \"$MODE\" = \"safe\" ] && return\n\n  section \"Optimizaci\u00f3n DEX (dex2oat)\"\n  info \"Recompilando apps con speed-profile...\"\n\n  if [ \"$DRY_RUN\" = \"0\" ]; then\n    cmd package compile -m speed-profile -a >> \"$LOGFILE\" 2>&1 || \\\n      pm compile -m speed-profile -a >> \"$LOGFILE\" 2>&1 || \\\n      warn \"dex2oat no disponible\"\n\n    # Para godmode: recompilar tambi\u00e9n con speed para apps core\n    [ \"$MODE\" = \"godmode\" ] && {\n      info \"Recompilando apps del sistema con 'speed'...\"\n      cmd package compile -m speed com.android.systemui >> \"$LOGFILE\" 2>&1 || true\n      cmd package compile -m speed com.android.settings >> \"$LOGFILE\" 2>&1 || true\n      cmd package compile -m speed com.google.android.gms >> \"$LOGFILE\" 2>&1 || true\n    }\n\n    ok \"DEX optimization completada\"\n  else\n    info \"[dry] cmd package compile -m speed-profile -a\"\n  fi\n}\n\n# =============================================================================\n# SNAPSHOT DE M\u00c9TRICAS\n# =============================================================================\nget_snapshot() {\n  label=\"$1\"\n  {\n    echo \"=== SNAPSHOT: $label \u2014 $(date) ===\"\n    echo \"\"\n    echo \"--- Memoria ---\"\n    cat /proc/meminfo 2>/dev/null | head -10\n    echo \"\"\n    echo \"--- Almacenamiento ---\"\n    df -h /sdcard 2>/dev/null || df -h /data 2>/dev/null\n    echo \"\"\n    echo \"--- Procesos activos ---\"\n    ps 2>/dev/null | wc -l | xargs echo \"Total procesos:\"\n    echo \"\"\n    echo \"--- Bater\u00eda ---\"\n    dumpsys battery 2>/dev/null | grep -E \"level|status|health|temperature|voltage\"\n    echo \"\"\n    echo \"--- CPU freq actual ---\"\n    for f in /sys/devices/system/cpu/cpu*/cpufreq/scaling_cur_freq; do\n      [ -f \"$f\" ] && printf \"  %s: %s kHz\\n\" \"$f\" \"$(cat \"$f\")\"\n    done 2>/dev/null\n    echo \"\"\n    echo \"--- zRAM ---\"\n    cat /proc/swaps 2>/dev/null || echo \"(no swap)\"\n    echo \"\"\n  }\n}\n\n# =============================================================================\n# REPORTE FINAL (TXT + HTML)\n# =============================================================================\ngenerate_report() {\n  section \"Generando reporte final\"\n\n  [ -f \"$DEBLOAT_STATE\" ]  && REMOVED_COUNT=$(grep -c . \"$DEBLOAT_STATE\"  2>/dev/null || echo 0)\n  [ -f \"$DISABLED_STATE\" ] && DISABLED_COUNT=$(grep -c . \"$DISABLED_STATE\" 2>/dev/null || echo 0)\n\n  FREE_RAM_AFTER=$(awk '/MemAvailable/{printf \"%d\", $2/1024}' /proc/meminfo 2>/dev/null || echo 0)\n  FREE_STORAGE_AFTER=$(df -h /sdcard 2>/dev/null | awk 'NR==2{print $4}' || echo \"?\")\n  RAM_FREED=$((FREE_RAM_AFTER - FREE_RAM_BEFORE))\n\n  # \u2500\u2500 Reporte TXT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  {\n    echo \"\u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557\"\n    echo \"\u2551          TITAN v${VERSION} \u2014 Reporte de Optimizaci\u00f3n            \u2551\"\n    echo \"\u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d\"\n    echo \"\"\n    echo \"Dispositivo       : $DEVICE_MODEL\"\n    echo \"Android           : $ANDROID_VER (API $API_LEVEL)\"\n    echo \"Chipset           : $CHIPSET\"\n    echo \"Modo              : $MODE\"\n    echo \"Root              : $([ $HAS_ROOT -eq 1 ] && echo S\u00cd || echo NO)\"\n    echo \"Dry run           : $([ $DRY_RUN -eq 1 ] && echo S\u00cd || echo NO)\"\n    echo \"Fecha             : $(date)\"\n    echo \"\"\n    echo \"\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\"\n    echo \"  RESULTADOS\"\n    echo \"\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\"\n    echo \"Apps removidas       : $REMOVED_COUNT\"\n    echo \"Apps deshabilitadas  : $DISABLED_COUNT\"\n    echo \"Trackers bloqueados  : $TRACKERS_BLOCKED dominios\"\n    echo \"\"\n    echo \"RAM libre antes      : ${FREE_RAM_BEFORE}MB\"\n    echo \"RAM libre despu\u00e9s    : ${FREE_RAM_AFTER}MB\"\n    echo \"RAM liberada (delta) : +${RAM_FREED}MB\"\n    echo \"\"\n    echo \"Storage antes        : $FREE_STORAGE_BEFORE\"\n    echo \"Storage despu\u00e9s      : $FREE_STORAGE_AFTER\"\n    echo \"\"\n    echo \"\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\"\n    echo \"  OPTIMIZACIONES APLICADAS\"\n    echo \"\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\"\n    echo \"[\u2713] Cach\u00e9 limpiada (trim-caches + archivos basura)\"\n    echo \"[\u2713] Archivos temporales eliminados (.tmp .crdownload .log .trace .bak)\"\n    echo \"[\u2713] Miniaturas de galer\u00eda eliminadas\"\n    [ \"$DO_PERF\" = \"1\" ]      && echo \"[\u2713] Animaciones reducidas a ${anim}x\"\n    [ \"$DO_PERF\" = \"1\" ]      && echo \"[\u2713] Refresh rate configurado (120Hz peak)\"\n    [ \"$DO_PERF\" = \"1\" ]      && echo \"[\u2713] Debug/overlay de sistema desactivado\"\n    [ \"$DO_NETWORK\" = \"1\" ]   && echo \"[\u2713] DNS privado Cloudflare 1.1.1.1\"\n    [ \"$DO_NETWORK\" = \"1\" ]   && echo \"[\u2713] WiFi scan interval aumentado\"\n    [ \"$DO_BATTERY\" = \"1\" ]   && echo \"[\u2713] Doze mode forzado\"\n    [ \"$DO_BATTERY\" = \"1\" ]   && echo \"[\u2713] Battery optimization por app\"\n    [ \"$DO_DEBLOAT\" = \"1\" ]   && echo \"[\u2713] Debloat ejecutado ($MODE)\"\n    [ \"$DO_TELEMETRY\" = \"1\" ] && echo \"[\u2713] Telemetr\u00eda/analytics desactivados\"\n    [ \"$HAS_ROOT\" = \"1\" ]     && echo \"[\u2713] Kernel tuning (CPU/GPU governor, VM, I/O, TCP)\"\n    [ \"$HAS_ROOT\" = \"1\" ]     && echo \"[\u2713] zRAM optimizado\"\n    [ \"$HAS_ROOT\" = \"1\" ]     && echo \"[\u2713] OOM killer ajustado\"\n    [ \"$HAS_ROOT\" = \"1\" ]     && echo \"[\u2713] SQLite VACUUM + ANALYZE\"\n    [ \"$HAS_ROOT\" = \"1\" ]     && echo \"[\u2713] FSTRIM en todas las particiones\"\n    [ \"$HAS_ROOT\" = \"1\" ] && [ \"$DO_TELEMETRY\" = \"1\" ] && \\\n      echo \"[\u2713] Trackers bloqueados en /etc/hosts ($TRACKERS_BLOCKED dominios)\"\n    [ \"$MODE\" != \"safe\" ]     && echo \"[\u2713] App Standby Buckets (RARE/RESTRICTED)\"\n    [ \"$DO_DEX\" = \"1\" ] && [ \"$MODE\" != \"safe\" ] && echo \"[\u2713] DEX optimization (speed-profile)\"\n    echo \"\"\n    echo \"\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\"\n    echo \"  APPS REMOVIDAS ($REMOVED_COUNT)\"\n    echo \"\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\"\n    [ -f \"$DEBLOAT_STATE\" ] && cat \"$DEBLOAT_STATE\" || echo \"(ninguna)\"\n    echo \"\"\n    echo \"\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\"\n    echo \"  APPS DESHABILITADAS ($DISABLED_COUNT)\"\n    echo \"\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\"\n    [ -f \"$DISABLED_STATE\" ] && cat \"$DISABLED_STATE\" || echo \"(ninguna)\"\n    echo \"\"\n    echo \"\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\"\n    echo \"  ARCHIVOS DE BACKUP\"\n    echo \"\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\"\n    echo \"Ajustes  : $SETTINGS_BACKUP\"\n    echo \"Apps     : $DEBLOAT_STATE\"\n    echo \"Log      : $LOGFILE\"\n    echo \"Hosts    : ${HOSTS_BACKUP}.bak (si root)\"\n    echo \"\"\n    echo \"  Para restaurar: sh titan_v52.sh --restore\"\n    echo \"\"\n    echo \"\u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d\"\n  } > \"$REPORT_TXT\"\n\n  # \u2500\u2500 Reporte HTML \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  {\n    echo \"<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'>\"\n    echo \"<title>TITAN v${VERSION} Report</title>\"\n    echo \"<style>\"\n    echo \"body{font-family:monospace;background:#0d1117;color:#c9d1d9;padding:2em;}\"\n    echo \"h1{color:#58a6ff;} h2{color:#79c0ff;border-bottom:1px solid #30363d;padding-bottom:.3em;}\"\n    echo \".ok{color:#3fb950;} .warn{color:#d29922;} .info{color:#58a6ff;}\"\n    echo \"table{border-collapse:collapse;width:100%;} td,th{padding:.4em .8em;border:1px solid #30363d;}\"\n    echo \"th{background:#161b22;} tr:nth-child(even){background:#161b22;}\"\n    echo \".badge{display:inline-block;padding:.15em .5em;border-radius:.3em;font-size:.85em;}\"\n    echo \".badge-green{background:#1a4731;color:#3fb950;} .badge-red{background:#3d1f1f;color:#f85149;}\"\n    echo \".badge-yellow{background:#2d2006;color:#d29922;}\"\n    echo \"pre{background:#161b22;padding:1em;border-radius:.5em;overflow-x:auto;}\"\n    echo \"</style></head><body>\"\n\n    echo \"<h1>\ud83d\udd31 TITAN v${VERSION} \u2014 Reporte de Optimizaci\u00f3n</h1>\"\n    echo \"<p><span class='badge badge-$([ \"$MODE\" = \"godmode\" ] && echo red || echo yellow)'>$MODE</span>\"\n    echo \" &nbsp; $(date) &nbsp; $DEVICE_MODEL / Android $ANDROID_VER</p>\"\n\n    echo \"<h2>\ud83d\udcca Resultados</h2>\"\n    echo \"<table><tr><th>M\u00e9trica</th><th>Valor</th></tr>\"\n    echo \"<tr><td>Apps removidas</td><td class='ok'>$REMOVED_COUNT</td></tr>\"\n    echo \"<tr><td>Apps deshabilitadas</td><td class='ok'>$DISABLED_COUNT</td></tr>\"\n    echo \"<tr><td>Trackers bloqueados</td><td class='ok'>$TRACKERS_BLOCKED dominios</td></tr>\"\n    echo \"<tr><td>RAM libre antes</td><td>${FREE_RAM_BEFORE}MB</td></tr>\"\n    echo \"<tr><td>RAM libre despu\u00e9s</td><td class='ok'>${FREE_RAM_AFTER}MB</td></tr>\"\n    echo \"<tr><td>RAM liberada</td><td class='ok'>+${RAM_FREED}MB</td></tr>\"\n    echo \"<tr><td>Storage libre antes</td><td>${FREE_STORAGE_BEFORE}</td></tr>\"\n    echo \"<tr><td>Storage libre despu\u00e9s</td><td class='ok'>${FREE_STORAGE_AFTER}</td></tr>\"\n    echo \"<tr><td>Root</td><td>$([ $HAS_ROOT -eq 1 ] && echo \\\"<span class='ok'>S\u00cd</span>\\\" || echo \\\"<span class='warn'>NO</span>\\\")</td></tr>\"\n    echo \"</table>\"\n\n    echo \"<h2>\u2705 Optimizaciones aplicadas</h2><ul>\"\n    echo \"<li class='ok'>Cach\u00e9 limpiada + archivos basura eliminados</li>\"\n    echo \"<li class='ok'>Miniaturas y temporales de /sdcard</li>\"\n    [ \"$DO_PERF\" = \"1\" ]    && echo \"<li class='ok'>Animaciones ${anim}x / Refresh 120Hz</li>\"\n    [ \"$DO_NETWORK\" = \"1\" ] && echo \"<li class='ok'>DNS Cloudflare 1.1.1.1 / WiFi scan reducido</li>\"\n    [ \"$DO_BATTERY\" = \"1\" ] && echo \"<li class='ok'>Doze + Battery optimization por app</li>\"\n    [ \"$DO_DEBLOAT\" = \"1\" ] && echo \"<li class='ok'>Debloat $MODE ($REMOVED_COUNT removidas / $DISABLED_COUNT deshabilitadas)</li>\"\n    [ \"$DO_TELEMETRY\" = \"1\" ] && echo \"<li class='ok'>Telemetr\u00eda y analytics desactivados</li>\"\n    [ \"$HAS_ROOT\" = \"1\" ]   && echo \"<li class='ok'>Kernel: CPU/GPU governor, VM, I/O, TCP, zRAM, OOM</li>\"\n    [ \"$HAS_ROOT\" = \"1\" ] && [ \"$DO_TELEMETRY\" = \"1\" ] && echo \"<li class='ok'>Trackers bloqueados en /etc/hosts</li>\"\n    [ \"$MODE\" != \"safe\" ]   && echo \"<li class='ok'>App Standby Buckets + DEX optimization</li>\"\n    echo \"</ul>\"\n\n    if [ -f \"$DEBLOAT_STATE\" ] && [ -s \"$DEBLOAT_STATE\" ]; then\n      echo \"<h2>\ud83d\uddd1\ufe0f Apps removidas</h2><pre>$(cat \"$DEBLOAT_STATE\")</pre>\"\n    fi\n    if [ -f \"$DISABLED_STATE\" ] && [ -s \"$DISABLED_STATE\" ]; then\n      echo \"<h2>\u23f8\ufe0f Apps deshabilitadas</h2><pre>$(cat \"$DISABLED_STATE\")</pre>\"\n    fi\n\n    echo \"<h2>\ud83d\udd04 Restaurar</h2>\"\n    echo \"<pre>sh titan_v52.sh --restore</pre>\"\n    echo \"<p><small>Log completo: $LOGFILE</small></p>\"\n    echo \"</body></html>\"\n  } > \"$REPORT_HTML\"\n\n  say \"\"\n  cat \"$REPORT_TXT\"\n  say \"\"\n  say \"${C}  Reporte HTML: ${W}$REPORT_HTML${NC}\"\n}\n\n# =============================================================================\n# BANNER\n# =============================================================================\nbanner() {\n  say \"\"\n  say \"${W}${BOLD}\u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557${NC}\"\n  say \"${W}${BOLD}\u2551   ${R}\u26a1 TITAN v${VERSION}${W} \u2014 Android Optimizer ULTRA   \u2551${NC}\"\n  say \"${W}${BOLD}\u2551   ${Y}Modo: ${M}${MODE}${W}$(printf '%*s' $((30-${#MODE})) '')\u2551${NC}\"\n  say \"${W}${BOLD}\u2551   ${C}Motorola razr 60 Edition${W}                   \u2551${NC}\"\n  say \"${W}${BOLD}\u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d${NC}\"\n  [ \"$DRY_RUN\" = \"1\" ] && say \"${Y}${BOLD}  \u26a0  DRY RUN \u2014 No se aplicar\u00e1n cambios${NC}\"\n  say \"\"\n}\n\n# =============================================================================\n# CONTEO DE PASOS TOTALES (para barra de progreso)\n# =============================================================================\ncount_steps() {\n  TOTAL_STEPS=8\n  [ \"$DO_DEBLOAT\" = \"1\" ]   && TOTAL_STEPS=$((TOTAL_STEPS + 1))\n  [ \"$DO_NETWORK\" = \"1\" ]   && TOTAL_STEPS=$((TOTAL_STEPS + 1))\n  [ \"$DO_PERF\" = \"1\" ]      && TOTAL_STEPS=$((TOTAL_STEPS + 1))\n  [ \"$DO_BATTERY\" = \"1\" ]   && TOTAL_STEPS=$((TOTAL_STEPS + 1))\n  [ \"$DO_TELEMETRY\" = \"1\" ] && TOTAL_STEPS=$((TOTAL_STEPS + 1))\n  [ \"$HAS_ROOT\" = \"1\" ]     && TOTAL_STEPS=$((TOTAL_STEPS + 3))\n  [ \"$DO_DEX\" = \"1\" ]       && TOTAL_STEPS=$((TOTAL_STEPS + 1))\n}\n\n# =============================================================================\n# MAIN\n# =============================================================================\nmain() {\n  parse_args \"$@\"\n  log_init\n  banner\n\n  [ \"$DO_RESTORE\" = \"1\" ] && do_restore\n\n  detect_capabilities\n  count_steps\n\n  SNAP_BEFORE=$(get_snapshot \"ANTES\")\n\n  backup_settings\n\n  # Confirmaci\u00f3n en godmode\n  if [ \"$MODE\" = \"godmode\" ] && [ \"$DRY_RUN\" = \"0\" ]; then\n    say \"\"\n    say \"${R}${BOLD}  \u26a0  ATENCI\u00d3N: Modo GODMODE${NC}\"\n    say \"${Y}  Se aplicar\u00e1n cambios agresivos de kernel, memoria y sistema.${NC}\"\n    say \"${Y}  Backup en: $SETTINGS_BACKUP${NC}\"\n    say \"${Y}  Restaurar: sh titan_v52.sh --restore${NC}\"\n    say \"\"\n    say \"${Y}  Continuando en 5 segundos (Ctrl+C para cancelar)...${NC}\"\n    sleep 5\n  fi\n\n  say \"\"\n  say \"${B}${BOLD}\u25b6\u25b6 INICIANDO PIPELINE DE OPTIMIZACI\u00d3N [modo: ${M}$MODE${B}] \u25c0\u25c0${NC}\"\n  say \"\"\n\n  # \u2500\u2500 Pipeline \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  progress \"Limpieza de cach\u00e9s\";         clean_caches;              nl\n  progress \"Gesti\u00f3n de memoria\";         tune_memory;               nl\n  progress \"App Standby Buckets\";        run_standby_buckets;       nl\n  [ \"$DO_PERF\" = \"1\" ]      && { progress \"Rendimiento\";            run_performance_settings;  nl; }\n  [ \"$DO_BATTERY\" = \"1\" ]   && { progress \"Bater\u00eda\";                run_battery_optimization;  nl; }\n  [ \"$DO_NETWORK\" = \"1\" ]   && { progress \"Red\";                    run_network_settings;      nl; }\n  [ \"$DO_TELEMETRY\" = \"1\" ] && { progress \"Telemetr\u00eda/Analytics\";   run_telemetry_kill;        nl; }\n  [ \"$DO_DEBLOAT\" = \"1\" ]   && { progress \"Debloat\";                run_debloat;               nl; }\n  [ \"$HAS_ROOT\" = \"1\" ]     && { progress \"Kernel tuning\";          run_kernel_tuning;         nl; }\n  [ \"$HAS_ROOT\" = \"1\" ]     && { progress \"SQLite + FSTRIM\";        optimize_databases; run_fstrim; nl; }\n  [ \"$HAS_ROOT\" = \"1\" ]     && { progress \"Host blocker\";           run_host_blocker;          nl; }\n  [ \"$DO_DEX\" = \"1\" ] && [ \"$MODE\" != \"safe\" ] && { progress \"DEX optimization\"; run_dex_optimization; nl; }\n  progress \"Generando reporte\"; nl\n\n  # Snapshot despu\u00e9s\n  SNAP_AFTER=$(get_snapshot \"DESPU\u00c9S\")\n  printf \"%s\\n\\n%s\\n\" \"$SNAP_BEFORE\" \"$SNAP_AFTER\" >> \"$LOGFILE\" 2>/dev/null\n\n  generate_report\n\n  # Reboot opcional\n  if [ \"$DO_REBOOT\" = \"1\" ] && [ \"$DRY_RUN\" = \"0\" ]; then\n    say \"\"\n    say \"${Y}${BOLD}  Reiniciando dispositivo en 10 segundos... (Ctrl+C para cancelar)${NC}\"\n    sleep 10\n    run_root \"reboot 2>/dev/null\" || reboot 2>/dev/null || run \"am broadcast -a android.intent.action.REBOOT\"\n  fi\n\n  say \"\"\n  say \"${G}${BOLD}\u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557${NC}\"\n  say \"${G}${BOLD}\u2551  \u2705 TITAN v${VERSION} finalizado correctamente  \u2551${NC}\"\n  say \"${G}${BOLD}\u2551  RAM liberada: +${RAM_FREED}MB                        \u2551${NC}\"\n  say \"${G}${BOLD}\u2551  Apps removidas/deshabilitadas: $((REMOVED_COUNT + DISABLED_COUNT))           \u2551${NC}\"\n  say \"${G}${BOLD}\u2551  Log: $LOGFILE${NC}\"\n  say \"${G}${BOLD}\u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d${NC}\"\n  say \"\"\n}\n\nmain \"$@\"\n";

    const codeEl = document.getElementById('codeBlock');
    const linesEl = document.getElementById('linesCount');
    const toastEl = document.getElementById('toast');
    const toastTextEl = document.getElementById('toastText');
    const searchInputEl = document.getElementById('searchInput');

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function showToast(msg) {
      toastTextEl.textContent = msg;
      toastEl.classList.remove('opacity-0','pointer-events-none');
      toastEl.classList.add('opacity-100');
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => {
        toastEl.classList.add('opacity-0','pointer-events-none');
        toastEl.classList.remove('opacity-100');
      }, 1200);
    }

    async function copyText(txt, msg) {
      if (!txt) return showToast('NO HAY TEXTO PARA COPIAR');
      try {
        await navigator.clipboard.writeText(txt);
        showToast(msg || 'COPIADO');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = txt;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(msg || 'COPIADO');
      }
    }

    function render(query) {
      const lines = RAW_SCRIPT.split('\n');
      linesEl.textContent = 'Lines: ' + lines.length;
      const q = (query || '').trim();
      const qRe = q ? new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi') : null;
      const html = lines.map((line, i) => {
        let safe = escapeHtml(line);
        if (qRe) safe = safe.replace(qRe, m => '<mark class="bg-god-500/30 text-god-400 px-0.5">' + m + '</mark>');
        return '<span class="line-num">' + String(i+1).padStart(3,' ') + '</span>' + safe;
      }).join('\n');
      codeEl.innerHTML = html;
    }

    window.copyRaw = function() { copyText(RAW_SCRIPT, 'SCRIPT COPIADO'); };
    window.highlightSearch = function() { render(searchInputEl?.value || ''); };

    render('');
  </script>
