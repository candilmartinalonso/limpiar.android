  <!-- ✅ TITAN v29 GOD MODE Script RAW (WhatsApp SAFE) -->
  <script id="titanScript" type="text/plain">#!/system/bin/sh
#===============================================================================
# TITAN v29 GOD MODE (NO-ROOT / ADB SAFE) - EXTREME OPTIMIZER (AUTO-YES)
# - Limpieza brutal /sdcard + caches típicos (SIN ROOT)
# - Fluidez máxima (anim/touch/perf best-effort)
# - RAM agresiva / límites background (puede afectar multitarea/notifs)
# - Doze/idle agresivo (best-effort)
# - Compilación/dexopt (best-effort)
# - Update Hub: Play Store + OTA (AUTO-UI best-effort, Android en Español)
#
# 🔒 WHATSAPP SAFE GUARANTEE:
#   NO BORRA NADA de WhatsApp (enviados/recibidos/caches/media):
#   - /sdcard/WhatsApp/**
#   - /sdcard/Android/media/com.whatsapp/**
#   - /sdcard/Android/data/com.whatsapp/**
#
# Uso recomendado:
#   adb shell sh /sdcard/Download/titan_v29.sh
#
# Restore (revierte settings que tocamos):
#   adb shell sh /sdcard/Download/titan_v29.sh --restore
#===============================================================================

# ---------------------------
# Colores / Config
# ---------------------------
R='\u001B[0;31m'; G='\u001B[0;32m'; Y='\u001B[1;33m'; C='\u001B[0;36m'; P='\u001B[0;35m'; B='\u001B[0;34m'; NC='\u001B[0m'

# 100% AUTO
DRY_RUN=0
ASK_CONFIRM=0
VERBOSE=1
MODE="run"

# Perfil GOD (máximo)
PROFILE="god"
PLAN_ONLY=0
AUTO_UI_UPDATES=1

# Tuning GOD
DAYS_OLD=1
MIN_SIZE_KB=4
DOWNLOAD_MAXDEPTH=4

BG_LIMIT=1
ANIM_SCALE="0.05"
TOUCH_TIMEOUT=80
POINTER_SPEED="7"
FONT_SCALE="0.82"

TITAN_AGGRESSIVE_RAM=1
TITAN_ULTRA_TWEAKS=1
TITAN_FORCE_DOZE=1
TITAN_KILL_BG_APPS=1
TITAN_COMPILE=1
COMPILE_MODE="all"          # all = heavy

# Limpieza targets
JUNK_EXTS="tmp log bak old ~ swp part crdownload dmp sav shm sql journal lock cache"
SDCARD_TRASH_DIRS="
/sdcard/Download
/sdcard/DCIM/.thumbnails
/sdcard/Pictures/.thumbnails
/sdcard/Movies/.thumbnails
/sdcard/Android/media/*/*/cache
/sdcard/Android/media/*/*/tmp
/sdcard/Android/data/*/cache
/sdcard/Android/data/*/files/cache
/sdcard/Android/data/*/files/tmp
/sdcard/Android/data/*/files/log*
/sdcard/Telegram/Telegram Video/.cache
/sdcard/Telegram/Telegram Images/.cache
/sdcard/Telegram/Telegram Documents/.cache
/sdcard/LOST.DIR
"

# 🔒 EXCLUSIONES ABSOLUTAS (WhatsApp)
WHATSAPP_EXCLUDE_DIRS="
/sdcard/WhatsApp
/sdcard/Android/media/com.whatsapp
/sdcard/Android/data/com.whatsapp
"

# Logs
LOGDIR="/sdcard/Download"
LOGFILE="${LOGDIR}/titan_v29.log"
STATEFILE="${LOGDIR}/titan_state_v29.conf"
LOG_ROTATE=5
UIXML="${LOGDIR}/titan_ui.xml"

# ---------------------------
# Args
# ---------------------------
for arg in "$@"; do
  case "$arg" in
    --dry-run) DRY_RUN=1 ;;
    --plan) PLAN_ONLY=1; DRY_RUN=1 ;;
    --quiet) VERBOSE=0 ;;
    --restore) MODE="restore" ;;
    --no-ui-updates) AUTO_UI_UPDATES=0 ;;
    --compile-none) COMPILE_MODE="none" ;;
    --compile-smart) COMPILE_MODE="smart" ;;
    --compile-all) COMPILE_MODE="all" ;;
  esac
done

# ---------------------------
# Helpers
# ---------------------------
strip_ansi() { sed 's/\u001B[[0-9;]*m//g'; }
log_init() { : > "$LOGFILE" 2>/dev/null; }
log() { echo "$(date '+%F %T') | $*" >> "$LOGFILE" 2>/dev/null; }
say() { [ "$VERBOSE" = "1" ] && echo -e "$*"; echo -e "$*" | strip_ansi | log; }
exists() { command -v "$1" >/dev/null 2>&1; }
run() {
  if [ "$DRY_RUN" = "1" ]; then say "${C}[dry] $*${NC}"; return 0; fi
  sh -c "$*" >> "$LOGFILE" 2>&1; return $?
}

# AUTO-YES: nunca pregunta, siempre sigue
confirm_or_exit() { say "${C}[AUTO] $1 -> YES${NC}"; return 0; }

rotate_logs() {
  i="$LOG_ROTATE"
  while [ "$i" -ge 1 ]; do
    prev=$((i-1))
    [ "$prev" -eq 0 ] && [ -f "$LOGFILE" ] && mv -f "$LOGFILE" "${LOGFILE}.${i}"
    [ -f "${LOGFILE}.${prev}" ] && mv -f "${LOGFILE}.${prev}" "${LOGFILE}.${i}"
    i=$((i-1))
  done
}

getprop_safe() { getprop "$1" 2>/dev/null; }
get_sdk() { getprop_safe ro.build.version.sdk; }
get_model() { getprop_safe ro.product.model; }
get_release() { getprop_safe ro.build.version.release; }
get_secpatch() { getprop_safe ro.build.version.security_patch; }
sd_avail_kb() { df -k /sdcard 2>/dev/null | awk 'NR==2{print $4}'; }

bytes_to_mb() { b="$1"; [ -z "$b" ] && b=0; awk -v b="$b" 'BEGIN{printf "%.1f MB", b/1024/1024}'; }
sum_bytes_from_stdin() { awk '{s+=$1} END{print s+0}'; }

# Listado basura en Download
list_download_junk() {
  pat="$(echo "$JUNK_EXTS" | awk '{for(i=1;i<=NF;i++) printf "-name *.%s%s",$i,(i<NF?" -o ":"")}')"
  eval "find /sdcard/Download -maxdepth $DOWNLOAD_MAXDEPTH -type f \\( $pat \\) -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -print" 2>/dev/null
}

# Guardar settings para restore
save_state() {
  [ -f "$STATEFILE" ] && return 0
  say "${C}[i] Guardando estado para --restore...${NC}"
  {
    echo "window_animation_scale=$(settings get global window_animation_scale 2>/dev/null)"
    echo "transition_animation_scale=$(settings get global transition_animation_scale 2>/dev/null)"
    echo "animator_duration_scale=$(settings get global animator_duration_scale 2>/dev/null)"
    echo "always_finish_activities=$(settings get global always_finish_activities 2>/dev/null)"
    echo "limit_background_processes=$(settings get global limit_background_processes 2>/dev/null)"
    echo "long_press_timeout=$(settings get secure long_press_timeout 2>/dev/null)"
    echo "multi_press_timeout=$(settings get secure multi_press_timeout 2>/dev/null)"
    echo "pointer_speed=$(settings get system pointer_speed 2>/dev/null)"
    echo "haptic_feedback_enabled=$(settings get secure haptic_feedback_enabled 2>/dev/null)"
    echo "font_scale=$(settings get system font_scale 2>/dev/null)"
  } > "$STATEFILE" 2>/dev/null
}

restore_settings() {
  [ ! -f "$STATEFILE" ] && { say "${Y}[!] No hay statefile: $STATEFILE${NC}"; return 1; }
  say "${P}[↩] Restaurando settings...${NC}"
  . "$STATEFILE" 2>/dev/null

  [ -n "$window_animation_scale" ] && run "settings put global window_animation_scale $window_animation_scale"
  [ -n "$transition_animation_scale" ] && run "settings put global transition_animation_scale $transition_animation_scale"
  [ -n "$animator_duration_scale" ] && run "settings put global animator_duration_scale $animator_duration_scale"
  [ -n "$always_finish_activities" ] && run "settings put global always_finish_activities $always_finish_activities"
  [ -n "$limit_background_processes" ] && run "settings put global limit_background_processes $limit_background_processes"
  [ -n "$long_press_timeout" ] && run "settings put secure long_press_timeout $long_press_timeout"
  [ -n "$multi_press_timeout" ] && run "settings put secure multi_press_timeout $multi_press_timeout"
  [ -n "$pointer_speed" ] && run "settings put system pointer_speed $pointer_speed"
  [ -n "$haptic_feedback_enabled" ] && run "settings put secure haptic_feedback_enabled $haptic_feedback_enabled"
  [ -n "$font_scale" ] && run "settings put system font_scale $font_scale"

  say "${G}[✓] Restore completado.${NC}"
  return 0
}

# ---------------------------
# UI helpers (AUTO-UI best-effort)
# ---------------------------
ui_dump() {
  exists uiautomator || return 1
  run "uiautomator dump /sdcard/Download/.titan_ui.xml" || return 1
  run "cp -f /sdcard/Download/.titan_ui.xml '$UIXML'" || true
  return 0
}

ui_center_for_text() {
  needle="$1"
  [ ! -f "$UIXML" ] && return 1
  line="$(grep -n "$needle" "$UIXML" 2>/dev/null | head -n1)"
  [ -z "$line" ] && return 1
  bounds="$(echo "$line" | sed -n 's/.*bounds="\([^"]*\)".*/\1/p')"
  [ -z "$bounds" ] && return 1

  l="$(echo "$bounds" | sed -n 's/^\[\([0-9]*\),.*/\1/p')"
  t="$(echo "$bounds" | sed -n 's/^\[[0-9]*,\([0-9]*\)\].*/\1/p')"
  r="$(echo "$bounds" | sed -n 's/.*\[\([0-9]*\),[0-9]*\]$/\1/p')"
  b="$(echo "$bounds" | sed -n 's/.*,[0-9]*\]\[\([0-9]*\),\([0-9]*\)\]$/\2/p')"

  [ -z "$l" ] || [ -z "$t" ] || [ -z "$r" ] || [ -z "$b" ] && return 1

  x=$(( (l + r) / 2 ))
  y=$(( (t + b) / 2 ))
  echo "$x $y"
  return 0
}

ui_tap_text_any() {
  list="$1"
  oldIFS="$IFS"; IFS='|'
  for n in $list; do
    IFS="$oldIFS"
    xy="$(ui_center_for_text "$n")"
    IFS='|'
    if [ -n "$xy" ]; then
      x="$(echo "$xy" | awk '{print $1}')"
      y="$(echo "$xy" | awk '{print $2}')"
      run "input tap $x $y"
      say "${G}[✓] Tap: ${n}${NC}"
      IFS="$oldIFS"
      return 0
    fi
  done
  IFS="$oldIFS"
  return 1
}

# ---------------------------
# Banner
# ---------------------------
rotate_logs; log_init
SDK="$(get_sdk)"; MODEL="$(get_model)"; REL="$(get_release)"; SECPATCH="$(get_secpatch)"
FREEKB="$(sd_avail_kb)"

say "${Y}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"
say "${Y}  TITAN v29 GOD MODE  ${C}[NO-ROOT / ADB SAFE]${NC}"
say "${Y}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"
say "${P}[i] Device: ${MODEL} | Android: ${REL} | SDK: ${SDK}${NC}"
say "${P}[i] Security patch: ${SECPATCH}${NC}"
say "${P}[i] AUTO: YES | UI Updates: ${AUTO_UI_UPDATES} | DRY_RUN: ${DRY_RUN}${NC}"
say "${C}[i] /sdcard libres (KB): ${FREEKB}${NC}"
say "${Y}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"
say "${G}[LOCK] WhatsApp protegido: NO se elimina nada de WhatsApp.${NC}"

# ---------------------------
# FASE 0: UPDATE HUB (Play Store ES + OTA ES)
# ---------------------------
update_hub() {
  say "
${P}[🔄] FASE 0: UPDATE HUB (BEST-EFFORT)${NC}"

  say "${C}[i] Play Store > Actualizaciones...${NC}"
  run "am start -a android.intent.action.VIEW -d 'market://updates'" || true
  run "sleep 2"

  if [ "$AUTO_UI_UPDATES" = "1" ] && exists uiautomator; then
    ui_dump && {
      ui_tap_text_any "Actualizar todo|ACTUALIZAR TODO|Update all|UPDATE ALL" || true
      run "sleep 1"
      ui_dump && ui_tap_text_any "Actualizar|ACTUALIZAR|Update" || true
    }
  fi

  say "${C}[i] Ajustes > Actualización del sistema (OTA)...${NC}"
  run "am start -a android.settings.SYSTEM_UPDATE_SETTINGS" || run "am start -a android.settings.SETTINGS" || true
  run "sleep 2"

  if [ "$AUTO_UI_UPDATES" = "1" ] && exists uiautomator; then
    ui_dump && {
      ui_tap_text_any "Buscar actualizaciones|BUSCAR ACTUALIZACIONES|Comprobar actualizaciones|COMPROBAR ACTUALIZACIONES" || true
      run "sleep 2"
      ui_dump && ui_tap_text_any "Descargar e instalar|DESCARGAR E INSTALAR|Descargar|Instalar|INSTALAR" || true
    }
  fi

}

# ---------------------------
# FASE 1: DIAGNÓSTICO
# ---------------------------
diagnostics() {
  say "
${P}[🧪] FASE 1: DIAGNÓSTICO${NC}"
  exists dumpsys && run "dumpsys meminfo | head -60" || true
  exists top && run "top -n 1 | head -25" || true
  say "${G}[✓] Diagnóstico listo.${NC}"
}

# ---------------------------
# FASE 2: CLEAN / NUKE (SIN WhatsApp)
# ---------------------------
clean_god() {
  say "
${P}[🧹] FASE 2: CLEAN / NUKE (SIN WhatsApp)${NC}"

  exists pm && run "pm trim-caches 999G" || true

  CANDS="$(list_download_junk)"
  CAND_COUNT="$(echo "$CANDS" | sed '/^$/d' | wc -l | tr -d ' ')"
  EST_BYTES="$(echo "$CANDS" | while read f; do ls -l "$f" 2>/dev/null | awk '{print $5}'; done | sum_bytes_from_stdin)"
  say "${C}Download junk: ${CAND_COUNT} (~$(bytes_to_mb $EST_BYTES))${NC}"

  pat="$(echo "$JUNK_EXTS" | awk '{for(i=1;i<=NF;i++) printf "-name *.%s%s",$i,(i<NF?" -o ":"")}')"
  run "find /sdcard/Download -maxdepth $DOWNLOAD_MAXDEPTH -type f \\( $pat \\) -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -delete"

  echo "$SDCARD_TRASH_DIRS" | while read d; do
    [ -z "$d" ] && continue
    run "sh -c \"
      for x in $d; do
        [ -e \\\"\\\$x\\\" ] || continue
        case \\\"\\\$x\\\" in
          *'/Android/media/com.whatsapp'*|*'/Android/data/com.whatsapp'*|*'/WhatsApp'*) continue ;;
        esac
        find \\\"\\\$x\\\" -type f -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -delete
      done
    \""
  done

  run "sh -c \"
    find /sdcard -type f \\( -name '*.thumbnails*' -o -name '*.thumb*' \\) \
      -not -path '/sdcard/WhatsApp/*' \
      -not -path '/sdcard/Android/media/com.whatsapp/*' \
      -not -path '/sdcard/Android/data/com.whatsapp/*' \
      -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -delete
  \"" || true

  run "sh -c \"
    find /sdcard -maxdepth 4 -type f \\( -name '*.log' -o -name '*logcat*' -o -name '*.dmp' \\) \
      -not -path '/sdcard/WhatsApp/*' \
      -not -path '/sdcard/Android/media/com.whatsapp/*' \
      -not -path '/sdcard/Android/data/com.whatsapp/*' \
      -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -delete
  \"" || true

  say "${G}[✓] Clean GOD completado. WhatsApp intacto.${NC}"
}

# ---------------------------
# FASE 3: RAM / BG LIMITS (agresivo)
# ---------------------------
ram_god() {
  say "
${P}[💾] FASE 3: RAM / BACKGROUND (GOD)${NC}"
  save_state
  exists cmd && run "cmd activity memory-factor critical" || true
  run "settings put global always_finish_activities 1"
  run "settings put global limit_background_processes $BG_LIMIT"
  say "${G}[✓] RAM aplicada: BG_LIMIT=${BG_LIMIT}${NC}"
}

# ---------------------------
# FASE 4: FLUIDEZ / INPUT / GPU
# ---------------------------
fluidity_god() {
  say "
${P}[⚡] FASE 4: FLUIDEZ / INPUT / GPU (GOD)${NC}"
  save_state

  run "settings put global window_animation_scale $ANIM_SCALE"
  run "settings put global transition_animation_scale $ANIM_SCALE"
  run "settings put global animator_duration_scale $ANIM_SCALE"

  run "settings put secure long_press_timeout $TOUCH_TIMEOUT" || true
  run "settings put secure multi_press_timeout $TOUCH_TIMEOUT" || true
  run "settings put system pointer_speed $POINTER_SPEED" || true
  run "settings put secure haptic_feedback_enabled 0" || true
  run "settings put system font_scale $FONT_SCALE" || true

  run "cmd power set-fixed-performance-mode-enabled true" 2>/dev/null || true
  run "setprop debug.force-opengl 1" 2>/dev/null || true
  run "setprop debug.hwc.force_gpu_vsync 1" 2>/dev/null || true
  run "setprop debug.hwui.renderer skiagl" 2>/dev/null || true

  say "${G}[✓] Fluidez aplicada: anim=${ANIM_SCALE}x touch=${TOUCH_TIMEOUT}${NC}"
}

# ---------------------------
# FASE 5: DOZE / IDLE (agresivo)
# ---------------------------
doze_god() {
  say "
${P}[🌙] FASE 5: DOZE / IDLE (GOD)${NC}"
  exists dumpsys && {
    run "dumpsys deviceidle enable" 2>/dev/null || true
    run "dumpsys deviceidle force-idle" 2>/dev/null || true
  }
  say "${G}[✓] Doze aplicado (best-effort).${NC}"
}

# ---------------------------
# FASE 6: FORCE-STOP apps (SIN WhatsApp)
# ---------------------------
kill_bg_god() {
  say "
${P}[💀] FASE 6: FORCE-STOP (SIN WhatsApp)${NC}"

  if exists pm && exists am; then
    run "pm list packages -3 | cut -d: -f2 | while read p; do
      [ \"\$p\" = \"com.whatsapp\" ] && continue
      am force-stop \$p
    done"
    say "${G}[✓] force-stop aplicado (WhatsApp excluido).${NC}"
  fi
}

# ---------------------------
# FASE 7: COMPILACIÓN / DEXOPT (heavy)
# ---------------------------
compile_god() {
  say "
${P}[🔧] FASE 7: DEXOPT / COMPILE (GOD)${NC}"

  [ "$COMPILE_MODE" = "none" ] && { say "${C}[i] Compile desactivado.${NC}"; return 0; }

  if exists cmd; then
    run "pm dexopt-job" 2>/dev/null || true
    if [ "$COMPILE_MODE" = "all" ]; then
      run "cmd package compile -m speed-profile -f all" || true
    fi
    say "${G}[✓] Compile/Dexopt listo.${NC}"
  else
    say "${Y}[!] cmd no disponible; compile omitido.${NC}"
  fi
}

  <!-- ✅ JS de render/copy/search (CORREGIDO) -->
  <script>
    const titanEl = document.getElementById('titanScript');
    const codeEl = document.getElementById('codeBlock');
    const linesEl = document.getElementById('linesCount');
    const toastEl = document.getElementById('toast');
    const toastTextEl = document.getElementById('toastText');
    const searchInputEl = document.getElementById('searchInput');

    function getRawScript() {
      return (titanEl?.textContent || '').replace(/\r\n/g, '\n').trimEnd();
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showToast(msg) {
      toastTextEl.textContent = msg;
      toastEl.classList.remove('opacity-0', 'pointer-events-none');
      toastEl.classList.add('opacity-100');
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => {
        toastEl.classList.add('opacity-0', 'pointer-events-none');
        toastEl.classList.remove('opacity-100');
      }, 1200);
    }

    async function copyText(txt, msg) {
      if (!txt) return showToast('NO HAY TEXTO PARA COPIAR');
      try {
        await navigator.clipboard.writeText(txt);
        showToast(msg || 'COPIADO');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = txt;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(msg || 'COPIADO');
      }
    }

    function render(raw, query = '') {
      const lines = raw.split('\n');
      linesEl.textContent = `Lines: ${lines.length}`;

      const q = (query || '').trim();
      const qRe = q ? new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi') : null;

      const html = lines.map((line, i) => {
        let safe = escapeHtml(line);
        if (qRe) {
          safe = safe.replace(qRe, m => `<mark class="bg-god-500/30 text-god-400 px-0.5">${m}</mark>`);
        }
        return `<span class="line-num">${String(i + 1).padStart(3, ' ')}</span>${safe}`;
      }).join('\n');

      codeEl.innerHTML = html;
    }

    window.copyRaw = function () {
      const raw = getRawScript();
      copyText(raw, 'SCRIPT COPIADO');
    };

    window.copyOneLiner = function () {
      const cmd = `adb shell sh /sdcard/Download/titan_v29.sh`;
      copyText(cmd, 'COMANDO ADB COPIADO');
    };

    window.highlightSearch = function () {
      render(getRawScript(), searchInputEl?.value || '');
    };

    (function init() {
      const raw = getRawScript();
      if (!raw) {
        codeEl.textContent = '⚠️ No se encontró contenido en #titanScript (vacío).';
        linesEl.textContent = 'Lines: 0';
        return;
      }
      render(raw, '');
    })();
  </script>
