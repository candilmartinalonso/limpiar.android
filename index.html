  <script>
    // Script embedded as JSON — 100% safe, no parsing issues
    const RAW_SCRIPT = "#!/system/bin/sh\n# =============================================================================\n# TITAN v52 \u2014 Android Optimizer ULTRA\n# Motorola razr 60 / stock / reversible / ADB-compatible\n#\n# MODOS: safe | balanced | aggressive | godmode\n# USO:   sh titan_v52.sh [--mode=safe|balanced|aggressive|godmode]\n#              [--dry-run] [--restore] [--silent] [--no-debloat]\n#              [--no-network] [--no-perf] [--no-battery] [--no-telemetry]\n#              [--no-kernel] [--no-dex] [--reboot] [--help]\n#\n# NOVEDADES v52 vs v51:\n#   \u2022 zRAM tuning + compactaci\u00f3n de memoria en caliente\n#   \u2022 GPU governor tuning (root)\n#   \u2022 Doze mode forzado (fast doze)\n#   \u2022 Battery optimizer forzado por app (dumpsys deviceidle)\n#   \u2022 Wakelocks abusivos: detecci\u00f3n y reporte\n#   \u2022 Desactivaci\u00f3n selectiva de telemetr\u00eda/analytics/ads\n#   \u2022 Desactivaci\u00f3n de servicios de debug en runtime\n#   \u2022 OOM killer tuning (minfree, adj)\n#   \u2022 Entrop\u00eda del kernel optimizada\n#   \u2022 App Standby Buckets forzados (RARE/RESTRICTED)\n#   \u2022 Trim-memory forzado a apps en background\n#   \u2022 Eliminaci\u00f3n profunda de logs/tombstones/ANR (root)\n#   \u2022 Lista debloat v52: +120 paquetes, carrier + OEM + adware\n#   \u2022 Bloqueo de trackers conocidos v\u00eda hosts (root)\n#   \u2022 TCP BBR2 / buffers adaptativos\n#   \u2022 Progress bar en terminal\n#   \u2022 Reporte HTML + TXT\n#   \u2022 Snapshot de RAM antes/despu\u00e9s con delta\n#   \u2022 Opci\u00f3n --reboot para reiniciar al finalizar\n# =============================================================================\n\n# \u2500\u2500\u2500 COLORES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nR='\\033[0;31m'; G='\\033[0;32m'; Y='\\033[1;33m'\nC='\\033[0;36m'; B='\\033[0;34m'; M='\\033[0;35m'\nW='\\033[1;37m'; NC='\\033[0m'\nBOLD='\\033[1m'; DIM='\\033[2m'; UL='\\033[4m'\n\n# \u2500\u2500\u2500 VERSI\u00d3N \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nVERSION=\"52.0\"\n\n# \u2500\u2500\u2500 DEFAULTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nMODE=\"balanced\"\nDRY_RUN=0\nVERBOSE=1\nSILENT=0\nDO_RESTORE=0\nDO_DEBLOAT=1\nDO_NETWORK=1\nDO_PERF=1\nDO_BATTERY=1\nDO_TELEMETRY=1\nDO_KERNEL=0        # se activa si root detectado\nDO_DEX=1\nDO_REBOOT=0\n\n# \u2500\u2500\u2500 CONTADORES GLOBALES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nTOTAL_STEPS=0\nCURRENT_STEP=0\nREMOVED_COUNT=0\nDISABLED_COUNT=0\nSERVICES_STOPPED=0\nTRACKERS_BLOCKED=0\n\n# \u2500\u2500\u2500 RUTAS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nWORKDIR=\"/sdcard/Download/TITAN\"\nLOGDIR=\"$WORKDIR/logs\"\nREPORTDIR=\"$WORKDIR/reports\"\nBACKUPDIR=\"$WORKDIR/backup\"\n\nLOGFILE=\"$LOGDIR/titan_v${VERSION}.log\"\nDEBLOAT_STATE=\"$BACKUPDIR/debloat_state.txt\"\nDISABLED_STATE=\"$BACKUPDIR/disabled_state.txt\"\nSETTINGS_BACKUP=\"$BACKUPDIR/settings_backup.txt\"\nSERVICES_BACKUP=\"$BACKUPDIR/services_backup.txt\"\nHOSTS_BACKUP=\"$BACKUPDIR/hosts_backup\"\nTS=$(date '+%Y%m%d_%H%M%S')\nREPORT_TXT=\"$REPORTDIR/report_${TS}.txt\"\nREPORT_HTML=\"$REPORTDIR/report_${TS}.html\"\n\n# \u2500\u2500\u2500 CAPACIDADES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nHAS_ROOT=0\nANDROID_VER=\"\"\nDEVICE_MODEL=\"\"\nAPI_LEVEL=0\nTOTAL_RAM_MB=0\nFREE_RAM_BEFORE=0\nFREE_RAM_AFTER=0\nFREE_STORAGE_BEFORE=0\nFREE_STORAGE_AFTER=0\nTEMP_C=0\nBAT_LEVEL=0\n\n# =============================================================================\n# PARSEO DE ARGUMENTOS\n# =============================================================================\nparse_args() {\n  for arg in \"$@\"; do\n    case \"$arg\" in\n      --mode=*)        MODE=\"${arg#--mode=}\" ;;\n      --dry-run)       DRY_RUN=1 ;;\n      --restore)       DO_RESTORE=1 ;;\n      --silent)        SILENT=1; VERBOSE=0 ;;\n      --no-debloat)    DO_DEBLOAT=0 ;;\n      --no-network)    DO_NETWORK=0 ;;\n      --no-perf)       DO_PERF=0 ;;\n      --no-battery)    DO_BATTERY=0 ;;\n      --no-telemetry)  DO_TELEMETRY=0 ;;\n      --no-kernel)     DO_KERNEL=0 ;;\n      --no-dex)        DO_DEX=0 ;;\n      --reboot)        DO_REBOOT=1 ;;\n      --help|-h)       show_help; exit 0 ;;\n      *) warn \"Argumento desconocido: $arg\" ;;\n    esac\n  done\n  case \"$MODE\" in\n    safe|balanced|aggressive|godmode) ;;\n    *) err \"Modo inv\u00e1lido: $MODE. Usar: safe|balanced|aggressive|godmode\"; exit 1 ;;\n  esac\n}\n\nshow_help() {\n  echo \"\"\n  echo \"TITAN v${VERSION} - Android Optimizer ULTRA\"\n  echo \"\"\n  echo \"USO: sh titan_v52.sh [opciones]\"\n  echo \"\"\n  echo \"MODOS:\"\n  echo \"  --mode=safe          Solo limpieza de cach\u00e9 y ajustes seguros\"\n  echo \"  --mode=balanced      Debloat moderado + optimizaciones (default)\"\n  echo \"  --mode=aggressive    Debloat amplio + tuning de sistema\"\n  echo \"  --mode=godmode       M\u00e1xima optimizaci\u00f3n (revisar manualmente)\"\n  echo \"\"\n  echo \"OPCIONES:\"\n  echo \"  --dry-run            Simular sin aplicar cambios\"\n  echo \"  --restore            Restaurar configuraci\u00f3n anterior\"\n  echo \"  --silent             Sin output (solo log)\"\n  echo \"  --no-debloat         Omitir remoci\u00f3n de apps\"\n  echo \"  --no-network         No tocar ajustes de red\"\n  echo \"  --no-perf            No aplicar ajustes de rendimiento\"\n  echo \"  --no-battery         No tocar ajustes de bater\u00eda\"\n  echo \"  --no-telemetry       No deshabilitar telemetr\u00eda/analytics\"\n  echo \"  --no-kernel          Forzar omisi\u00f3n de kernel tuning\"\n  echo \"  --no-dex             Omitir optimizaci\u00f3n DEX\"\n  echo \"  --reboot             Reiniciar dispositivo al finalizar\"\n  echo \"  --help               Mostrar esta ayuda\"\n  echo \"\"\n}\n\n# =============================================================================\n# LOGGING Y OUTPUT\n# =============================================================================\nlog_init() {\n  mkdir -p \"$LOGDIR\" \"$REPORTDIR\" \"$BACKUPDIR\" 2>/dev/null\n  touch \"$LOGFILE\" 2>/dev/null\n  echo \"# TITAN v${VERSION} Log -- $(date)\" > \"$LOGFILE\"\n}\n\n_log() { echo \"$(date '+%Y-%m-%d %H:%M:%S') [$1] $2\" >> \"$LOGFILE\" 2>/dev/null; }\nlog()  { _log \"INFO\" \"$*\"; }\nwarn() { _log \"WARN\" \"$*\"; [ \"$SILENT\" = \"0\" ] && echo -e \"${Y}[!] $*${NC}\"; }\nerr()  { _log \"ERR \" \"$*\"; echo -e \"${R}[X] $*${NC}\" >&2; }\nok()   { _log \"OK  \" \"$*\"; [ \"$SILENT\" = \"0\" ] && echo -e \"${G}[\u2713] $*${NC}\"; }\ninfo() { _log \"INFO\" \"$*\"; [ \"$VERBOSE\" = \"1\" ] && [ \"$SILENT\" = \"0\" ] && echo -e \"${C}[\u00b7] $*${NC}\"; }\nsay()  { [ \"$SILENT\" = \"0\" ] && echo -e \"$*\"; _log \"OUT\" \"$(echo \"$*\" | sed 's/\\033\\[[0-9;]*m//g')\"; }\nskip() { _log \"SKIP\" \"$*\"; [ \"$VERBOSE\" = \"1\" ] && [ \"$SILENT\" = \"0\" ] && echo -e \"${DIM}[~] $*${NC}\"; }\n\nprogress() {\n  CURRENT_STEP=$((CURRENT_STEP + 1))\n  pct=$((CURRENT_STEP * 100 / TOTAL_STEPS))\n  filled=$((pct / 5))\n  bar=\"\"\n  i=0\n  while [ $i -lt 20 ]; do\n    if [ $i -lt $filled ]; then bar=\"${bar}\u2588\"\n    else bar=\"${bar}\u2591\"; fi\n    i=$((i + 1))\n  done\n  [ \"$SILENT\" = \"0\" ] && printf \"\\r${B}  [%s] %3d%%  %s${NC}          \" \"$bar\" \"$pct\" \"$1\"\n  log \"[PROGRESS $pct%] $1\"\n}\n\nnl() { [ \"$SILENT\" = \"0\" ] && echo \"\"; }\n\nsection() {\n  nl\n  say \"${B}${BOLD}\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550${NC}\"\n  say \"${B}${BOLD}  \u25b6  $*${NC}\"\n  say \"${B}${BOLD}\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550${NC}\"\n}\n\n# Ejecuta un comando, respeta DRY_RUN\nrun() {\n  log \"[CMD] $*\"\n  if [ \"$DRY_RUN\" = \"1\" ]; then\n    [ \"$VERBOSE\" = \"1\" ] && [ \"$SILENT\" = \"0\" ] && echo -e \"${DIM}  [dry] $*${NC}\"\n    return 0\n  fi\n  eval \"$*\" >> \"$LOGFILE\" 2>&1\n  return $?\n}\n\nrun_root() {\n  if [ \"$HAS_ROOT\" = \"1\" ]; then\n    run \"su -c '$*'\"\n  else\n    log \"[SKIP-NOROOT] $*\"\n    return 1\n  fi\n}\n\nsput() {\n  ns=\"$1\"; key=\"$2\"; val=\"$3\"\n  log \"settings put $ns $key '$val'\"\n  if [ \"$DRY_RUN\" = \"1\" ]; then\n    [ \"$VERBOSE\" = \"1\" ] && [ \"$SILENT\" = \"0\" ] && echo -e \"${DIM}  [dry] settings put $ns $key '$val'${NC}\"\n    return 0\n  fi\n  settings put \"$ns\" \"$key\" \"$val\" >> \"$LOGFILE\" 2>&1\n}\n\nsget() { settings get \"$1\" \"$2\" 2>/dev/null; }\n\nappend_unique() {\n  [ -z \"$1\" ] || [ -z \"$2\" ] && return\n  grep -Fxq \"$2\" \"$1\" 2>/dev/null || echo \"$2\" >> \"$1\"\n}\n\n# =============================================================================\n# DETECCI\u00d3N DE CAPACIDADES\n# =============================================================================\ndetect_capabilities() {\n  section \"Detectando capacidades del sistema\"\n\n  ANDROID_VER=$(getprop ro.build.version.release 2>/dev/null || echo \"?\")\n  DEVICE_MODEL=$(getprop ro.product.model 2>/dev/null || echo \"?\")\n  API_LEVEL=$(getprop ro.build.version.sdk 2>/dev/null || echo \"0\")\n  BUILD_DATE=$(getprop ro.build.date 2>/dev/null || echo \"?\")\n  CHIPSET=$(getprop ro.hardware 2>/dev/null || echo \"?\")\n  ABI=$(getprop ro.product.cpu.abi 2>/dev/null || echo \"?\")\n\n  say \"${W}  Dispositivo : ${Y}$DEVICE_MODEL${NC}\"\n  say \"${W}  Android     : ${Y}$ANDROID_VER (API $API_LEVEL)${NC}\"\n  say \"${W}  Chipset     : ${Y}$CHIPSET / $ABI${NC}\"\n  say \"${W}  Build       : ${Y}$BUILD_DATE${NC}\"\n\n  # Root\n  if su -c \"id\" 2>/dev/null | grep -q \"uid=0\"; then\n    HAS_ROOT=1\n    DO_KERNEL=1\n    ok \"Root disponible \u2014 kernel/gpu/host tuning habilitado\"\n  else\n    warn \"Sin root \u2014 se omitir\u00e1n ajustes de kernel, GPU y /etc/hosts\"\n  fi\n\n  # RAM\n  TOTAL_RAM_MB=$(awk '/MemTotal/{printf \"%d\", $2/1024}' /proc/meminfo 2>/dev/null || echo 0)\n  FREE_RAM_BEFORE=$(awk '/MemAvailable/{printf \"%d\", $2/1024}' /proc/meminfo 2>/dev/null || echo 0)\n  say \"${W}  RAM total   : ${Y}${TOTAL_RAM_MB}MB  (libre: ${FREE_RAM_BEFORE}MB)${NC}\"\n\n  # Almacenamiento\n  FREE_STORAGE_BEFORE=$(df -h /sdcard 2>/dev/null | awk 'NR==2{print $4}' || echo \"?\")\n  say \"${W}  Storage libre: ${Y}${FREE_STORAGE_BEFORE}${NC}\"\n\n  # API m\u00ednima\n  if [ \"$API_LEVEL\" -lt 29 ] 2>/dev/null; then\n    warn \"Android < 10. Algunos comandos pueden no funcionar.\"\n  fi\n\n  # Temperatura\n  TEMP_RAW=$(cat /sys/class/thermal/thermal_zone0/temp 2>/dev/null || echo \"0\")\n  TEMP_C=$((TEMP_RAW / 1000))\n  if [ \"$TEMP_C\" -gt 42 ]; then\n    warn \"Temperatura alta: ${TEMP_C}\u00b0C \u2014 se recomienda dejar enfriar.\"\n  else\n    info \"Temperatura: ${TEMP_C}\u00b0C \u2014 OK\"\n  fi\n\n  # Bater\u00eda\n  BAT_LEVEL=$(dumpsys battery 2>/dev/null | awk -F': ' '/level:/{print $2; exit}')\n  BAT_LEVEL=\"${BAT_LEVEL:-50}\"\n  BAT_STATUS=$(dumpsys battery 2>/dev/null | awk -F': ' '/status:/{print $2; exit}')\n  say \"${W}  Bater\u00eda     : ${Y}${BAT_LEVEL}% (estado: ${BAT_STATUS:-?})${NC}\"\n\n  if [ \"$BAT_LEVEL\" -lt 15 ] 2>/dev/null; then\n    warn \"Bater\u00eda baja (${BAT_LEVEL}%). Conectar cargador.\"\n    [ \"$MODE\" = \"godmode\" ] && { warn \"godmode requiere >=15%. Cambiando a 'aggressive'.\"; MODE=\"aggressive\"; }\n  fi\n\n  log \"Detecci\u00f3n: Root=$HAS_ROOT Android=$ANDROID_VER API=$API_LEVEL RAM=${TOTAL_RAM_MB}MB Temp=${TEMP_C}\u00b0C Bat=${BAT_LEVEL}%\"\n}\n\n# =============================================================================\n# BACKUP DE AJUSTES\n# =============================================================================\nbackup_settings() {\n  section \"Backup de configuraci\u00f3n actual\"\n\n  if [ -f \"$SETTINGS_BACKUP\" ]; then\n    info \"Backup previo encontrado: $SETTINGS_BACKUP\"\n    return 0\n  fi\n\n  info \"Guardando ajustes del sistema...\"\n  {\n    echo \"# TITAN v${VERSION} Settings Backup -- $(date)\"\n    echo \"# Restaurar: sh titan_v52.sh --restore\"\n    echo \"\"\n    for ns in global system secure; do\n      echo \"# --- $ns ---\"\n      settings list \"$ns\" 2>/dev/null | while IFS='=' read -r key val; do\n        [ -n \"$key\" ] && echo \"settings put $ns $key '$val'\"\n      done\n      echo \"\"\n    done\n  } > \"$SETTINGS_BACKUP\"\n  ok \"Backup guardado: $SETTINGS_BACKUP\"\n}\n\n# =============================================================================\n# RESTAURACI\u00d3N\n# =============================================================================\ndo_restore() {\n  section \"RESTAURANDO CONFIGURACI\u00d3N ANTERIOR\"\n\n  if [ -f \"$SETTINGS_BACKUP\" ]; then\n    info \"Restaurando ajustes del sistema...\"\n    grep -v \"^#\" \"$SETTINGS_BACKUP\" | while IFS= read -r line; do\n      [ -n \"$line\" ] && run \"$line\"\n    done\n    ok \"Ajustes del sistema restaurados\"\n  else\n    warn \"No se encontr\u00f3 backup de ajustes: $SETTINGS_BACKUP\"\n  fi\n\n  if [ -f \"$DEBLOAT_STATE\" ]; then\n    info \"Reinstalando apps removidas...\"\n    while IFS= read -r pkg; do\n      [ -z \"$pkg\" ] && continue\n      if run \"pm install-existing --user 0 $pkg 2>/dev/null\"; then\n        ok \"  Reinstalada: $pkg\"\n      else\n        warn \"  No se pudo reinstalar: $pkg\"\n      fi\n    done < \"$DEBLOAT_STATE\"\n  fi\n\n  if [ -f \"$DISABLED_STATE\" ]; then\n    info \"Habilitando apps deshabilitadas...\"\n    while IFS= read -r pkg; do\n      [ -z \"$pkg\" ] && continue\n      run \"pm enable --user 0 $pkg 2>/dev/null\" && ok \"  Habilitada: $pkg\"\n    done < \"$DISABLED_STATE\"\n  fi\n\n  if [ -f \"$SERVICES_BACKUP\" ] && [ \"$HAS_ROOT\" = \"1\" ]; then\n    info \"Restaurando servicios detenidos...\"\n    while IFS= read -r svc; do\n      [ -z \"$svc\" ] && continue\n      run_root \"service start $svc 2>/dev/null\" && ok \"  Servicio iniciado: $svc\"\n    done < \"$SERVICES_BACKUP\"\n  fi\n\n  if [ \"$HAS_ROOT\" = \"1\" ] && [ -f \"${HOSTS_BACKUP}.bak\" ]; then\n    info \"Restaurando /etc/hosts original...\"\n    run_root \"cp ${HOSTS_BACKUP}.bak /etc/hosts\"\n    ok \"Hosts restaurado\"\n  fi\n\n  ok \"Restauraci\u00f3n completa.\"\n  exit 0\n}\n\n# =============================================================================\n# PAQUETES PROTEGIDOS\n# =============================================================================\nPROTECTED=\"\nandroid\ncom.android.systemui\ncom.android.settings\ncom.android.shell\ncom.android.packageinstaller\ncom.google.android.packageinstaller\ncom.android.permissioncontroller\ncom.google.android.permissioncontroller\ncom.android.providers.media\ncom.android.providers.media.module\ncom.android.providers.downloads\ncom.android.providers.contacts\ncom.android.providers.calendar\ncom.android.providers.telephony\ncom.android.providers.settings\ncom.android.externalstorage\ncom.android.documentsui\ncom.android.vending\ncom.google.android.gms\ncom.google.android.gsf\ncom.android.phone\ncom.android.contacts\ncom.android.messaging\ncom.android.bluetooth\ncom.android.nfc\ncom.android.wifi\ncom.android.server.telecom\ncom.android.keychain\ncom.android.inputmethod.latin\ncom.android.launcher3\ncom.motorola.launcher3\ncom.motorola.launcher\ncom.motorola.settings\ncom.motorola.camera\ncom.motorola.camera2\ncom.motorola.mobiledesktop\ncom.motorola.moto.actions\ncom.motorola.motodisplay\ncom.motorola.targetnotif\ncom.motorola.ccc\ncom.whatsapp\ncom.google.android.apps.photos\n\"\n\nis_protected() {\n  pkg=\"$1\"\n  [ -z \"$pkg\" ] && return 0\n  echo \"$PROTECTED\" | grep -Fxq \"$pkg\" && return 0\n  case \"$pkg\" in\n    com.android.*)         return 0 ;;\n    com.motorola.ccc*)     return 0 ;;\n    com.qualcomm.*)        return 0 ;;\n    com.qti.*)             return 0 ;;\n    com.google.android.gms*) return 0 ;;\n  esac\n  return 1\n}\n\n# =============================================================================\n# LISTAS DE DEBLOAT \u2014 v52 ampliada (+120 paquetes)\n# =============================================================================\n\n# \u2500\u2500 SAFE: apps de bienestar, tours, demos, tracking b\u00e1sico \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nDEBLOAT_SAFE=\"\ncom.google.android.apps.wellbeing\ncom.google.android.printservice.recommendation\ncom.android.traceur\ncom.google.android.apps.magazines\ncom.motorola.help\ncom.motorola.mototour\ncom.motorola.demo\ncom.motorola.testing\ncom.motorola.brapps\ncom.motorola.discovery\ncom.motorola.recommendations\ncom.motorola.setuplauncher\ncom.motorola.targetnotif\ncom.facebook.appmanager\ncom.facebook.services\ncom.facebook.system\ncom.meta.appmanager\ncom.meta.services\ncom.qualcomm.atfwd\ncom.qualcomm.embms\ncom.qualcomm.location.XT\ncom.qualcomm.qti.qms.service.trustzoneaccess\ncom.android.stk\ncom.android.stk2\ncom.android.emergency\ncom.android.wallpaper.livepicker\ncom.android.wallpaperbackup\ncom.android.soundpicker\ncom.android.dreams.basic\ncom.android.dreams.phototable\ncom.android.musicfx\ncom.android.galaxy4\ncom.android.partnerbrowsercustomizations\n\"\n\n# \u2500\u2500 BALANCED: redes sociales conocidas + apps de viajes/compras \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nDEBLOAT_BALANCED=\"\n$DEBLOAT_SAFE\ncom.google.android.apps.tachyon\ncom.google.android.apps.youtube.kids\ncom.google.android.music\ncom.google.android.videos\ncom.google.android.keep\ncom.google.android.play.games\ncom.google.android.tv.remote.service\ncom.microsoft.bing\ncom.microsoft.launcher\ncom.amazon.device.setup\ncom.amazon.venezia\ncom.amazon.firetv.customization.moto\ncom.motorola.android.fmr
