  <script>
    const RAW_SCRIPT = document.getElementById('rawScriptData').textContent.trim();
    const codeEl = document.getElementById('codeBlock');
    const linesEl = document.getElementById('linesCount');

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function render() {
      const lines = RAW_SCRIPT.split('\n');
      linesEl.textContent = `Lines: ${lines.length}`;
      const html = lines.map((line, i) => {
        let safe = escapeHtml(line);
        return `<span class="line-num">${String(i+1).padStart(3,' ')}</span>${safe}`;
      }).join('\n');
      codeEl.innerHTML = html;
    }

    window.copyRaw = () => navigator.clipboard.writeText(RAW_SCRIPT).then(() => alert('вњ… Script copiado correctamente'));
    window.downloadScript = () => {
      const blob = new Blob([RAW_SCRIPT], { type: 'text/x-sh' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'titan_v99.1.sh';
      a.click();
      alert('вњ… Archivo titan_v99.1.sh descargado');
    };

    render();
  </script>
