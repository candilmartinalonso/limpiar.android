# =============================================================================

strip_ansi() { sed 's/\u001b\[[0-9;]*m//g'; }

log_init() {
  mkdir -p "$LOGDIR" "$CFGDIR" "$REPORTDIR" 2>/dev/null
  touch "$LOGFILE" "$SUMMARYFILE" 2>/dev/null
}

log() { echo "$(date '+%F %T') | $*" >> "$LOGFILE" 2>/dev/null; }

say() {
  [ "$VERBOSE" = "1" ] && echo -e "$*"
  echo -e "$*" | strip_ansi | log
}

run() {
  if [ "$DRY_RUN" = "1" ]; then
    say "${C}[dry] $*${NC}"
    return 0
  fi
  sh -c "$*" >> "$LOGFILE" 2>&1
  return $?
}

append_unique_line() {
  f="$1"
  line="$2"
  [ -z "$f" ] && return 0
  [ -z "$line" ] && return 0
  mkdir -p "$(dirname "$f")" 2>/dev/null
  touch "$f" 2>/dev/null
  grep -Fxq "$line" "$f" 2>/dev/null || echo "$line" >> "$f"
}

getprop_safe() { getprop "$1" 2>/dev/null; }
settings_get_safe() { settings get "$1" "$2" 2>/dev/null; }
settings_put_safe() { run "settings put $1 $2 '$3'"; }

battery_level() { dumpsys battery 2>/dev/null | awk -F': ' '/level:/{print $2; exit}'; }

pkg_installed() { p="$1"; pm list packages 2>/dev/null | cut -d: -f2 | grep -Fxq "$p"; }

# =============================================================================
# GODMODE SUPREME FUNCTIONS
# =============================================================================

godmode_memory_nuclear() {
  say "${B}[🔥] MEMORY NUCLEAR OPTIMIZATION...${NC}"
  : > "$MEMORY_LOG"
  
  for i in 1 2 3 4 5; do
    run "am send-trim-memory --help 2>/dev/null || true"
  done
  
  run "echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true"
  run "sync && sync && sync && sync && sync"
  
  pm list packages | cut -d: -f2 | while read pkg; do
    run "am send-trim-memory $pkg TRIM_MEMORY_RUNNING_CRITICAL 2>/dev/null || true"
    run "pm clear --user 0 $pkg 2>/dev/null || true"
  done
  
  run "echo 1 > /proc/sys/vm/compact_memory 2>/dev/null || true"
  run "echo 1 > /proc/sys/vm/compact_memory 2>/dev/null || true"
  
  echo "[MEMORY-NUCLEAR] Complete" >> "$MEMORY_LOG"
  say "${G}[✓] Memory nuclear optimization complete${NC}"
}

godmode_storage_annihilation() {
  say "${B}[💾] STORAGE ANNIHILATION...${NC}"
  : > "$DEFRAG_LOG"
  
  for i in 1 2 3 4; do
    for partition in /dev/block/sda* /dev/block/mmcblk*; do
      [ -e "$partition" ] && run "fstrim \"$partition\" 2>/dev/null || true"
    done
  done
  
  for i in 1 2 3 4 5; do
    run "sync"
  done
  
  say "${G}[✓] Storage annihilation complete${NC}"
}

godmode_database_destruction() {
  say "${B}[🗄️] DATABASE DESTRUCTION...${NC}"
  
  find /data -name "*.db" 2>/dev/null | while read db; do
    run "sqlite3 \"$db\" \"VACUUM; ANALYZE; PRAGMA integrity_check;\" 2>/dev/null || true"
  done
  
  find /data -name "*.db-wal" -delete 2>/dev/null || true
  find /data -name "*.db-shm" -delete 2>/dev/null || true
  
  run "rm -rf /data/dalvik-cache/* 2>/dev/null || true"
  run "rm -rf /data/resource-cache/* 2>/dev/null || true"
  
  say "${G}[✓] Database destruction complete${NC}"
}

  run "rm -rf /data/system/traces/* 2>/dev/null || true"

  run "rm -rf /data/media/0/.*/* 2>/dev/null || true"
  run "rm -rf /tmp/* 2>/dev/null || true"
  run "rm -rf /var/tmp/* 2>/dev/null || true"
  run "rm -rf /var/cache/* 2>/dev/null || true"

  pm list packages | cut -d: -f2 | while read pkg; do

  <script>
    const titanEl = document.getElementById('titanScript');
    const codeEl = document.getElementById('codeBlock');
    const linesEl = document.getElementById('linesCount');
    const toastEl = document.getElementById('toast');
    const toastTextEl = document.getElementById('toastText');
    const searchInputEl = document.getElementById('searchInput');

    function getRawScript() {
      return (titanEl?.textContent || '').replace(/\r\n/g, '\n').trimEnd();
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showToast(msg) {
      toastTextEl.textContent = msg;
      toastEl.classList.remove('opacity-0', 'pointer-events-none');
      toastEl.classList.add('opacity-100');
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => {
        toastEl.classList.add('opacity-0', 'pointer-events-none');
        toastEl.classList.remove('opacity-100');
      }, 1200);
    }

    async function copyText(txt, msg) {
      if (!txt) return showToast('NO HAY TEXTO PARA COPIAR');
      try {
        await navigator.clipboard.writeText(txt);
        showToast(msg || 'COPIADO');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = txt;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(msg || 'COPIADO');
      }
    }

    function render(raw, query = '') {
      const lines = raw.split('\n');
      linesEl.textContent = `Lines: ${lines.length}`;

      const q = (query || '').trim();
      const qRe = q ? new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi') : null;

      const html = lines.map((line, i) => {
        let safe = escapeHtml(line);
        if (qRe) {
          safe = safe.replace(qRe, m => `<mark class="bg-god-500/30 text-god-400 px-0.5">${m}</mark>`);
        }
        return `<span class="line-num">${String(i + 1).padStart(3, ' ')}</span>${safe}`;
      }).join('\n');

      codeEl.innerHTML = html;
    }

    window.copyRaw = function () {
      const raw = getRawScript();
      copyText(raw, 'SCRIPT COPIADO');
    };

    window.copyOneLiner = function () {
      const cmd = `adb shell sh /sdcard/Download/TITAN_v50_GODMODE.sh`;
      copyText(cmd, 'COMANDO ADB COPIADO');
    };

    window.highlightSearch = function () {
      render(getRawScript(), searchInputEl?.value || '');
    };

    (function init() {
      const raw = getRawScript();
      if (!raw) {
        codeEl.textContent = '⚠️ No se encontró contenido en #titanScript (vacío).';
        linesEl.textContent = 'Lines: 0';
        return;
      }
      render(raw, '');
    })();
  </script>
