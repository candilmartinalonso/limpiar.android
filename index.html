  <script id="titanScript" type="text/plain">#!/system/bin/sh
# =============================================================================
# TITAN v33 EXTREME FLUIDITY EDITION (NO-ROOT / ADB SAFE)
# -----------------------------------------------------------------------------
# Objetivo:
# - Maximizar fluidez real sin root
# - Limpiar profundamente residuos comunes en /sdcard
# - Aplicar ajustes perceptibles de respuesta
# - Ejecutar mantenimiento y dexopt best-effort
# - Hacer alivio de memoria por perfil
# - Mantener exclusión dura para WhatsApp
# - Permitir restore completo de settings tocados
#
# Uso:
#   adb shell sh /sdcard/Download/titan_v33.sh
#   adb shell sh /sdcard/Download/titan_v33.sh --profile safe
#   adb shell sh /sdcard/Download/titan_v33.sh --profile balanced
#   adb shell sh /sdcard/Download/titan_v33.sh --profile max
#   adb shell sh /sdcard/Download/titan_v33.sh --profile extreme
#   adb shell sh /sdcard/Download/titan_v33.sh --dry-run
#   adb shell sh /sdcard/Download/titan_v33.sh --restore
#   adb shell sh /sdcard/Download/titan_v33.sh --dexopt-all
#   adb shell sh /sdcard/Download/titan_v33.sh --force-heavy
#   adb shell sh /sdcard/Download/titan_v33.sh --disable-haptics
#
# Notas:
# - NO usa root
# - NO promete OTA silenciosa universal
# - Muchas acciones dependen del OEM / versión de Android
# - NO borra contenido de WhatsApp:
#     /sdcard/WhatsApp/**
#     /sdcard/Android/media/com.whatsapp/**
#     /sdcard/Android/data/com.whatsapp/**
# =============================================================================

# -----------------------------------------------------------------------------
# Colores
# -----------------------------------------------------------------------------
R='\033[0;31m'
G='\033[0;32m'
Y='\033[1;33m'
C='\033[0;36m'
P='\033[0;35m'
B='\033[0;34m'
NC='\033[0m'

# -----------------------------------------------------------------------------
# Configuración base
# -----------------------------------------------------------------------------
DRY_RUN=0
VERBOSE=1
MODE="run"
PROFILE="balanced"

AUTO_TRIM_CACHES=1
AUTO_DEXOPT=1
AUTO_DROP_CACHES=0
AUTO_DISABLE_HAPTICS=0
AUTO_REBOOT_HINT=1
AUTO_FIXED_PERF_TEMPORARY=1
AUTO_CLEAR_CLIPBOARD=0
AUTO_FORCE_STOP=0
AUTO_PRUNE_EMPTY_DIRS=1
AUTO_TRIM_LOGFILE=1
AUTO_CLEAR_BUGREPORTS=1
AUTO_CLEAR_TOMBSTONES=1
AUTO_CLEAR_EMPTY_FILES=1
AUTO_CLEAR_OLD_INSTALLERS=1
AUTO_CLEAR_DOWNLOAD_JUNK=1
AUTO_CLEAR_MEDIA_THUMBS=1
AUTO_CLEAR_TMP_DIRS=1
AUTO_CLEAR_LOG_DIRS=1
AUTO_CLEAR_APP_CACHE_DIRS=1

DEXOPT_ALL=0
FORCE_HEAVY_TASKS=0
FORCE_STOP_MAX_COUNT=10
FORCE_STOP_NONCRITICAL=0

DAYS_OLD=2
MIN_SIZE_KB=8
DOWNLOAD_MAXDEPTH=4
MAX_LOG_SIZE_MB=24
BATTERY_MIN_FOR_HEAVY=35
TEMP_MAX_C=43

ANIM_SCALE="0.35"
TOUCH_TIMEOUT="110"
POINTER_SPEED="5"
FONT_SCALE=""
BG_LIMIT=""
MEDIA_SCAN_HINT=1

LOGDIR="/sdcard/Download"
LOGFILE="${LOGDIR}/titan_v33.log"
STATEFILE="${LOGDIR}/titan_state_v33.conf"

# -----------------------------------------------------------------------------
# Protección WhatsApp
# -----------------------------------------------------------------------------
WHATSAPP_EXCLUDE_1="/sdcard/WhatsApp"
WHATSAPP_EXCLUDE_2="/sdcard/Android/media/com.whatsapp"
WHATSAPP_EXCLUDE_3="/sdcard/Android/data/com.whatsapp"

# -----------------------------------------------------------------------------
# Basura común
# -----------------------------------------------------------------------------
JUNK_EXTS="tmp temp log bak old ~ swp part crdownload dmp sav shm journal lock trace stacktrace tombstone tombstones"
INSTALLER_EXTS="apk apks xapk apkm"
CACHE_NAMES="cache code_cache tmp temp logs log bugreport bugreports crash tombstone tombstones"
THUMB_PATTERNS=".thumbnails .thumbnail thumbs thumbcache"

TRASH_GLOBS="
/sdcard/Download
/sdcard/DCIM/.thumbnails
/sdcard/Pictures/.thumbnails
/sdcard/Movies/.thumbnails
/sdcard/MIUI/debug_log
/sdcard/tencent/MicroMsg/CheckResUpdate
/sdcard/bugreports
/sdcard/Telegram/Telegram Images/.cache
/sdcard/Telegram/Telegram Video/.cache
/sdcard/Telegram/Telegram Documents/.cache
/sdcard/Android/data/*/cache
/sdcard/Android/data/*/code_cache
/sdcard/Android/data/*/files/cache
/sdcard/Android/data/*/files/code_cache
/sdcard/Android/data/*/files/tmp
/sdcard/Android/data/*/files/log*
/sdcard/Android/media/*/*/cache
/sdcard/Android/media/*/*/tmp
/sdcard/Android/media/*/*/log*
/sdcard/LOST.DIR
"

# -----------------------------------------------------------------------------
# Helpers
# -----------------------------------------------------------------------------
strip_ansi() {
  sed 's/\x1b\[[0-9;]*m//g'
}

log_init() {
  mkdir -p "$LOGDIR" 2>/dev/null
  : > "$LOGFILE" 2>/dev/null
}

log() {
  echo "$(date '+%F %T') | $*" >> "$LOGFILE" 2>/dev/null
}

say() {
  if [ "$VERBOSE" = "1" ]; then
    echo -e "$*"
  fi
  echo -e "$*" | strip_ansi | log
}

exists() {
  command -v "$1" >/dev/null 2>&1
}

run() {
  if [ "$DRY_RUN" = "1" ]; then
    say "${C}[dry] $*${NC}"
    return 0
  fi
  sh -c "$*" >> "$LOGFILE" 2>&1
  return $?
}

run_quiet() {
  if [ "$DRY_RUN" = "1" ]; then
    say "${C}[dry] $*${NC}"
    return 0
  fi
  sh -c "$*" >/dev/null 2>&1
  return $?
}

getprop_safe() {
  getprop "$1" 2>/dev/null
}

settings_get_safe() {
  ns="$1"
  key="$2"
  settings get "$ns" "$key" 2>/dev/null
}

settings_put_safe() {
  ns="$1"
  key="$2"
  val="$3"
  run "settings put $ns $key '$val'"
}

settings_delete_safe() {
  ns="$1"
  key="$2"
  run "settings delete $ns $key" || true
}

sdk() { getprop_safe ro.build.version.sdk; }
brand() { getprop_safe ro.product.brand; }
model() { getprop_safe ro.product.model; }
manufacturer() { getprop_safe ro.product.manufacturer; }
release_ver() { getprop_safe ro.build.version.release; }
secpatch() { getprop_safe ro.build.version.security_patch; }

sd_avail_kb() {
  df -k /sdcard 2>/dev/null | awk 'NR==2{print $4}'
}

sd_avail_bytes() {
  kb="$(sd_avail_kb)"
  [ -z "$kb" ] && kb=0
  awk -v kb="$kb" 'BEGIN{print kb*1024}'
}

bytes_to_mb() {
  b="$1"
  [ -z "$b" ] && b=0
  awk -v b="$b" 'BEGIN{printf "%.1f MB", b/1024/1024}'
}

bytes_to_gb() {
  b="$1"
  [ -z "$b" ] && b=0
  awk -v b="$b" 'BEGIN{printf "%.2f GB", b/1024/1024/1024}'
}

sum_bytes_from_stdin() {
  awk '{s+=$1} END{print s+0}'
}

file_size_mb() {
  f="$1"
  ls -l "$f" 2>/dev/null | awk '{printf "%.1f", $5/1024/1024}'
}

battery_level() {
  dumpsys battery 2>/dev/null | awk -F': ' '/level:/{print $2; exit}'
}

battery_temp_c() {
  t="$(dumpsys battery 2>/dev/null | awk -F': ' '/temperature:/{print $2; exit}')"
  [ -z "$t" ] && t=0
  awk -v x="$t" 'BEGIN{printf "%.1f", x/10}'
}

battery_status_text() {
  dumpsys battery 2>/dev/null | awk -F': ' '/status:/{print $2; exit}'
}

rotate_log_if_needed() {
  [ "$AUTO_TRIM_LOGFILE" = "1" ] || return 0
  [ -f "$LOGFILE" ] || return 0
  cur="$(file_size_mb "$LOGFILE")"
  cur_int="$(echo "$cur" | awk -F. '{print $1}')"
  [ -z "$cur_int" ] && cur_int=0
  if [ "$cur_int" -ge "$MAX_LOG_SIZE_MB" ]; then
    mv "$LOGFILE" "${LOGFILE}.old" 2>/dev/null
    : > "$LOGFILE" 2>/dev/null
  fi
}

is_whatsapp_path() {
  p="$1"
  case "$p" in
    ${WHATSAPP_EXCLUDE_1}*|${WHATSAPP_EXCLUDE_2}*|${WHATSAPP_EXCLUDE_3}*)
      return 0
      ;;
  esac
  return 1
}

should_run_heavy_tasks() {
  [ "$FORCE_HEAVY_TASKS" = "1" ] && return 0

  lvl="$(battery_level)"
  temp="$(battery_temp_c)"

  [ -z "$lvl" ] && lvl=100
  [ -z "$temp" ] && temp=0

  temp_int="$(echo "$temp" | awk -F. '{print $1}')"
  [ -z "$temp_int" ] && temp_int=0

  if [ "$lvl" -lt "$BATTERY_MIN_FOR_HEAVY" ]; then
    return 1
  fi

  if [ "$temp_int" -ge "$TEMP_MAX_C" ]; then
    return 1
  fi

  return 0
}

with_fixed_perf_begin() {
  [ "$AUTO_FIXED_PERF_TEMPORARY" = "1" ] || return 0
  exists cmd || return 0
  run_quiet "cmd power set-fixed-performance-mode-enabled true" || true
}

with_fixed_perf_end() {
  [ "$AUTO_FIXED_PERF_TEMPORARY" = "1" ] || return 0
  exists cmd || return 0
  run_quiet "cmd power set-fixed-performance-mode-enabled false" || true
}

media_scan_hint() {
  [ "$MEDIA_SCAN_HINT" = "1" ] || return 0
  exists am || return 0
  run_quiet "am broadcast -a android.intent.action.MEDIA_SCANNER_SCAN_FILE -d file:///sdcard" || true
}

cleanup_on_exit() {
  with_fixed_perf_end
  rotate_log_if_needed
}
trap cleanup_on_exit EXIT INT TERM

# -----------------------------------------------------------------------------
# Args
# -----------------------------------------------------------------------------
while [ $# -gt 0 ]; do
  case "$1" in
    --dry-run) DRY_RUN=1 ;;
    --quiet) VERBOSE=0 ;;
    --restore) MODE="restore" ;;

    --profile)
      shift
      PROFILE="$1"
      ;;

    --profile=safe) PROFILE="safe" ;;
    --profile=balanced) PROFILE="balanced" ;;
    --profile=max) PROFILE="max" ;;
    --profile=extreme) PROFILE="extreme" ;;

    --disable-haptics) AUTO_DISABLE_HAPTICS=1 ;;
    --drop-caches) AUTO_DROP_CACHES=1 ;;
    --no-dexopt) AUTO_DEXOPT=0 ;;
    --no-trim-caches) AUTO_TRIM_CACHES=0 ;;
    --dexopt-all) DEXOPT_ALL=1 ;;
    --force-heavy) FORCE_HEAVY_TASKS=1 ;;
    --clear-clipboard) AUTO_CLEAR_CLIPBOARD=1 ;;
  esac
  shift
done

# -----------------------------------------------------------------------------
# Perfil
# -----------------------------------------------------------------------------
apply_profile() {
  case "$PROFILE" in
    safe)
      ANIM_SCALE="0.50"
      TOUCH_TIMEOUT="120"
      POINTER_SPEED="4"
      BG_LIMIT=""
      FORCE_STOP_NONCRITICAL=0
      FORCE_STOP_MAX_COUNT=0
      DAYS_OLD=4
      MIN_SIZE_KB=16
      AUTO_DISABLE_HAPTICS=0
      AUTO_FORCE_STOP=0
      ;;
    balanced)
      ANIM_SCALE="0.35"
      TOUCH_TIMEOUT="110"
      POINTER_SPEED="5"
      BG_LIMIT=""
      FORCE_STOP_NONCRITICAL=0
      FORCE_STOP_MAX_COUNT=0
      DAYS_OLD=2
      MIN_SIZE_KB=8
      AUTO_DISABLE_HAPTICS=0
      AUTO_FORCE_STOP=0
      ;;
    max)
      ANIM_SCALE="0.25"
      TOUCH_TIMEOUT="100"
      POINTER_SPEED="6"
      BG_LIMIT="4"
      FORCE_STOP_NONCRITICAL=1
      FORCE_STOP_MAX_COUNT=8
      DAYS_OLD=2
      MIN_SIZE_KB=4
      AUTO_DISABLE_HAPTICS=0
      AUTO_FORCE_STOP=1
      ;;
    extreme)
      ANIM_SCALE="0.20"
      TOUCH_TIMEOUT="90"
      POINTER_SPEED="7"
      BG_LIMIT="3"
      FORCE_STOP_NONCRITICAL=1
      FORCE_STOP_MAX_COUNT=16
      DAYS_OLD=1
      MIN_SIZE_KB=2
      AUTO_DISABLE_HAPTICS=1
      AUTO_FORCE_STOP=1
      DEXOPT_ALL=1
      ;;
    *)
      say "${Y}[!] Perfil inválido: ${PROFILE}. Usando balanced.${NC}"
      PROFILE="balanced"
      apply_profile
      return
      ;;
  esac
}

# -----------------------------------------------------------------------------
# Save / restore
# -----------------------------------------------------------------------------
save_state() {
  [ -f "$STATEFILE" ] && return 0

  say "${C}[i] Guardando estado para --restore...${NC}"
  {
    echo "window_animation_scale=$(settings_get_safe global window_animation_scale)"
    echo "transition_animation_scale=$(settings_get_safe global transition_animation_scale)"
    echo "animator_duration_scale=$(settings_get_safe global animator_duration_scale)"
    echo "long_press_timeout=$(settings_get_safe secure long_press_timeout)"
    echo "multi_press_timeout=$(settings_get_safe secure multi_press_timeout)"
    echo "pointer_speed=$(settings_get_safe system pointer_speed)"
    echo "haptic_feedback_enabled=$(settings_get_safe system haptic_feedback_enabled)"
    echo "font_scale=$(settings_get_safe system font_scale)"
    echo "limit_background_processes=$(settings_get_safe global limit_background_processes)"
  } > "$STATEFILE" 2>/dev/null
}

restore_settings() {
  if [ ! -f "$STATEFILE" ]; then
    say "${Y}[!] No existe statefile: $STATEFILE${NC}"
    return 1
  fi

  say "${P}[↩] Restaurando settings...${NC}"
  . "$STATEFILE" 2>/dev/null

  [ -n "$window_animation_scale" ] && settings_put_safe global window_animation_scale "$window_animation_scale"
  [ -n "$transition_animation_scale" ] && settings_put_safe global transition_animation_scale "$transition_animation_scale"
  [ -n "$animator_duration_scale" ] && settings_put_safe global animator_duration_scale "$animator_duration_scale"
  [ -n "$long_press_timeout" ] && settings_put_safe secure long_press_timeout "$long_press_timeout"
  [ -n "$multi_press_timeout" ] && settings_put_safe secure multi_press_timeout "$multi_press_timeout"
  [ -n "$pointer_speed" ] && settings_put_safe system pointer_speed "$pointer_speed"
  [ -n "$haptic_feedback_enabled" ] && settings_put_safe system haptic_feedback_enabled "$haptic_feedback_enabled"
  [ -n "$font_scale" ] && settings_put_safe system font_scale "$font_scale"

  if [ -n "$limit_background_processes" ] && [ "$limit_background_processes" != "null" ]; then
    settings_put_safe global limit_background_processes "$limit_background_processes"
  else
    settings_delete_safe global limit_background_processes
  fi

  say "${G}[✓] Restore completado.${NC}"
  return 0
}

# -----------------------------------------------------------------------------
# Banner
# -----------------------------------------------------------------------------
banner() {
  FREEKB="$(sd_avail_kb)"
  BATT="$(battery_level)"
  TEMP="$(battery_temp_c)"

  say "${Y}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"
  say "${Y}  TITAN v33 EXTREME FLUIDITY  ${C}[NO-ROOT / ADB SAFE]${NC}"
  say "${Y}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"
  say "${P}[i] Device: $(model) | Brand: $(brand) | OEM: $(manufacturer)${NC}"
  say "${P}[i] Android: $(release_ver) | SDK: $(sdk) | Patch: $(secpatch)${NC}"
  say "${P}[i] Profile: ${PROFILE} | DRY_RUN: ${DRY_RUN}${NC}"
  say "${C}[i] /sdcard libres: ${FREEKB} KB (~$(bytes_to_gb "$(sd_avail_bytes)"))${NC}"
  say "${C}[i] Batería: ${BATT}% | Temp: ${TEMP}°C${NC}"
  say "${G}[LOCK] WhatsApp protegido: NO se borra contenido de WhatsApp.${NC}"
}

# -----------------------------------------------------------------------------
# Diagnóstico
# -----------------------------------------------------------------------------
diagnostics_pre() {
  say "\n${P}[1/9] DIAGNÓSTICO INICIAL${NC}"

  exists getprop && run "getprop | grep -E 'ro.product|ro.build.version|dalvik|persist.sys' | head -120" || true
  exists dumpsys && run "dumpsys meminfo | head -100" || true
  exists top && run "top -n 1 | head -50" || true
  exists df && run "df -h /data /sdcard" || true
  exists dumpsys && run "dumpsys battery | head -60" || true
  exists dumpsys && run "dumpsys package dexopt | head -150" || true
  exists dumpsys && run "dumpsys diskstats | head -100" || true

  say "${G}[✓] Diagnóstico inicial listo.${NC}"
}

# -----------------------------------------------------------------------------
# OTA informativo
# -----------------------------------------------------------------------------
ota_best_effort() {
  say "\n${P}[2/9] OTA / UPDATE CHECK INFO${NC}"

  BRAND_L="$(brand | tr '[:upper:]' '[:lower:]')"
  OEM_L="$(manufacturer | tr '[:upper:]' '[:lower:]')"

  say "${C}[i] No se abrirá la pantalla de actualización del sistema.${NC}"
  say "${C}[i] No existe OTA silenciosa universal por ADB normal en Android stock.${NC}"

  case "$BRAND_L $OEM_L" in
    *google*) say "${Y}[i] Pixel detectado: OTA gestionada por el sistema.${NC}" ;;
    *samsung*) say "${Y}[i] Samsung detectado: sin flujo silencioso universal no-root.${NC}" ;;
    *xiaomi*|*redmi*|*poco*) say "${Y}[i] Xiaomi/Redmi/POCO detectado: OTA silenciosa genérica no garantizada.${NC}" ;;
    *motorola*|*moto*) say "${Y}[i] Motorola detectado: OTA silenciosa genérica no garantizada.${NC}" ;;
    *oneplus*) say "${Y}[i] OnePlus detectado: OTA silenciosa genérica no garantizada.${NC}" ;;
    *) say "${Y}[i] OEM sin interfaz estándar accesible para OTA silenciosa.${NC}" ;;
  esac

  say "${G}[✓] Fase OTA informativa completada.${NC}"
}

# -----------------------------------------------------------------------------
# Inventario
# -----------------------------------------------------------------------------
list_download_junk() {
  pat="$(echo "$JUNK_EXTS" | awk '{for(i=1;i<=NF;i++) printf "-iname \"*.%s\"%s",$i,(i<NF?" -o ":"")}')"
  eval "find /sdcard/Download -maxdepth $DOWNLOAD_MAXDEPTH -type f \\( $pat \\) -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -print" 2>/dev/null
}

list_old_installers() {
  pat="$(echo "$INSTALLER_EXTS" | awk '{for(i=1;i<=NF;i++) printf "-iname \"*.%s\"%s",$i,(i<NF?" -o ":"")}')"
  eval "find /sdcard/Download -maxdepth 5 -type f \\( $pat \\) -mtime +15 -size +1024k -print" 2>/dev/null
}

list_logs_dumps() {
  find /sdcard -maxdepth 5 -type f \
    \( -iname "*.log" -o -iname "*logcat*" -o -iname "*.dmp" -o -iname "*.trace" -o -iname "*.stacktrace" -o -iname "*tombstone*" \) \
    -not -path "${WHATSAPP_EXCLUDE_1}/*" \
    -not -path "${WHATSAPP_EXCLUDE_2}/*" \
    -not -path "${WHATSAPP_EXCLUDE_3}/*" 2>/dev/null
}

estimate_paths_bytes() {
  while IFS= read -r f; do
    [ -n "$f" ] && ls -ln "$f" 2>/dev/null | awk '{print $5}'
  done | sum_bytes_from_stdin
}

report_cleanup_inventory() {
  say "\n${P}[3/9] INVENTARIO DE LIMPIEZA${NC}"

  DL_JUNK="$(list_download_junk)"
  DL_JUNK_N="$(echo "$DL_JUNK" | sed '/^$/d' | wc -l | tr -d ' ')"
  DL_JUNK_B="$(echo "$DL_JUNK" | estimate_paths_bytes)"

  OLD_APK="$(list_old_installers)"
  OLD_APK_N="$(echo "$OLD_APK" | sed '/^$/d' | wc -l | tr -d ' ')"
  OLD_APK_B="$(echo "$OLD_APK" | estimate_paths_bytes)"

  DUMPS="$(list_logs_dumps)"
  DUMPS_N="$(echo "$DUMPS" | sed '/^$/d' | wc -l | tr -d ' ')"
  DUMPS_B="$(echo "$DUMPS" | estimate_paths_bytes)"

  say "${C}[i] Junk Download: ${DL_JUNK_N} (~$(bytes_to_mb "$DL_JUNK_B"))${NC}"
  say "${C}[i] Instaladores viejos: ${OLD_APK_N} (~$(bytes_to_mb "$OLD_APK_B"))${NC}"
  say "${C}[i] Logs/dumps: ${DUMPS_N} (~$(bytes_to_mb "$DUMPS_B"))${NC}"
  say "${G}[✓] Inventario generado.${NC}"
}

# -----------------------------------------------------------------------------
# Limpieza profunda
# -----------------------------------------------------------------------------
pm_trim_caches() {
  [ "$AUTO_TRIM_CACHES" = "1" ] || return 0
  exists pm || return 0
  run "pm trim-caches 999G" || true
}

cleanup_download_junk() {
  [ "$AUTO_CLEAR_DOWNLOAD_JUNK" = "1" ] || return 0
  pat="$(echo "$JUNK_EXTS" | awk '{for(i=1;i<=NF;i++) printf "-iname \"*.%s\"%s",$i,(i<NF?" -o ":"")}')"
  run "find /sdcard/Download -maxdepth $DOWNLOAD_MAXDEPTH -type f \( $pat \) -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -delete"
}

cleanup_old_installers() {
  [ "$AUTO_CLEAR_OLD_INSTALLERS" = "1" ] || return 0
  pat="$(echo "$INSTALLER_EXTS" | awk '{for(i=1;i<=NF;i++) printf "-iname \"*.%s\"%s",$i,(i<NF?" -o ":"")}')"
  run "find /sdcard/Download -maxdepth 5 -type f \( $pat \) -mtime +15 -size +1024k -delete"
}

cleanup_trash_globs() {
  echo "$TRASH_GLOBS" | while IFS= read -r d; do
    [ -z "$d" ] && continue
    run "sh -c '
      for x in $d; do
        [ -e \"\$x\" ] || continue
        case \"\$x\" in
          ${WHATSAPP_EXCLUDE_1}*|${WHATSAPP_EXCLUDE_2}*|${WHATSAPP_EXCLUDE_3}*) continue ;;
        esac
        find \"\$x\" -type f -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -delete
      done
    '"
  done
}

cleanup_thumbnails() {
  [ "$AUTO_CLEAR_MEDIA_THUMBS" = "1" ] || return 0
  run "sh -c '
    find /sdcard -type f \
      \( -iname \"*.thumb*\" -o -path \"*/.thumbnails/*\" -o -iname \"*thumbcache*\" \) \
      -not -path \"${WHATSAPP_EXCLUDE_1}/*\" \
      -not -path \"${WHATSAPP_EXCLUDE_2}/*\" \
      -not -path \"${WHATSAPP_EXCLUDE_3}/*\" \
      -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -delete
  '" || true
}

cleanup_logs_dumps() {
  [ "$AUTO_CLEAR_LOG_DIRS" = "1" ] || return 0
  run "sh -c '
    find /sdcard -maxdepth 5 -type f \
      \( -iname \"*.log\" -o -iname \"*logcat*\" -o -iname \"*.dmp\" -o -iname \"*.trace\" -o -iname \"*.stacktrace\" -o -iname \"*tombstone*\" \) \
      -not -path \"${WHATSAPP_EXCLUDE_1}/*\" \
      -not -path \"${WHATSAPP_EXCLUDE_2}/*\" \
      -not -path \"${WHATSAPP_EXCLUDE_3}/*\" \
      -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -delete
  '" || true
}

cleanup_bugreports() {
  [ "$AUTO_CLEAR_BUGREPORTS" = "1" ] || return 0
  run "sh -c '
    find /sdcard -maxdepth 4 -type f \
      \( -iname \"bugreport*\" -o -iname \"*.zip\" -o -iname \"*.txt\" \) \
      -path \"/sdcard/bugreports/*\" \
      -mtime +1 -delete
  '" || true
}

cleanup_tombstones_named() {
  [ "$AUTO_CLEAR_TOMBSTONES" = "1" ] || return 0
  run "sh -c '
    find /sdcard -maxdepth 5 -type f \
      \( -iname \"*tombstone*\" -o -iname \"*.tombstone\" \) \
      -not -path \"${WHATSAPP_EXCLUDE_1}/*\" \
      -not -path \"${WHATSAPP_EXCLUDE_2}/*\" \
      -not -path \"${WHATSAPP_EXCLUDE_3}/*\" \
      -mtime +1 -delete
  '" || true
}

cleanup_zero_byte_files() {
  [ "$AUTO_CLEAR_EMPTY_FILES" = "1" ] || return 0
  run "sh -c '
    find /sdcard -maxdepth 6 -type f -size 0 \
      -not -path \"${WHATSAPP_EXCLUDE_1}/*\" \
      -not -path \"${WHATSAPP_EXCLUDE_2}/*\" \
      -not -path \"${WHATSAPP_EXCLUDE_3}/*\" \
      -delete
  '" || true
}

cleanup_tmp_and_cache_dirs() {
  [ "$AUTO_CLEAR_TMP_DIRS" = "1" ] || return 0
  run "sh -c '
    find /sdcard -maxdepth 6 -type d \
      \( -iname \"cache\" -o -iname \"code_cache\" -o -iname \"tmp\" -o -iname \"temp\" \) \
      -not -path \"${WHATSAPP_EXCLUDE_1}*\" \
      -not -path \"${WHATSAPP_EXCLUDE_2}*\" \
      -not -path \"${WHATSAPP_EXCLUDE_3}*\" | while read d; do
        [ -z \"\$d\" ] && continue
        find \"\$d\" -type f -mtime +$DAYS_OLD -size +${MIN_SIZE_KB}k -delete
      done
  '" || true
}

prune_empty_dirs() {
  [ "$AUTO_PRUNE_EMPTY_DIRS" = "1" ] || return 0
  run "sh -c '
    find /sdcard -maxdepth 6 -type d -empty \
      -not -path \"/sdcard\" \
      -not -path \"${WHATSAPP_EXCLUDE_1}\" \
      -not -path \"${WHATSAPP_EXCLUDE_2}\" \
      -not -path \"${WHATSAPP_EXCLUDE_3}\" \
      -delete
  '" || true
}

cleanup_storage() {
  say "\n${P}[4/9] LIMPIEZA PROFUNDA${NC}"

  BEFORE="$(sd_avail_bytes)"

  pm_trim_caches
  cleanup_download_junk
  cleanup_old_installers
  cleanup_trash_globs
  cleanup_thumbnails
  cleanup_logs_dumps
  cleanup_bugreports
  cleanup_tombstones_named
  cleanup_zero_byte_files
  cleanup_tmp_and_cache_dirs
  prune_empty_dirs

  AFTER="$(sd_avail_bytes)"
  DELTA="$(awk -v a="$AFTER" -v b="$BEFORE" 'BEGIN{print a-b}')"

  say "${G}[✓] Limpieza completada. Recuperado aprox: $(bytes_to_mb "$DELTA").${NC}"

  if [ -f "$LOGFILE" ]; then
    say "${C}[i] Log actual: $(file_size_mb "$LOGFILE") MB${NC}"
  fi
}

# -----------------------------------------------------------------------------
# Fluidez / input
# -----------------------------------------------------------------------------
tune_fluidity() {
  say "\n${P}[5/9] FLUIDEZ / INPUT${NC}"
  save_state

  settings_put_safe global window_animation_scale "$ANIM_SCALE"
  settings_put_safe global transition_animation_scale "$ANIM_SCALE"
  settings_put_safe global animator_duration_scale "$ANIM_SCALE"

  settings_put_safe secure long_press_timeout "$TOUCH_TIMEOUT" || true
  settings_put_safe secure multi_press_timeout "$TOUCH_TIMEOUT" || true
  settings_put_safe system pointer_speed "$POINTER_SPEED" || true

  if [ "$AUTO_DISABLE_HAPTICS" = "1" ]; then
    settings_put_safe system haptic_feedback_enabled "0" || true
  fi

  if [ -n "$FONT_SCALE" ]; then
    settings_put_safe system font_scale "$FONT_SCALE" || true
  fi

  if [ -n "$BG_LIMIT" ]; then
    settings_put_safe global limit_background_processes "$BG_LIMIT" || true
  fi

  if [ "$AUTO_CLEAR_CLIPBOARD" = "1" ]; then
    run_quiet "cmd clipboard set text ''" || true
  fi

  say "${G}[✓] Ajustes de fluidez aplicados.${NC}"
}

# -----------------------------------------------------------------------------
# Dexopt / compilación
# -----------------------------------------------------------------------------
dexopt_phase() {
  say "\n${P}[6/9] DEXOPT / COMPILACIÓN${NC}"

  [ "$AUTO_DEXOPT" = "1" ] || {
    say "${Y}[i] Dexopt desactivado por parámetro.${NC}"
    return 0
  }

  if ! should_run_heavy_tasks; then
    say "${Y}[i] Saltando tareas pesadas por batería/temperatura. Usa --force-heavy para forzarlas.${NC}"
    return 0
  fi

  with_fixed_perf_begin

  exists pm && run "pm dexopt-job" || true
  exists cmd && run "cmd package bg-dexopt-job" || true

  if [ "$DEXOPT_ALL" = "1" ]; then
    exists cmd && run "cmd package compile -m speed-profile -f -a" || true
  else
    exists cmd && run "cmd package compile -m speed-profile -f all" || true
  fi

  say "${G}[✓] Dexopt/compilación best-effort completado.${NC}"
}

# -----------------------------------------------------------------------------
# Alivio de memoria
# -----------------------------------------------------------------------------
force_stop_candidates() {
  pm list packages -3 2>/dev/null | cut -d: -f2
}

memory_relief() {
  say "\n${P}[7/9] ALIVIO DE MEMORIA${NC}"

  if [ "$AUTO_FORCE_STOP" = "1" ] && [ "$FORCE_STOP_NONCRITICAL" = "1" ] && exists am && exists pm; then
    say "${Y}[i] Force-stop selectivo de apps de usuario no críticas.${NC}"

    EXCL="
com.whatsapp
com.whatsapp.w4b
com.android.systemui
com.android.settings
com.google.android.gms
com.google.android.gsf
com.google.android.inputmethod.latin
com.google.android.apps.nexuslauncher
com.android.launcher
com.android.launcher3
com.android.dialer
com.google.android.dialer
com.android.contacts
com.google.android.contacts
com.android.camera
com.google.android.GoogleCamera
com.google.android.apps.messaging
"

    CNT=0
    force_stop_candidates | while IFS= read -r p; do
      [ -z "$p" ] && continue

      echo "$EXCL" | grep -qx "$p" && continue

      case "$p" in
        *keyboard*|*inputmethod*|*launcher*|*camera*|*dialer*|*contacts*|*clock*|*alarm*|*packageinstaller*|*systemui*)
          continue
          ;;
      esac

      run "am force-stop $p"

      CNT=$((CNT+1))
      [ "$CNT" -ge "$FORCE_STOP_MAX_COUNT" ] && break
    done
  else
    say "${C}[i] Sin cierres masivos. Se prioriza estabilidad.${NC}"
  fi

  if [ "$AUTO_DROP_CACHES" = "1" ]; then
    say "${Y}[i] drop_caches omitido: casi siempre requiere root.${NC}"
  fi

  say "${G}[✓] Alivio de memoria completado.${NC}"
}

# -----------------------------------------------------------------------------
# Mantenimiento extra
# -----------------------------------------------------------------------------
extra_maintenance() {
  say "\n${P}[8/9] MANTENIMIENTO EXTRA${NC}"

  exists cmd && run_quiet "cmd jobscheduler monitor-battery on" || true
  exists dumpsys && run "dumpsys usagestats | head -80" || true
  exists dumpsys && run "dumpsys procstats | head -120" || true
  exists dumpsys && run "dumpsys activity processes | head -120" || true

  media_scan_hint

  say "${G}[✓] Mantenimiento extra completado.${NC}"
}

# -----------------------------------------------------------------------------
# Reporte final
# -----------------------------------------------------------------------------
diagnostics_post() {
  say "\n${P}[9/9] DIAGNÓSTICO FINAL${NC}"

  exists dumpsys && run "dumpsys meminfo | head -100" || true
  exists top && run "top -n 1 | head -50" || true
  exists df && run "df -h /data /sdcard" || true
  exists dumpsys && run "dumpsys package dexopt | head -150" || true

  say "${G}[✓] Diagnóstico final listo.${NC}"
}

# -----------------------------------------------------------------------------
# Main
# -----------------------------------------------------------------------------
main() {
  mkdir -p "$LOGDIR" 2>/dev/null
  log_init
  apply_profile
  banner

  if [ "$MODE" = "restore" ]; then
    restore_settings
    exit $?
  fi

  diagnostics_pre
  ota_best_effort
  report_cleanup_inventory
  cleanup_storage
  tune_fluidity
  dexopt_phase
  memory_relief
  extra_maintenance
  diagnostics_post

  say "\n${G}[🎉] TITAN v33 completado.${NC}"
  say "${C}[i] Perfil aplicado: ${PROFILE}${NC}"
  say "${C}[i] Log: ${LOGFILE}${NC}"
  say "${C}[i] Restore: adb shell sh /sdcard/Download/titan_v33.sh --restore${NC}"

  if [ "$AUTO_REBOOT_HINT" = "1" ]; then
    say "${C}[i] Recomendado: reiniciar manualmente para consolidar cambios.${NC}"
  fi

  exit 0
}

main "$@"</script>

  <script>
    const titanEl = document.getElementById('titanScript');
    const codeEl = document.getElementById('codeBlock');
    const linesEl = document.getElementById('linesCount');
    const toastEl = document.getElementById('toast');
    const toastTextEl = document.getElementById('toastText');
    const searchInputEl = document.getElementById('searchInput');

    function getRawScript() {
      return (titanEl?.textContent || '').replace(/\r\n/g, '\n').trimEnd();
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showToast(msg) {
      toastTextEl.textContent = msg;
      toastEl.classList.remove('opacity-0', 'pointer-events-none');
      toastEl.classList.add('opacity-100');
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => {
        toastEl.classList.add('opacity-0', 'pointer-events-none');
        toastEl.classList.remove('opacity-100');
      }, 1200);
    }

    async function copyText(txt, msg) {
      if (!txt) return showToast('NO HAY TEXTO PARA COPIAR');
      try {
        await navigator.clipboard.writeText(txt);
        showToast(msg || 'COPIADO');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = txt;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(msg || 'COPIADO');
      }
    }

    function render(raw, query = '') {
      const lines = raw.split('\n');
      linesEl.textContent = `Lines: ${lines.length}`;

      const q = (query || '').trim();
      const qRe = q ? new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi') : null;

      const html = lines.map((line, i) => {
        let safe = escapeHtml(line);
        if (qRe) {
          safe = safe.replace(qRe, m => `<mark class="bg-god-500/30 text-god-400 px-0.5">${m}</mark>`);
        }
        return `<span class="line-num">${String(i + 1).padStart(3, ' ')}</span>${safe}`;
      }).join('\n');

      codeEl.innerHTML = html;
    }

    window.copyRaw = function () {
      const raw = getRawScript();
      copyText(raw, 'SCRIPT COPIADO');
    };

    window.copyOneLiner = function () {
      const cmd = `adb shell sh /sdcard/Download/titan_v33.sh`;
      copyText(cmd, 'COMANDO ADB COPIADO');
    };

    window.highlightSearch = function () {
      render(getRawScript(), searchInputEl?.value || '');
    };

    (function init() {
      const raw = getRawScript();
      if (!raw) {
        codeEl.textContent = '⚠️ No se encontró contenido en #titanScript (vacío).';
        linesEl.textContent = 'Lines: 0';
        return;
      }
      render(raw, '');
    })();
  </script>
</body>
</html>
