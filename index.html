    <!-- ✅ Script RAW sin template literal -->
    <script id="titanScript" type="text/plain">#!/system/bin/sh
#===============================================================================
# TITAN v26 PRO (NO-ROOT / ADB SAFE)
# Optimización segura Android usando usuario "shell" (ADB), sin root.
#
# Mejoras vs v25:
#  - Modo PLAN: estimación de archivos y tamaño a borrar (antes de confirmar)
#  - Limpieza ampliada pero segura (tmp/log/old/cache/thumbnails + carpetas típicas)
#  - Exclusiones (whitelist) para evitar borrar cosas importantes
#  - Reporte final completo: /data y /sdcard + resumen por fase
#  - "quick" y "full" modes
#  - Compilación inteligente: lista sugerida + opción all (no por defecto)
#  - Log rotation (logs viejos)
#  - Checks previos: batería/carga/SDK + avisos scoped storage
#  - Manejo robusto Toybox/busybox (fallbacks)
#
# Uso (ADB):
#   adb shell sh /sdcard/Download/titan_v26.sh
#   adb shell sh /sdcard/Download/titan_v26.sh --dry-run
#   adb shell sh /sdcard/Download/titan_v26.sh --plan
#   adb shell sh /sdcard/Download/titan_v26.sh --quick
#   adb shell sh /sdcard/Download/titan_v26.sh --full
#   adb shell sh /sdcard/Download/titan_v26.sh --restore
#   adb shell sh /sdcard/Download/titan_v26.sh --yes
#
#===============================================================================

# ---------------------------
# Colores
# ---------------------------
R='\033[0;31m'; G='\033[0;32m'; Y='\033[1;33m'; C='\033[0;36m'; P='\033[0;35m'; NC='\033[0m'

# ---------------------------
# CONFIG
# ---------------------------

# Interacción
DRY_RUN=0
ASK_CONFIRM=1
VERBOSE=1

# Modos
MODE="run"          # run | restore
PROFILE="balanced"  # quick | balanced | full
PLAN_ONLY=0         # 1 = no borra, solo calcula y muestra

# Limpieza Download (filtros)
DAYS_OLD=14
MIN_SIZE_KB=64
DOWNLOAD_MAXDEPTH=1

# Extensiones consideradas basura (seguro)
# (NO incluye .apk por defecto; .apk lo podés agregar manualmente si querés)
JUNK_EXTS="tmp log bak old ~ swp part crdownload"

# Carpetas típicas de basura/temporales en sdcard (no rompe apps)
# OJO: Android/data es restringido en 11+; lo intentamos solo si se puede.
SDCARD_TRASH_DIRS="
/sdcard/Download
/sdcard/DCIM/.thumbnails
/sdcard/Pictures/.thumbnails
/sdcard/Movies/.thumbnails
/sdcard/Android/media/*/*/cache
/sdcard/Android/media/*/*/tmp
/sdcard/Telegram/Telegram Video/.cache
/sdcard/Telegram/Telegram Images/.cache
/sdcard/Telegram/Telegram Documents/.cache
"

TITAN_TRY_ANDROID_DATA_CACHE=1   # Android 11+ puede bloquear

# Exclusiones (nunca tocar)
# Podés agregar rutas o patrones (grep -F)
EXCLUDE_LIST="
/sdcard/Download/keep
/sdcard/Download/NO_BORRAR
"

# Fluidez
TITAN_DISABLE_ANIMATIONS=1
ANIM_SCALE="0.5"
SET_LONG_PRESS_TIMEOUT=1
LONG_PRESS_TIMEOUT_MS=250
SET_POINTER_SPEED=1
POINTER_SPEED=7

# RAM / procesos
TITAN_AGGRESSIVE_RAM=0

# Compilación
ENABLE_SPEED_PROFILE=1
COMPILE_MODE="smart"    # smart | all | none
# Smart list por defecto (ajustá según uso)
SMART_COMPILE_LIST="
com.whatsapp
com.instagram.android
com.google.android.youtube
com.google.android.gms
com.android.chrome
com.google.android.googlequicksearchbox
"

# Diagnóstico
ENABLE_DIAGNOSTICS=1
TOP_DU_COUNT=15

# Seguridad extra
MIN_BATTERY_PERCENT=15     # si no está cargando y batería < esto, avisa
REQUIRE_CHARGING_FOR_ALL=0 # si COMPILE_MODE=all, recomendar cargando

# Logs / state
LOGDIR="/sdcard/Download"
LOGFILE="${LOGDIR}/titan_v26.log"
STATEFILE="${LOGDIR}/titan_state_v26.conf"
LOG_ROTATE=3  # cantidad de logs viejos a conservar

# ---------------------------
# Args
# ---------------------------
for arg in "$@"; do
  case "$arg" in
    --dry-run) DRY_RUN=1 ;;
    --yes) ASK_CONFIRM=0 ;;
    --quiet) VERBOSE=0 ;;
    --restore) MODE="restore" ;;
    --plan) PLAN_ONLY=1; DRY_RUN=1 ;;
    --quick) PROFILE="quick" ;;
    --full) PROFILE="full" ;;
    --balanced) PROFILE="balanced" ;;
    --compile-all) COMPILE_MODE="all" ;;
    --compile-none) COMPILE_MODE="none" ;;
  esac
done

# Ajustes por perfil
case "$PROFILE" in
  quick)
    DAYS_OLD=21
    MIN_SIZE_KB=128
    ENABLE_DIAGNOSTICS=0
    ENABLE_SPEED_PROFILE=0
  ;;
  balanced)
    # defaults
  ;;
  full)
    DAYS_OLD=7
    MIN_SIZE_KB=32
    ENABLE_DIAGNOSTICS=1
    ENABLE_SPEED_PROFILE=1
  ;;
esac

# ---------------------------
# Helpers
# ---------------------------
strip_ansi() { sed 's/\x1b\[[0-9;]*m//g'; }

log_init() { : > "$LOGFILE" 2>/dev/null; }
log() { echo "$(date '+%F %T') | $*" >> "$LOGFILE" 2>/dev/null; }

say() {
  [ "$VERBOSE" = "1" ] && echo -e "$*"
  echo -e "$*" | strip_ansi | log
}

run() {
  if [ "$DRY_RUN" = "1" ]; then
    say "${C}[dry] $*${NC}"
    return 0
  fi
  sh -c "$*" >> "$LOGFILE" 2>&1
  return $?
}

exists() { command -v "$1" >/dev/null 2>&1; }

getprop_safe() { getprop "$1" 2>/dev/null; }
get_sdk() { getprop_safe ro.build.version.sdk; }
get_model() { getprop_safe ro.product.model; }
get_manu() { getprop_safe ro.product.manufacturer; }

human_kb() { awk -v k="$1" 'BEGIN{printf "%.1f MB", k/1024}'; }

avail_kb_path() {
  p="$1"
  df -k "$p" 2>/dev/null | awk 'NR==2{print $4}'
}

sd_avail_kb() { df -k /sdcard 2>/dev/null | awk 'NR==2{print $4}'; }

confirm_or_exit() {
  msg="$1"
  [ "$ASK_CONFIRM" = "0" ] && return 0
  [ "$DRY_RUN" = "1" ] && return 0
  echo -e "${Y}${msg} (y/N)${NC} \c"
  read ans
  if [ "$ans" != "y" ] && [ "$ans" != "Y" ]; then
    say "${Y}[!] Cancelado por el usuario${NC}"
    exit 0
  fi
}

rotate_logs() {
  i="$LOG_ROTATE"
  while [ "$i" -ge 1 ]; do
    prev=$((i-1))
    if [ "$prev" -eq 0 ]; then
      [ -f "$LOGFILE" ] && mv -f "$LOGFILE" "${LOGFILE}.${i}" 2>/dev/null
    else
      [ -f "${LOGFILE}.${prev}" ] && mv -f "${LOGFILE}.${prev}" "${LOGFILE}.${i}" 2>/dev/null
    fi
    i=$((i-1))
  done
}

file_size_bytes() {
  f="$1"
  sz="$(stat -c %s "$f" 2>/dev/null)"
  if [ -n "$sz" ]; then echo "$sz"; return 0; fi
  sz="$(ls -ln "$f" 2>/dev/null | awk '{print $5}')"
  [ -n "$sz" ] && echo "$sz" || echo "0"
}

save_state() {
  W="$(settings get global window_animation_scale 2>/dev/null)"
  T="$(settings get global transition_animation_scale 2>/dev/null)"
  A="$(settings get global animator_duration_scale 2>/dev/null)"
  LP="$(settings get secure long_press_timeout 2>/dev/null)"
  PS="$(settings get system pointer_speed 2>/dev/null)"

  cat > "$STATEFILE" 2>/dev/null <<EOF
# TITAN v26 state (para --restore)
window_animation_scale=${W}
transition_animation_scale=${T}
animator_duration_scale=${A}
long_press_timeout=${LP}
pointer_speed=${PS}
EOF
}

load_state() {
  [ -f "$STATEFILE" ] || return 1
  . "$STATEFILE" 2>/dev/null
  return 0
}

trap_handler() {
  say "\n${Y}[!] Interrumpido. Log: ${LOGFILE}${NC}"
  exit 130
}
trap trap_handler INT TERM

battery_status() {
  if exists dumpsys; then
    lvl="$(dumpsys battery 2>/dev/null | awk -F': ' '/level:/{print $2}' | head -n1)"
    st="$(dumpsys battery 2>/dev/null | awk -F': ' '/status:/{print $2}' | head -n1)"
    echo "${lvl:-?} ${st:-?}"
  else
    echo "? ?"
  fi
}

is_charging() {
  if exists dumpsys; then
    st="$(dumpsys battery 2>/dev/null | awk -F': ' '/status:/{print $2}' | head -n1)"
    [ "$st" = "2" ] || [ "$st" = "5" ]
    return $?
  fi
  return 1
}

# ---------------------------
# Banner
# ---------------------------
rotate_logs
log_init

SDK="$(get_sdk)"
MANU="$(get_manu)"
MODEL="$(get_model)"
UID="$(id -u 2>/dev/null)"
USERINFO="$(id 2>/dev/null | tr '\n' ' ')"
BAT="$(battery_status)"

say "${Y}"
say "    ████████╗██╗████████╗ █████╗ ███╗    ██╗"
say "    ╚══██╔══╝██║╚══██╔══╝██╔══██╗████╗  ██║"
say "       ██║   ██║   ██║   ███████║██╔██╗ ██║"
say "       ██║   ██║   ██║   ██╔══██║██║╚██╗██║"
say "       ██║   ██║   ██║   ██║  ██║██║ ╚████║"
say "       ╚═╝   ╚═╝   ╚═╝   ╚═╝  ╚═╝╚═╝  ╚═══╝"
say -e "${C}        [TITAN v26 PRO - NO ROOT / ADB SAFE]${NC}"
say ""
say "${P}[i] UID: ${UID} | ${USERINFO}${NC}"
say "${P}[i] Dispositivo: ${MANU} ${MODEL} | SDK: ${SDK}${NC}"
say "${P}[i] Perfil: ${PROFILE} | PLAN=${PLAN_ONLY} | DRY_RUN=${DRY_RUN}${NC}"
say "${P}[i] Batería: ${BAT}${NC}"
say "${P}[i] Log: ${LOGFILE}${NC}"

DATA_BEFORE="$(avail_kb_path /data)"
SD_BEFORE="$(sd_avail_kb)"
[ -n "$DATA_BEFORE" ] && say "${C}[i] Libre /data (antes): $(human_kb "$DATA_BEFORE")${NC}"
[ -n "$SD_BEFORE" ] && say "${C}[i] Libre /sdcard (antes): $(human_kb "$SD_BEFORE")${NC}"

BAT_LVL="$(echo "$BAT" | awk '{print $1}')"
if echo "$BAT_LVL" | grep -Eq '^[0-9]+$'; then
  if [ "$BAT_LVL" -lt "$MIN_BATTERY_PERCENT" ] && ! is_charging; then
    say "${Y}[!] Batería baja (<${MIN_BATTERY_PERCENT}%) y NO está cargando. Recomendado enchufar.${NC}"
  fi
fi

#===============================================================================
# RESTORE
#===============================================================================
restore_settings() {
  say "\n${P}[⚡] RESTORE: Revirtiendo valores guardados${NC}"

  if ! load_state; then
    say "${R}[x] No encontré statefile: ${STATEFILE}${NC}"
    say "${C}[i] Ejecutá el script en modo normal una vez para guardar estado.${NC}"
    exit 1
  fi

  [ -n "${window_animation_scale}" ] && run "settings put global window_animation_scale ${window_animation_scale}"
  [ -n "${transition_animation_scale}" ] && run "settings put global transition_animation_scale ${transition_animation_scale}"
  [ -n "${animator_duration_scale}" ] && run "settings put global animator_duration_scale ${animator_duration_scale}"
  [ -n "${long_press_timeout}" ] && run "settings put secure long_press_timeout ${long_press_timeout}"
  [ -n "${pointer_speed}" ] && run "settings put system pointer_speed ${pointer_speed}"

  say "${G}[✓] Restore completado${NC}"
}

#===============================================================================
# DIAGNÓSTICO
#===============================================================================
diagnostics() {
  [ "$ENABLE_DIAGNOSTICS" = "1" ] || return 0
  say "\n${P}[🧪] DIAGNÓSTICO${NC}"

  if exists du; then
    say "${C}[i] Top ${TOP_DU_COUNT} carpetas pesadas en /sdcard:${NC}"
    run "du -sk /sdcard/* 2>/dev/null | sort -nr | head -n ${TOP_DU_COUNT}" || true
  else
    say "${Y}[!] 'du' no disponible${NC}"
  fi

  if exists dumpsys; then
    say "${C}[i] dumpsys meminfo (resumen):${NC}"
    run "dumpsys meminfo | head -n 80" || true
  fi

  say "${G}[✓] Diagnóstico listo${NC}"
}

#===============================================================================
# Limpieza
#===============================================================================
list_download_junk() {
  expr=""
  for e in $JUNK_EXTS; do
    expr="$expr -name '*.$e' -o"
  done
  expr="$(echo "$expr" | sed 's/ -o$//')"

  # shellcheck disable=SC2086
  find /sdcard/Download -maxdepth "$DOWNLOAD_MAXDEPTH" -type f \( $expr \) \
    -mtime +"$DAYS_OLD" -size +"${MIN_SIZE_KB}k" 2>/dev/null
}

sum_bytes_from_stdin() {
  total=0
  while read -r f; do
    [ -z "$f" ] && continue
    sz="$(file_size_bytes "$f")"
    total=$((total + sz))
  done
  echo "$total"
}

bytes_to_mb() {
  b="$1"
  awk -v b="$b" 'BEGIN{printf "%.1f MB", b/1024/1024}'
}

safe_clean_plus() {
  say "\n${P}[⚡] FASE 1: SAFE CLEAN++${NC}"

  run "pm trim-caches 999G" \
    && say "${G}[✓] pm trim-caches ejecutado${NC}" \
    || say "${Y}[!] pm trim-caches no disponible/bloqueado${NC}"

  say "${C}[i] Analizando basura en Download (>${DAYS_OLD}d, >${MIN_SIZE_KB}KB)...${NC}"
  CAND_COUNT="$(list_download_junk | wc -l 2>/dev/null)"

  if [ "${CAND_COUNT:-0}" -gt 0 ]; then
    EST_BYTES="$(list_download_junk | sum_bytes_from_stdin)"
    say "${C}[i] Candidatos Download: ${CAND_COUNT} | Estimado: $(bytes_to_mb "$EST_BYTES")${NC}"
    say "${C}[i] Preview (50):${NC}"
    list_download_junk | head -n 50 | while read -r f; do
      say "  - $f"
    done

    [ "$PLAN_ONLY" = "1" ] && { say "${Y}[plan] No se borra nada (PLAN_ONLY=1)${NC}"; return 0; }

    confirm_or_exit "¿Borrar estos archivos de Download?"

    expr=""
    for e in $JUNK_EXTS; do expr="$expr -name '*.$e' -o"; done
    expr="$(echo "$expr" | sed 's/ -o$//')"
    # shellcheck disable=SC2086
    run "find /sdcard/Download -maxdepth ${DOWNLOAD_MAXDEPTH} -type f \( $expr \) -mtime +${DAYS_OLD} -size +${MIN_SIZE_KB}k -print -delete 2>/dev/null" \
      && say "${G}[✓] Limpieza Download completada${NC}" \
      || say "${Y}[!] No se pudo limpiar Download${NC}"
  else
    say "${G}[✓] No hay basura en Download con esos filtros${NC}"
  fi

  say "${C}[i] Limpieza rutas típicas (thumbnails/cache/tmp)...${NC}"
  echo "$SDCARD_TRASH_DIRS" | sed '/^\s*$/d' | while read -r d; do
    for path in $d; do
      [ -e "$path" ] || continue
      if [ -d "$path" ]; then
        [ "$PLAN_ONLY" = "1" ] && { say "${C}[plan] Vaciar: $path${NC}"; continue; }
        run "find \"$path\" -type f -mtime +${DAYS_OLD} -size +${MIN_SIZE_KB}k -delete 2>/dev/null" || true
        say "${G}[✓] Ok: $path${NC}"
      fi
    done
  done

  if [ "$TITAN_TRY_ANDROID_DATA_CACHE" = "1" ]; then
    if [ -n "$SDK" ] && [ "$SDK" -ge 30 ] 2>/dev/null; then
      say "${Y}[!] Android 11+ suele bloquear /sdcard/Android/data (scoped storage). Puede fallar.${NC}"
    fi
    if [ "$PLAN_ONLY" = "1" ]; then
      say "${C}[plan] Intentaría vaciar /sdcard/Android/data/*/cache (si accesible)${NC}"
    else
      run "find /sdcard/Android/data -type d -path '*/cache' 2>/dev/null | while read -r d; do find \"\$d\" -type f -delete 2>/dev/null; done" \
        && say "${G}[✓] Intento Android/data/*/cache completado${NC}" \
        || say "${Y}[!] Android/data no accesible (esperable en Android 11+)${NC}"
    fi
  fi

  say "${G}[✓] SAFE CLEAN++ completado${NC}"
}

ram_safe() {
  say "\n${P}[⚡] FASE 2: RAM SAFE${NC}"
  say "${C}[i] Modo seguro: no se ejecuta kill-all${NC}"
  run "cmd activity memory-factor normal >/dev/null 2>&1" || true
  say "${G}[✓] RAM SAFE listo${NC}"
}

fluidity_safe() {
  say "\n${P}[⚡] FASE 3: FLUIDEZ SAFE${NC}"

  save_state
  say "${C}[i] Estado guardado en: ${STATEFILE}${NC}"

  if [ "$TITAN_DISABLE_ANIMATIONS" = "1" ]; then
    run "settings put global window_animation_scale ${ANIM_SCALE}"
    run "settings put global transition_animation_scale ${ANIM_SCALE}"
    run "settings put global animator_duration_scale ${ANIM_SCALE}"
    say "${G}[✓] Animaciones -> ${ANIM_SCALE}${NC}"
  fi

  if [ "$SET_LONG_PRESS_TIMEOUT" = "1" ]; then
    run "settings put secure long_press_timeout ${LONG_PRESS_TIMEOUT_MS}"
    say "${G}[✓] long_press_timeout -> ${LONG_PRESS_TIMEOUT_MS}${NC}"
  fi

  if [ "$SET_POINTER_SPEED" = "1" ]; then
    run "settings put system pointer_speed ${POINTER_SPEED}"
    say "${G}[✓] pointer_speed -> ${POINTER_SPEED}${NC}"
  fi

  say "${G}[✓] Fluidez aplicada${NC}"
}

maintenance_safe() {
  say "\n${P}[⚡] FASE 4: MANTENIMIENTO SAFE${NC}"

  [ "$ENABLE_SPEED_PROFILE" = "1" ] || { say "${C}[i] Compile desactivado${NC}"; return 0; }
  [ "$COMPILE_MODE" = "none" ] && { say "${C}[i] COMPILE_MODE=none${NC}"; return 0; }

  if ! cmd package compile -h 2>/dev/null | grep -qi "compile"; then
    say "${C}[i] cmd package compile no disponible${NC}"
    return 0
  fi

  if [ "$COMPILE_MODE" = "all" ]; then
    confirm_or_exit "Aplicar speed-profile a ALL puede tardar. ¿Continuar?"
    run "cmd package compile -m speed-profile -f all" \
      && say "${G}[✓] speed-profile aplicado (all)${NC}" \
      || say "${Y}[!] compile bloqueado/no soportado${NC}"
    return 0
  fi

  say "${C}[i] Compilación smart (lista sugerida)${NC}"
  echo "$SMART_COMPILE_LIST" | sed '/^\s*$/d' | while read -r pkg; do
    run "cmd package compile -m speed-profile -f $pkg" \
      && say "${G}[✓] speed-profile: $pkg${NC}" \
      || say "${Y}[!] no se pudo compilar: $pkg${NC}"
  done

  say "${G}[✓] Mantenimiento listo${NC}"
}

#===============================================================================
# MAIN
#===============================================================================
if [ "$MODE" = "restore" ]; then
  restore_settings
  exit 0
fi

diagnostics
safe_clean_plus
ram_safe
fluidity_safe
maintenance_safe

DATA_AFTER="$(avail_kb_path /data)"
SD_AFTER="$(sd_avail_kb)"
[ -n "$DATA_AFTER" ] && say "\n${C}[i] Libre /data (después): $(human_kb "$DATA_AFTER")${NC}"
[ -n "$SD_AFTER" ] && say "${C}[i] Libre /sdcard (después): $(human_kb "$SD_AFTER")${NC}"

say "\n${G}[✓] TITAN v26 PRO: COMPLETADO${NC}"
say "${C}[i] Log: ${LOGFILE}${NC}"
say "${C}[i] Revertir ajustes: adb shell sh <ruta>/titan_v26.sh --restore${NC}"
say "${C}[i] Tip: reiniciá si querés consolidar cambios${NC}"
exit 0

    <script>
        // Leer el script desde el tag text/plain (sin template literals)
        const titanV26 = (document.getElementById('titanScript').textContent || "").replace(/^\s+|\s+$/g, "");

        function renderCode() {
            const codeBlock = document.getElementById('codeBlock');
            const lines = titanV26.split('\n');
            document.getElementById('linesCount').innerText = `Lines: ${lines.length}`;

            const highlighted = lines.map((line, index) => {
                let formattedLine = line
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");

                if (formattedLine.trim().startsWith('#')) {
                    formattedLine = `<span class="syntax-comment">${formattedLine}</span>`;
                } else {
                    formattedLine = formattedLine
                        .replace(/\b(if|then|else|fi|for|in|do|done|exit|while|case|esac|function)\b/g, '<span class="syntax-keyword">$1</span>')
                        .replace(/\b(echo|pm|am|cmd|find|settings|grep|id|tr|read|du|dumpsys|getprop|awk|df|sort|head|sed|stat|ls|rm|chmod)\b/g, '<span class="syntax-func">$1</span>')
                        .replace(/"([^"]*)"/g, '<span class="syntax-string">"$1"</span>')
                        .replace(/'([^']*)'/g, '<span class="syntax-string">\'$1\'</span>');
                }

                return `<span class="line-num">${index + 1}</span>${formattedLine}`;
            }).join('\n');

            codeBlock.innerHTML = highlighted;
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').innerText = text;
            toast.style.opacity = '1';
            toast.style.bottom = '40px';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.bottom = '32px';
            }, 2500);
        }

        function copyText(text, toastMsg) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast(toastMsg);
        }

        function copyRaw() {
            copyText(titanV26, "SCRIPT COMPLETO COPIADO");
        }

        // Base64 robusto (TextEncoder + chunk)
        function base64FromUtf8(str) {
            const bytes = new TextEncoder().encode(str);
            let binary = "";
            const chunk = 0x8000;
            for (let i = 0; i < bytes.length; i += chunk) {
                binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
            }
            return btoa(binary);
        }

        function copyOneLiner() {
            const b64 = base64FromUtf8(titanV26);
            const oneLiner =
`adb shell "TMP=/data/local/tmp/titan_v26_pro_no_root.sh; B=/data/local/tmp/titan_v26_pro_no_root.b64; echo '${b64}' > \\$B; (base64 -d \\$B 2>/dev/null || toybox base64 -d \\$B 2>/dev/null) > \\$TMP; chmod 755 \\$TMP; sh \\$TMP; rc=\\$?; rm -f \\$TMP \\$B; exit \\$rc"`;
            copyText(oneLiner, "COMANDO AUTO-RUN ADB COPIADO");
        }

        function highlightSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const codeLines = document.querySelectorAll('#codeBlock span:not(.line-num)');
            codeLines.forEach(line => {
                if (term && line.innerText.toLowerCase().includes(term)) {
                    line.style.backgroundColor = 'rgba(245, 158, 11, 0.3)';
                } else {
                    line.style.backgroundColor = 'transparent';
                }
            });
        }

        window.onload = renderCode;
    </script>
